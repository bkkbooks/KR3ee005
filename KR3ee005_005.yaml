body:
  text: 卷五針灸禁忌第一上黃帝問曰四時之氣各不同形百病之起皆有所生灸刺之道何者為寶岐伯對曰四時之氣各有所在灸刺之道氣穴為寶故春刺絡脈諸滎大經分肉之間甚者深取之間者淺取之素問曰春刺散俞及與分理血出而止又曰春者木始治肝氣始生肝氣急其風疾經脈常深萁氣少不能深入故取絡脈分肉之間九卷云春刺滎者正同於義為是又曰春取絡脈治皮膚又曰春取經與脈分肉之間二者義亦略同又曰春氣在經脈夏取諸俞孫絡肌肉皮膚之上又曰春刺俞二者正同於義為是長夏刺經又曰取盛經孫絡取分間絶皮膚又曰夏取分腠治肌肉義亦略同素問曰夏刺絡俞見血而止又曰夏者火始治心氣始長脈瘦氣弱陽氣流一作留溢血溫於腠內至於經故取盛經分腠絶膚而病去者邪居淺也所謂盛經者陽脈也義亦略同又曰夏氣在孫絡長夏氣在肌肉秋刺諸合余如春法秋取經俞邪氣在府取之於合素問曰秋刺皮膚循理上下同法又曰秋者金始治肺將收殺金將勝火陽氣在合陰初勝濕氣及體陰氣未盛未能深入故取俞以瀉陰邪取合以虛陽邪陽氣始衰故取於合是謂始秋之治變也又曰秋氣在膚腠閉者是也九卷又曰秋取氣口治筋脈於義不同冬取井諸俞之分欲深而留之又曰冬取井滎素問曰冬取俞竅及於分理甚者直下間者散下俞竅與諸俞之分義亦略同又曰冬者水始治腎方閉陽氣衰少陰氣堅盛巨陽伏沉陽脈乃去取井以下陰逆取滎以通氣一云以實陽氣曰冬取井滎春不鼽衄是謂末冬之治變也又曰冬氣在骨髓又曰冬刺井病在臟取之井二者正同於義為是又曰冬取經俞治骨髓五臟五臟則同經俞有疑春刺夏分脈亂氣微入淫骨髓病不得愈令人不嗜食又且少氣春刺秋分筋攣逆氣環為咳嗽病不愈令人時驚又且笑一作哭春刺冬分邪氣著臟令人腹脹病不愈又且欲言語夏刺春分病不愈令人解墮夏刺秋分病不愈令人心中悶無言惕惕如人將捕之夏刺冬分病不愈令人少氣時欲怒秋刺春分病不愈令人惕然欲有所為起而忘之秋刺夏分病不愈令人益嗜臥又且善夢謂立秋之後秋刺冬分病不愈令人悽悽時寒冬刺春分病不愈令人欲臥不能眠眠而有見謂十二月中旬以前冬刺夏分病不愈令人氣上發為諸痹冬刺秋分病不愈令人善渴足之陽者陰中之少陽也足之陰者陰中之太陰也手之陽者陽中之太陽也手之陰者陽中之少陰也正月二月三月人氣在左無刺左足之陽四月五月六月人氣在右無刺右足之陽七月八月九月人氣在右無刺右足之陽十月十一月十二月人氣在左無刺左足之陰刺法曰無刺熇熇之熱無刺漉漉之汗無刺渾渾音魂之脈無刺病與脈相逆者上工刺其未生者也其次刺其未成者也其次刺其已衰者也下工刺其方襲者與其形之盛者與其病之與脈相逆者也故曰方其盛也勿敢毀傷刺其已衰事必大昌故曰上工治未病不治已病大寒無刺大溫無凝月生無瀉月滿無補月郭空無治新內無刺已刺勿內大怒無刺已刺勿怒大勞無刺已刺勿勞大醉無刺已刺勿醉大飽無刺已刺勿飽大飢無刺已刺勿飢已渴勿刺已刺勿渴乘車來者臥而休之如食頃乃刺之步行來者坐而休之如行十里頃乃刺之大驚大怒必定其氣乃刺之凡禁者脈亂氣散逆其榮衛經氣不次因而刺之則陽病入於陰陰病出為陽則邪復生粗工不察是謂伐形身體淫濼反消骨髓津液不化脫其五味是謂失氣也曰願聞刺淺深之分曰刺骨者無傷筋刺筋者無傷肉刺肉者無傷脈刺脈者無傷皮刺皮者無傷肉刺肉者無傷筋刺筋者無傷骨曰余不知所謂願聞其詳曰刺骨無傷筋者針至筋而去不及骨也刺筋無傷肉者至肉而去不及筋也刺肉無傷脈者至脈而去不及肉也刺脈無傷皮者至皮而去不及脈也刺皮無傷肉者病在皮中針入皮無中肉也刺肉無傷筋者過肉中筋刺筋無傷骨者過筋中骨此之謂反也刺中心一日死其動為噫刺中肺三日死其動為咳刺中肝五日死其動為欠素問作語刺中脾十五日素問作十日一作五日死其動為吞刺中腎三日素問作六日一作七日死其動為嚏刺中膽一日半死其動為嘔刺中膈為傷中其病雖愈不過一歲必死刺跗上中大脈血出不止死刺陰股中大脈血出不止死刺面中流脈不幸為盲刺客主人內陷中脈為漏為聾刺頭中腦戶入腦立死刺膝臏出液為跛刺舌下中脈太過出血不止為喑刺腎中太陰脈出血多立死刺足下布絡中脈血不出為腫刺足少陰脈重虛出血為舌難以言刺郤中大脈令人僕脫色刺膺中陷脈素問作刺膺中陷中肺為喘逆仰息刺氣街中脈血不出為腫鼠𪖈鼷音僕刺肘中內陷氣歸之為不屈伸刺脊間中髓為傴刺陰股中陰三寸內陷令人遺溺刺浮上中乳房為腫根蝕刺腋下脅間內陷令人咳刺缺盆中內陷氣泄令人喘咳逆刺少腹中膀胱溺出令人少腹滿刺手魚腹內陷為腫刺腨腸內陷為腫刺眶上陷骨中脈為漏為盲刺關節中液出不得屈伸針灸禁忌第一下黃帝問曰願聞刺要岐伯對曰病有浮沉刺有淺深各至其理無過其道過之則內傷不及則生外壅壅則邪從之淺深不及反為大賊內傷五臟後生大病故曰病有在毫毛腠理者有在皮膚者有在肌肉者有在脈者有在筋者有在骨者有在髓者是故刺毫毛腠理無傷皮皮傷則內動肺肺動則秋病溫瘧熱厥淅然寒栗刺皮無傷肉肉傷則內動脾脾動則七十二日四季之月病腹脹煩滿不嗜食刺肉無傷脈脈傷則內動心心動則夏病心痛刺脈無傷筋筋傷則內動肝肝動則春病熱而筋弛刺筋無傷骨骨傷則內動腎腎動則冬病脹腰痛刺骨無傷髓髓傷則消濼胻酸體解酸然不去矣神庭禁不可刺上關禁不可刺深深則令人耳無所聞顱息刺不可多出血左角刺不可久留人迎刺過深殺人雲門刺不可深深則使人逆息不能食臍中禁不可刺伏兔禁不可刺本穴云刺入五分三陽絡禁不可刺復留刺無多見血承筋禁不可刺然谷刺無多見血乳中禁不可刺鳩尾禁不可刺上刺禁頭維禁不可灸承光禁不可灸腦戶禁不可灸風府禁不可灸喑門禁不可灸灸之令人喑下關耳中有干糙一作擲禁不可灸耳門耳中有膿禁不可灸人迎禁不可灸絲竹空禁不可灸灸之不幸令人目小或盲承泣禁不可灸脊中禁不可灸灸之使人僂白環俞禁不可灸乳中禁不可灸石門女子禁不可灸氣街禁不可灸灸之不幸不得息淵腋禁不可灸灸之不幸生腫蝕經渠禁不可灸傷人神鳩尾禁不可灸陰市禁不可灸陽關禁不可灸天府禁不可灸使人逆息伏兔禁不可灸地五會禁不可灸使人瘦瘈脈禁不可灸上灸禁凡刺之道必中氣穴無中肉節中氣穴則針遊於巷中肉節則皮膚痛補瀉反則病益篤中筋則筋緩邪氣不出與真相搏亂而不去反還內著用針不審以順為逆也凡刺之理補瀉無過其度病與脈逆者無刺形肉已奪是一奪也大奪血之後是二奪也大奪汗之後是三奪也大泄之後是四奪也新産及大下血是五奪也此皆不可瀉也曰針能殺生人不能起死人乎曰能殺生人不起死生者是人之所受氣谷谷之所注者胃也胃者水穀氣血之海也海之所行雲雨者天下也胃之所出氣血者經隧也經隧者五臟六腑之大絡也逆而奪之而已矣迎之五里中道而止五至而已五往一作注而臟之氣盡矣故五五二十五而竭其俞矣此所謂奪其天氣故曰窺門而刺之者死於家入門而刺之者死於堂帝曰請傳之後世以為刺禁九針九變十二節五刺五邪第二黃帝問曰九針安生岐伯對曰九針者天地之數也天地之數始於一終於九故一以法天二以法地三以法人四以法四時五以法五音六以法六律七以法七星八以法八風九以法九野曰以針應九之數奈何曰一者天天者陽也五臟之應天者肺也肺者五臟六腑之蓋也皮者肺之合也人之陽也故為之治鑱針鑱針者取法於布一作巾針去末半寸卒鋭之長一寸六分大其頭而鋭其末令無得深入而陽氣出主熱在頭身故曰病在皮膚無常處者取之鑱針於病所膚白勿取二者地地者土也人之所以應土者肉也故為之治員針員針者取法於絮針筒其身而員其末其鋒如卵長一寸六分以瀉分肉之氣令不傷肌肉則邪氣得竭故曰病在分肉間取以員針三者人也人之所以成生者血脈也故為之治匙音低針匙針者取法於黍粟大其身而員其末如黍粟之鋭長三寸五分令可以按脈勿陷以致其氣使邪獨出故曰病在脈少氣當補之以匙針針於井滎分俞四者時也時者人於四時八正之風客於經絡之中為痼病者也故為之治鋒針鋒針者取法於絮針筒其身而鋒其末其刃三隅長一寸六分令可以瀉熱出血發泄痼病故曰病在五臟固居者取以鋒針瀉於井滎分俞取以四時也五者音也音者冬夏之分分於子午陰與陽別寒與熱爭兩氣相搏合為癰腫者故為之治鈹針鈹針者取法於劍令末如劍鋒廣二分半長四寸可以取大膿出血故曰病為大膿血取以鈹針六者津也律者調陰陽四時合十二經脈虛邪客於經絡而為暴痹者也故為之治員利針員利針者取法於毫針且員且鋭身中微大長一寸六分以取癰腫暴痹一曰尖如毫微大其末反小其身令可深內也故曰痹氣暴發者取以員利針七者星也星者人之七竅邪之所客於經舍於絡而為痛痹者也故為之治毫針毫針者取法於毫毛長一寸六分令尖如蚊虻喙靜以徐往微以久留正氣因之真邪俱往出針而養主以治痛痹在絡也故曰病痹氣補而去之者取之毫針八者風也風者人之股肱八節也八正之虛風傷人內舍於骨解腰脊節腠之間為深痹者也故為之治長針長針者取法於綦針長七寸其身薄而鋒其末令可以取深邪遠痹故曰病在中者取以長針九者野也野者人之骨解虛風傷人內舍於骨解皮膚之間也淫邪流溢於身如風水之狀不能過於機關大節者也故為之治大針大針者取法於鋒針一作匙針其鋒微員長四寸以瀉機關內外大氣之不能過關節者也故曰病水腫不能過關節者取以大針凡刺之要官針最妙九針之宜各有所為長短大小各有所施不得其用病不能移疾淺針深內傷良肉皮膚為癰疾深針淺病氣不瀉反為大膿病小針大氣瀉太甚病後必為害病大針小大氣不瀉泄亦為後敗失針之宜大者大瀉小者不移已言其過請言其所施凡刺有九以應九變一曰腧刺腧刺者刺諸經滎俞臟俞也二曰道刺道刺者病在上取之下刺腑俞也三曰經刺經刺者刺大經之結絡經分也四曰絡刺絡刺者刺小絡之血脈也五曰分刺分刺者刺分肉之間也六曰大瀉刺一作太刺大瀉刺者刺大膿以鈹針也七曰毛刺毛刺者刺浮痹於皮膚也八曰巨刺巨刺者左取右右取左也九曰淬刺淬刺者燔針取痹氣也凡刺有十二節以應十二經一曰偶刺偶刺者以手直心若背直痛所一刺前一刺後以刺心痹刺此者傍針之也二曰報刺報刺者刺痛無常處上下行者直內拔針以左手隨病所按之乃出針復刺之也三曰恢刺恢刺者直刺傍之舉之前後恢筋急以治筋痹也四曰齊刺齊刺者直入一傍入二以治寒熱氣小深者或曰參刺參刺者治痹氣小深者也五曰揚刺揚刺者正內一傍內四而浮之以治寒熱之博大者也六曰直針刺直針刺者引皮乃刺之以治寒氣之淺者也七曰腧刺腧刺者直入直出稀髮針而深之以治氣盛而熱者也八曰短刺短刺者刺骨痹稍搖而深之致針骨所以上下摩骨也九曰浮刺浮刺者傍入而浮之此治肌急而寒者也十曰陰刺陰刺者左右率刺之此治寒厥中寒者取踝後少陰也十一曰傍刺傍刺者直刺傍刺各一此治留痹久居者也十二曰贊刺贊刺者直入直出數髮針而淺之出血此治癰腫者也脈之所居深不見者刺之微內針而久留之致其脈空脈氣之淺者勿刺按絶其脈刺之無令精出獨出其邪氣耳所謂三刺之則穀氣出者先淺刺絶皮以出陽邪再刺則陰邪出者少益深絶皮致肌肉未入分肉之間後刺深之已入分肉之間則穀氣出矣故刺法曰始刺淺之以逐陽邪之氣後刺深之以致陰邪之氣最後刺極深之以下穀氣此之謂也此文乃解後針道終始篇三刺至穀氣之文也故用針者不知年之所加氣之盛衰虛實之所起不可以為工矣凡刺有五以應五臟一曰半刺半刺者淺內而疾髮針無針傷肉如拔髮一作毛狀以取皮氣此肺之應也二曰豹文刺豹文刺者左右前後針之中脈為故以取經絡之血者此心之應也三曰關刺關刺者直刺左右盡筋上以取筋痹慎無出血此肝之應也四曰合谷刺或曰淵刺又曰豈刺合谷刺者左右雞足針於分肉之間以取肌痹此脾之應也五曰腧刺腧刺者直入直出深內之至骨以取骨痹此腎之應也曰刺有五邪何謂五邪曰病有持癰者有大者有小者有熱者有寒者是謂五邪凡刺癰邪用鈹針無迎隴易俗移性不得膿越道更行去其鄉不安處所乃散亡諸陰陽遇癰所者取之其俞瀉也凡刺大邪用鋒針曰以少泄奪其有餘乃益虛慓其道針其邪於肌肉視之無有乃自直道刺諸陽分肉之間凡刺小邪用員針曰以大補益其不足乃無害視其所在迎之界遠近盡至不得外侵而行之乃自貴一作費刺分肉之間凡刺熱邪用鑱針越而滄出遊不歸乃無病為開道乎闢門戶使邪得出病乃已凡刺寒邪用毫針曰以溫徐往疾去致其神門戶已閉氣不分虛實得調真氣存繆刺第三黃帝問曰何謂繆刺岐伯對曰夫邪之客於形也必先舍於皮毛留而不去入舍於絡脈留而不去入舍於經脈內連五臟散於腸胃陰陽俱感五臟乃傷此乃邪之從皮毛而入極於五臟之次也如此則治其經焉今邪客於皮毛入舍於孫絡留而不去閉塞不通不得入經溢於大絡而生奇病焉夫邪客大絡者左注右右注左上下左右與經相干而布於四末其氣無常處不及於經俞名曰繆刺曰以左取右以右取左其與巨刺何以別之曰邪客於經也左盛則右病右盛則左病亦有易且移者左痛未已而右脈先病如此者必巨刺之必中其經非絡脈也故絡病者其痛與經脈繆處故曰繆刺巨刺者刺其經繆刺者刺其絡曰繆刺取之何如曰邪客於足少陰之絡令人卒心痛暴脹胸脅支滿無積者刺然谷之前出血如食頃而已左取右右取左病新發者五日已邪客於手少陽一作陰之絡令人喉痹舌卷口乾心煩臂外廉痛手不及頭刺手中指當作小指次指爪甲上去端如韭葉各一痏音悔壯者立已老者有頃已左取右右取左此新病數日已邪客於足厥陰之絡令人卒疝暴痛刺足大指爪甲上與肉交者各一痏男子立已女子有頃已左取右右取左邪客於足太陽之絡令人頭項痛肩痛刺足小指爪甲上與肉交者各一痏立已不已刺外踝上三痏左取右右取左如食頃已邪客於手陽明之絡令人氣滿胸中喘急而支怯胸中熱刺手大指次指爪甲上去端如韭葉各一痏左取右右取左如食頃已邪客於臂掌之間不得屈刺其踝後先以指按之痛乃刺之以月死生為數月生一日一痏二日二痏十五日十五痏十六日十四痏邪客於足陽蹺之脈令人目痛從內眥始刺外踝之下半寸所各二痏左取右右取左如行十里頃而已人有所墮墜惡血留於內腹中脹滿不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡刺足內踝之下然谷之前血脈出血刺跗上動脈不已刺三毛上各一痏見血立已左取右右取左善驚善悲不樂刺如右方邪客於手陽明之絡令人耳聾時不聞音刺手大指次指爪甲上端如韭葉各一痏立聞不已刺中指爪甲上與肉交者立聞其不時聞者不可刺也耳中生風者亦刺之如此數右取左左取右凡痹行往來無常處者在分肉間痛而刺之以月生死為數用針者隨氣盛衰以為痏數針過其日數則脫氣不及其日數則氣不瀉左刺右右刺左病如故復刺之如法以月生死為數月生一日一痏二日二痏漸多之十五日十五痏十六日十四痏漸少之邪客於足陽明之絡素問作經王冰云以其脈左右交於面部故舉經脈之病以明繆刺之類令人鼽衄上齒寒刺足中指素問注云刺大指次指爪甲上與肉交者各一痏左取右右取左邪客於足少陽之絡令人脅痛不得息咳而汗出刺足小指素有次指二字爪甲上與肉交者各一痏不得息立已汗出立止咳者溫衣飲食一日已左刺右右則左病立已不已復刺如法邪客於足少陰之絡令人咽痛不可內食無故善怒氣上走賁上刺足中央之絡各三痏凡六刺立已左刺右右刺左邪客於足太陰之絡令人腰痛引少腹控䏚不可以仰息刺其腰尻之解兩胂之上是腰俞以月死生為痏數髮針立已左刺右右刺左邪客於足太陽之絡令人拘攣背急引脅而痛內引心而痛刺之從項始數脊椎俠脊疾按之應手而痛刺入傍三痏立已邪客於足少陽之絡令人留於樞中痛髀不得氣一作髀不可舉刺樞中以毫針寒則留針以月死生為痏數立已諸經刺之所過者不病則繆刺之耳聾刺手陽明不已刺其過脈出耳前者齒齲刺手陽明立已不已刺其脈入齒中者立已邪客於五臟之間其病也脈引而痛時來時止視其病脈繆刺之於手足爪甲上視其脈出其血間日一刺一刺不已五刺已繆傳引上齒齒唇寒素多一痛字視其手背脈血者去之刺足陽明中指爪甲上一痏手大指次指爪甲上各一痏立已左取右右取左嗌中腫不能內唾不能出唾者繆刺然骨之前出血立已左取右右取左自溢腫至此二十九字素問王冰注原在邪客足少陰絡之下今移在此邪客於手足少陰太陰一作陽足陽明之絡此五絡者皆會於耳中上絡左角五絡俱竭令人身脈皆動而形無知也其狀若尸或曰尸厥刺足大指內側爪甲上去端如韭葉後刺足心後刺足中指爪甲上各有一痏後刺手大指內側爪甲上端如韭葉素問又云後刺手心主者非也後刺手少陰鋭骨之端各一痏立已不已以竹筒吹其兩耳中剔其左角之發方寸燔治飲以美酒一杯不能飲者灌之立已凡刺之數先視其經脈切而循之審其虛實而調之不調者經刺之有痛而經不病者繆刺之目視其皮部有血絡者盡取之此繆刺之數也針道第四夫針之要易陳而難入粗守形上守神神乎神客在門未睹其病惡知其原刺之微在速遲粗守關上守機機之不動不離其空空中之機清靜以微其來不可逢其往不可追知機道者不可挂以發不知機者叩之不發知其往來要與之期粗之暗乎妙哉上獨有之也往者為逆來者為順明知逆順正行無問迎而奪之惡得無虛追而濟之惡得無實迎而隨之以意和之針道畢矣凡用針者虛則實之滿則泄之菀陳則除之邪勝則虛之大要曰徐而疾則實疾而徐則虛言其實與虛若有若無察後與先若存若亡為虛為實若得若失虛實之要九針最妙補瀉之時以針為之瀉曰迎之迎之意必持而內之放而出之排揚出針疾氣得泄按而引針是謂內溫血不得散氣不得出補曰隨之隨之意若忘之若行若按如蚊虻止如留如環去如絶弦令左屬右其氣故止外門已閉中氣乃實必無留血急取誅之持針之道堅者為實素問注作寶正指直刺無針左右神在秋毫屬意病者審視血脈刺之無殆方刺之時心在懸陽及與兩衡一作沖神屬勿去知病存亡取血脈者在俞橫居視之獨滿切之獨堅夫氣之在脈也邪氣在上濁氣在中清氣在下故針陷脈則邪氣出針中脈則濁氣出針太深則邪反沉病益甚故曰皮肉筋脈各有所處病各有所舍針各有所宜各不同形各以任其所宜無實實虛虛損不足益有餘是為重病病益甚取五脈者死取三脈者恇奪陰者厥奪陽者狂針害畢矣知其所苦鬲有上下知其氣之所先得其道布而涿之太素作希而疏之稍深而留之故能徐入之大熱在上者推而下之從下上者引而去之視前痛者常先取之大寒在外留而補之入於中者從合瀉之針所不為灸之所宜上氣不足推而揚之下氣不足積而從之陰陽皆虛火自當之厥而寒甚骨廉陷下寒過於膝下陵三里陰絡所過得之留止寒入於中推而行之經陷下者即火當之結絡堅緊火之所治不知其苦兩蹺之下男陽女陰良工所禁針論畢矣凡刺虛者實之滿者泄之此皆衆工之所共知也若夫法天則地隨應而動和之若響隨之若影道無鬼神獨來獨往凡刺之真必先治神五臟已定九候已明後乃存針衆脈所素作不見衆凶所素作弗聞外內相得無以形先可玩往來乃施於人虛實之要五虛勿近五實勿遠至其當發間不容瞚手動若務針耀而勻靜意視義觀適之變是謂冥冥莫知其形見其烏烏見其稷稷從見其飛不知其誰伏如橫弩起若發機刺虛者須其實刺實者須其虛經氣已至慎守勿失深淺在志遠近若一如臨深淵手如握虎神無營於衆物黃帝問曰願聞禁數岐伯對曰臟有要害不可不察肝生於左肺藏於右心部於表腎治於裡脾為之使胃為之市膈肓之上中有父母七節之傍中有志心素作小心順之有福逆之有咎瀉必用方太素作員切而轉之其氣乃行疾入徐出邪氣乃出伸而迎之搖大其穴氣出乃疾補必用員太素作方外引其皮令當其門左引其樞右推其膚微旋而徐推之必端以正安以靜堅心無解欲微以留氣下而疾出之推其皮蓋其外門真氣乃存用針之要無忘養神瀉者以氣方盛以月方滿以日方溫以身方定以息方吸而內針乃復候其方吸而轉針乃復候其方呼而徐引針補者行也行者移也刺必中其滎復以吸排針也必知形之肥瘦營衛血氣之衰盛血氣者人之神不可不謹養形乎形目瞑瞑捫其所痛素作問其所痛索之於經慧然在前按之弗得不知其情故曰形神乎神耳不聞目明心開而志光慧然獨覺口弗能言俱視獨見象若昏昭然獨明若風吹雲故曰神三部九候為之原九針之論不必存凡刺之而氣不至無問其數刺之而氣至乃去之勿復針針各有所宜各不同形各任其所為刺之要氣至而效效之信若風吹雲昭然於天凡刺之道畢矣節之交凡三百六十五會知其要者一言而終不知其要者流散無窮所言節者神氣之所遊行出入也非皮肉筋骨也睹其色察其目知其散復一其形聽其動靜知其邪正右主推之左持而御之氣至而去之凡將用針必先視脈氣之劇易乃可以治病五臟之氣已絶於內而用針者反實其外是謂重竭重竭必死其死也靜治之者輒反其氣取腑與膺五臟之氣已絶於外而用針者反實其內是謂逆厥逆厥則必死其死也躁治之者反取四末刺之害中而不去則精泄害中而去則致氣精泄則病甚而恇致氣則生為癰瘍刺針必肅刺腫搖針經刺勿搖此刺之道也刺諸熱者如手探湯刺寒清者如人不欲行刺虛者刺其去刺實者刺其來刺上關者呿不能欠刺下關者欠不能呿刺犢鼻者屈不能伸刺內關者伸不能屈病高而內者取之陰陵泉病高而外者取之陽陵泉陰有陽疾者取之下陵三里正往無殆下氣乃止不下復始矣針道終始第五凡刺之道畢於終始明知終始五臟為紀陰陽定矣陰者主臟陽者主腑陽受氣於四肢陰受氣於五臟故瀉者迎之補者隨之知迎知隨氣可令和和氣之方必通陰陽五臟為陰六腑為陽謹奉天道請言終始終始者經脈為紀持其脈口人迎以知陰陽有餘不足平與不平天道畢矣所謂平人者不病也不病者脈口人迎應四時也上下相應而俱往來也六經之脈不結動也本末相遇寒溫相守司形肉血氣必相稱也是謂平人若少氣者脈口人迎俱少而不稱尺寸如是者則陰陽俱不足補陽則陰竭瀉陰則陽脫如是者可將以甘藥不可飲以至劑如此者弗灸不已者因而瀉之則五臟氣壞矣人迎一盛病在足少陽一盛而躁在手少陽人迎二盛病在足太陽二盛而躁在手太陽人迎三盛病在足陽明三盛而躁在手陽明人迎四盛且大且數名曰溢陽溢陽為外格脈口一盛病在足厥陰一盛而躁在手心主脈口二盛病在足少陰二盛而躁在手少陰脈口三盛在足太陰三盛而躁在手太陰脈口四盛且大且數名曰溢陰溢陰為內關不通者死不治人迎與太陰脈口俱盛四倍以上名曰關格關格者與之短期人迎一盛瀉足少陽而補足厥陰二瀉一補日一取之必切而驗之疏取之上氣和乃止人迎二盛瀉足太陽而補足少陰二瀉一補二日一取之必切而驗之疏取之上氣和乃止人迎三盛瀉足陽明而補足太陰二瀉一補日一取之必切而驗之疏取之上氣和乃止脈口一盛瀉足厥陰而補足少陽二補一瀉日一取之必切而驗之氣和乃止疏取之脈口二盛瀉足少陰而補足太陽二瀉一補二日一取之必切而驗之氣和乃止疏取之脈口三盛瀉足太陰而補足陽明二補一瀉日二取之必切而驗之氣和乃止疏取之所以日二取之者太陰主胃大富於谷故可日二取之也人迎脈口俱盛四倍靈樞作三倍以上名曰陰陽俱溢如是者不開則血脈閉塞氣無所行流淫於中五臟內傷如此者因而灸之則變易為他病矣凡刺之道氣和乃止補陰瀉陽音聲益彰耳目聰明反此者血氣不行所謂氣至而有效者瀉則益虛虛者脈大如其故而不堅也大如故而益堅者適雖言快病未去也補則益實實者脈大如其故而益堅也大如故而不堅者適雖言快病未去也故補則實瀉則虛病雖不隨針減病必衰去矣必先通十二經之所生病而後可傳於終始故陰陽不相移虛實不相頃取之其經凡刺之屬三刺至穀氣邪僻妄合陰陽移居逆順相反浮沉異處四時不相得稽留淫泆須針而去故一刺陽邪出再刺陰邪出三刺則穀氣至而止所謂穀氣至者已補而實已瀉而虛故知穀氣至也邪氣獨去者陰與陽未能調而病知愈也故曰補則實瀉則虛病雖不隨針減病必衰去矣此文似解前第三篇中陽盛而陰虛先補其陰後瀉其陽而和之陰盛而陽虛先補其陽後瀉其陰而和之三脈動於足大指之間必審其虛實虛而瀉之是謂重虛重虛病益甚凡刺此者以指按之脈動而實且疾者則瀉之虛而徐者則補之反此者病益甚三脈動一作重於大指者謂陽明在上厥陰在中少陰在下膺腧中膺背腧中背肩髆虛者取之上重舌刺舌柱以鈹針也手屈而不伸者其病在筋伸而不可屈者其病在骨在骨守骨在筋守筋補須一方實深取之稀按其痏以極出其邪氣一方虛淺刺之以養其脈疾按其痏無使邪氣得入邪氣之來也緊而疾穀氣之來也徐而和脈實者深刺之以泄其氣脈虛者淺刺之使精氣無得出以養其脈獨出其邪氣刺諸痛者深刺之諸痛者其脈皆實從腰以上者手太陰陽明主之從腰以下者足太陰陽明主之病在下者高取之病在上者下取之病在頭者取之足病在腰者取之膕病生於頭者頭重生於手者臂重生於足者足重治病者先刺其病所從生者也春氣在毫毛夏氣在皮膚秋氣在分肉冬氣在筋骨刺此病者各以其時為齊刺肥人者以秋冬為之齊刺瘦人者以春夏為之齊刺之痛者陰也痛而以手按之不得者亦陰也深刺之癢者陽也淺刺之病在上者陽也在下者陰也病先起於陰者先治其陰而後治其陽病先起於陽者先治其陽而後治其陰久病者邪氣入深刺此病者深入而久留之間日復刺之必先調其左右去其血脈刺道畢矣凡刺之法必察其形氣形氣未脫少氣而脈又躁躁厥一作疾字者必為繆刺之散氣可收聚氣可布深居靜處占神往來閉戶塞牖魂魄不散專意一神精氣之分無聞人聲以收其精必一其神令志在針淺而留之微而浮之以移其神氣至乃休男女內外堅拒勿出謹守勿內是謂得氣針道自然逆順第六前系逆順肥瘦文後系根結文黃帝問曰願聞針道自然岐伯對曰用自然者臨深決水不用功力而水可竭也循掘決沖不顧堅密而經可通也此言氣之滑澀血之清濁行之逆順也曰人之黑白肥瘦少長各有數乎曰年質壯大血氣充盛皮膚堅固因加以邪刺此者深而留之此肥人也廣肩腋項肉薄厚皮而黑色唇臨臨然者其血黑以濁其氣澀以遲其貪於取豫刺此者深而留之多益其數曰刺瘦人奈何曰瘦人者皮薄色少肉廉廉然薄唇輕言其血清其氣滑易脫於氣易損於血刺此者淺而疾之曰刺常人奈何曰視其黑白各為調之端正純厚者其血氣和調刺此者無失其常數曰刺壯士真骨者奈何曰刺壯士真骨堅肉緩節驗驗一作監監然此人重則氣澀血濁刺此者深而留之多益其數徑則氣滑血清刺此者淺而疾之也曰刺嬰兒奈何曰嬰兒者其肉脆血少氣弱刺此者以毫針淺刺而疾髮針日再可也曰臨深決水奈何曰血清氣濁疾瀉之則氣竭矣曰循掘決沖奈何曰血濁氣澀疾瀉之則氣可通也曰逆順九體經絡之數此皆布衣匹夫之士也食血者九墟作血食之君身體空虛膚肉軟弱血氣慓悍滑利刺之豈可同乎曰夫膏粱菽藿之味何可同也氣滑則出疾氣澀則出遲氣悍則針小而入淺氣澀則針大而入深深則欲留淺則欲疾故刺布衣者深以留刺王公大人者微以徐此皆因其氣之慓悍滑利者也曰形氣之逆順奈何曰形氣不足病氣有餘是邪勝也急瀉之形氣有餘病氣不足急補之形氣不足病氣不足此陰陽俱不足不可復刺之刺之則重不足重不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絶滅壯者不復矣形氣有餘病氣有餘者此謂陰陽俱有餘也急瀉其邪調其虛實故曰有餘者瀉之不足者補之此之謂也故曰刺不知逆順真邪相搏實而補之則陰陽血氣皆溢腸胃充郭肺肝內脹陰陽相錯虛而瀉之則經脈空虛血氣枯竭腸胃懾闢皮膚薄著毛腠夭焦豫之死期故曰用針之要在於知調調陰與陽精氣乃充合形與氣使神內藏故曰上工平氣中工亂經下工絶氣危生不可不慎也必察其五臟之變化五脈之相應經脈之虛實皮膚之柔粗而後取之也針道外揣縱舍第七黃帝問曰夫九針少則無內大則無外恍惚無窮流溢無極余知其合於天道人事四時之變也余願渾求為一可乎岐伯對曰夫唯道焉非道何可大小淺深離合為一乎哉故遠者司外揣內近者司內揣外是謂陰陽之極天地之蓋曰持針縱舍奈何曰必先明知十二經之本末皮膚之寒熱脈之盛衰滑澀其脈滑而盛者病日進虛而細者久以持大以澀者為痛痹陰陽如一者病難治察其本末上下有熱者病常在其熱已衰者其病亦去矣因持其尺察其肉之堅脆大小滑澀寒熱燥濕因視目之五色以知五臟而決死生視其血脈察其五色以知寒熱痹痛曰持針縱舍余未得其意也曰持針之道欲端以正安以靜先知虛實而行疾徐左手持骨右手循之無與肉裹瀉欲端正補必閉膚轉針導氣邪氣不得淫泆真氣以居曰捍皮開腠理奈何曰因其分肉左別其膚微內而徐端之適神不散邪氣得去也
