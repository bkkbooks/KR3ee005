body:
  text: 卷九大寒內薄骨髓陽逆發頭痛第一頷項痛附黃帝問曰病頭痛數歲不已此何病也岐伯對曰當有所犯大寒內至骨髓骨髓者以腦為主腦逆故令頭痛齒亦痛陽逆頭痛胸滿不得息取人迎厥頭痛面若腫起而煩心取足陽明太陽一作陰厥頭痛脈痛心悲喜泣視頭動脈反盛者乃刺之盡去血後調足厥陰厥頭痛噫九墟作意善忘按之不得取頭面左右動脈後取足太陽一作陰厥頭痛員員而痛靈樞作貞貞頭痛瀉頭上五行行五先取手少陰後取足少陰頭痛項先痛腰脊為應先取天柱後取足太陽厥頭痛痛甚耳前後脈骨一本作湧熱先瀉其血後取足太陽少陰一本亦作陽厥頭痛痛甚耳前後脈湧有血瀉其血後取足少陽真頭痛痛甚腦盡痛手足寒至節死不治頭痛不可取於俞有所擊墜惡血在內若內傷痛痛未已可即刺之不可遠取頭痛不可刺者大痹為惡風日作者可令少愈不可已頭寒痛先取手少陽陽明後取足少陽陽明頷痛刺手陽明與頷之盛脈出血頭項不可俯仰刺足太陽不可顧刺手太陽一雲手陽明頷痛刺足陽明曲周動脈見血立已不已按經刺人迎立已頭痛目窗及天衝風池主之厥頭痛孔最主之厥頭痛面腫起商丘主之寒氣客於五臟六腑發卒心痛胸痹心疝三蟲第二厥心痛與背相引善瘈如從後觸其心身傴僂者腎心痛也先取京骨崑崙髮針立已不已取然谷厥心痛暴泄腹脹滿心痛尤甚者胃心痛也取大都太白厥心痛如錐刺其心心痛甚者脾心痛也取然谷太衝厥心痛色蒼蒼如死狀終日不得太息者肝心痛也取行間太衝厥心痛臥若徒居心痛乃間動行痛益甚色不變者肺心痛也取魚際太淵真心痛手足青至節心痛甚旦發夕死夕發旦死心下一本作痛不可刺者中有盛聚不可取於俞腸中有蟲瘕有蛕蛟不可取以小針心腹痛發作腫聚往來上下行痛有休止腹中熱渴𬌺音涎者是蛕蛟也以手聚按而堅持之無令得移以大針刺之久持之蟲不動乃出針心痛引腰脊欲嘔刺足少陰心痛腹脹澀澀然大便不利取足太陰心痛引背不得息刺足少陰不已取手少陰心痛引少腹滿上下無常處溲便難刺足厥陰心痛但短氣不足以息刺手太陰心腹中卒痛而汗出石門主之心痛有三蟲多𬌺不得反側上脘主之心痛有寒難以俯仰心疝氣衝胃死不知人中脘主之心痛上搶心不欲食支痛引鬲建里主之胸脅背相引痛心下混混嘔吐多唾飲食不下幽門主之脾逆氣寒次急煩心善唾噦噫胸滿激呼胃氣上逆心痛千金作肺脹胃逆太淵主之心膨膨痛千金云煩悶亂少氣不足以息尺澤主之心痛俠白主之卒心中痛瘛瘲互相引肘內廉痛心敖敖然間使主之心痛衄噦嘔血驚恐畏人神氣不足郄門主之心痛卒咳逆尺澤主之出血則已卒心痛汗出大敦主之出血立已胸痹引背時寒間使主之胸痹心痛肩肉麻木天井主之胸痹心痛不得息痛無常處千金云不得反側臨泣主之心疝暴痛取足太陰厥陰盡刺之血絡喉痹舌卷口乾煩心心痛臂表痛靈樞及太素俱作臂內廉痛不可及頭取關衝在手小指次指爪甲去端如韭葉許一云左取右右取左邪在肺五臟六腑受病發咳逆上氣第三邪在肺則病皮膚痛發寒熱上氣喘汗出咳動肩背取之膺中外俞背三椎之傍以手疾按之快然乃刺之取缺盆中以越之黃帝問曰肺之令人咳何也岐伯對曰五臟六腑皆令人咳非獨肺也皮毛者肺之合也皮毛先受邪氣邪氣以從其合其寒飲食入胃從肺脈上至於肺氣則肺寒肺寒則內外合邪因而客之則為肺咳五臟各以其時受病非其時各傳以與之人與天地參故五臟各以治時感於寒則受病也微則為咳甚則為泄為痛乘秋則肺先受邪乘春則肝先受之乘夏則心先受之乘至陰則脾先受之乘冬則腎先受之肺咳之狀咳而喘息有音甚則唾血心咳之狀咳則心痛喉中喝喝素問作吤吤如梗狀甚則咽腫喉痹肝咳之狀咳則胠素問作兩脅下痛甚不可以轉轉則兩脅素問作胠下滿脾咳之狀咳則右胠素問作脅下痛陰陰引肩背甚則咳涎不可以動動則咳劇腎咳之狀咳則腰背相引而痛甚則咳涎五臟久咳乃移於六腑脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出肝咳不已則膽受之膽咳之狀咳嘔膽汁肺咳不已則大腸受之大腸咳之狀咳而遺矢心咳不已則小腸受之小腸咳之狀咳而失氣氣與咳俱失腎咳不已則膀胱受之膀胱咳之狀咳遺尿素問作溺久咳不已則三焦受之三焦咳之狀咳而腹滿不欲飲食此皆聚於胃關於肺使人多涕唾而面浮腫氣逆治臟者治其俞治腑者治其合浮腫者治其經秋傷於濕冬生咳嗽曰九卷言振埃刺外經而去陽病願卒聞之曰陽氣大逆上滿於胸中憤䐜肩息大氣逆上喘喝坐臥病咽噎不得息取之天容其咳上氣窮詘胸痛者取之廉泉取之天容者深無一里里字疑誤取廉泉者血變乃止咳逆上氣魄戶及氣舍主之咳逆上氣噫嘻主之咳逆上氣咽喉鳴喝喘息扶突主之咳逆上氣唾沫天容及行間主之咳逆上氣咽喉壅腫呼吸短氣喘息不通水突主之一本作天突咳逆上氣喘不能言華蓋主之咳逆上氣唾喘短氣不得息口不能言膻中主之咳逆上氣喘不得息嘔吐胸滿不得飲食俞府主之咳逆上氣涎出多唾呼吸喘哮坐臥不安彧中主之胸滿咳逆喘不得息嘔吐煩滿不得飲食神藏主之胸脅榰滿咳逆上氣呼吸多喘濁沫膿血庫房主之咳喘不得坐不得臥呼吸氣素咽不得胸中熱雲門主之胸脅榰滿不得俯仰㿉癰咳逆上氣咽喉喝有聲太谿主之咳逆不止三焦有水氣不能食維道主之咳逆煩悶不得臥胸中滿喘不得息背痛太淵主之咳逆上氣舌乾脅痛心煩肩寒少氣不足以息腹脹喘尺澤主之咳乾嘔滿俠白主之咳上氣喘不得息暴痹內逆肝肺相傳鼻口出血身脹逆息不得臥天府主之悽悽寒嗽吐血逆氣驚心痛手陰郄主之咳而胸滿前谷主之咳面赤熱支溝主之咳喉中鳴咳唾血大鐘主之肝受病及衛氣留積發胸脅滿痛第四邪在肝則病兩脅中痛寒中惡血在內胻節時腫善瘈取行間以引脅下補三里以溫胃中取血脈以散惡血取耳間青脈以去其瘈黃帝問曰衛氣留於脈太素作腹中蓄積不行菀蘊不得常所靈樞下有使人二字榰脅中滿喘呼逆息者何以去之伯高對曰其氣積於胸中者上取之積於腹中者下取之上下皆滿者傍取之積於上者瀉人迎天突喉中積於下者瀉三里與氣街上下皆滿者上下皆取之與季脅之下深一寸重者雞足取之診視其脈大而強急及絕不至者腹皮絞甚者不可刺也氣逆上刺膺中陷者與脅下動脈胸滿嘔無所出口苦舌乾飲食不下膽俞主之胸滿呼吸喝窮詘窘不得息刺人迎入四分不幸殺人胸滿痛璇璣主之胸脅榰滿痛引胸中華蓋主之胸脅榰滿痹痛骨疼飲食不下嘔千金作咳逆氣上煩心紫宮主之胸中滿不得息脅痛骨疼喘逆上氣嘔吐煩心玉堂主之胸脅榰滿鬲塞飲食不下嘔吐食復出中庭主之胸中榰滿痛引膺不得息悶亂煩滿不得飲食靈墟主之胸脅榰滿不得息咳逆乳癰灑淅惡寒神封主之胸脅榰滿鬲逆不通呼吸少氣喘息不得舉臂步廊主之胸脅榰滿喘滿上氣呼吸肩息不知食味氣戶主之喉痹胸中暴逆先取衝脈後取三里雲門皆瀉之胸脅榰滿卻引背痛臥不得轉側胸鄉主之傷憂悁思氣積中脘主之胸滿馬刀臂不得舉淵腋主之大氣不得息息即胸脅中痛實則其身盡寒虛則百節盡縱大包主之胸中暴滿不得眠一云不得喘息輒筋主之胸脅榰滿瘛瘲引臍腹痛短氣煩滿巨闕主之腹中積氣結痛梁門主之傷食脅下滿不能轉展反側目青而嘔期門主之胸脅榰滿勞宮主之多臥善唾胸滿腸鳴三間主之胸滿不得息頭頷腫陽谷主之胸脅脹腸鳴切痛一云胸脅支滿腹中切痛太白主之暴脹胸脅榰滿足寒大便難面唇白時嘔血太衝主之胸脅榰滿惡聞人聲與木音巨虛上廉主之胸脅榰滿寒如風吹狀俠谿主之胸滿善太息千金作胸膂急胸中膨膨然丘墟主之胸脅榰滿頭痛項內寒外丘主之脅下榰滿嘔吐逆陽陵泉主之邪在心膽及諸臟腑發悲恐太息口苦不樂及驚第五黃帝問曰有口苦取陽陵泉口苦者病名為何何以得之岐伯對曰病名曰膽癉夫膽者中精之腑素問無此句肝者中之將也取決於膽咽為之使此人者數謀慮不決膽素問下有虛字氣上溢而口為之苦治之以膽募俞在陰陽十二官相使中善怒而欲食言益少刺足太陰怒而多言刺足少陰太素作少陽短氣心痹悲怒逆氣怒狂易魚際主之心痛善悲厥逆懸心如飢之狀心淡淡而驚大陵及間使主之心淡淡而善驚恐心悲內關主之千金作曲澤善驚悲不樂厥脛足下熱面盡熱渴行間主之脾虛令人病寒不樂好太息商丘主之色蒼蒼然太息如將死狀振寒搜白便難中封主之心如懸哀而亂善恐嗌內腫心惕惕恐如人將捕之多𬌺出喘少氣吸吸不足以息然谷主之驚善悲不樂如墮墜汗不出面塵黑病飲不欲食照海主之膽眩寒厥手臂痛善驚忘言面赤泣出腋門主之大驚乳痛梁丘主之邪在心則病心痛善悲時眩僕視有餘不足而調其俞膽病者善太息口苦嘔宿水靈樞作宿汁心下淡淡善恐如人將捕之嗌中吤吤然數咳唾候在足少陽之本末亦視其脈之陷下者灸之其寒熱者取陽陵泉邪在膽逆在胃膽液泄則口苦胃氣逆則嘔苦汁故曰嘔膽取三里以下胃逆則刺足少陽血絡以閉膽逆調其虛實以去其邪脾受病發四肢不用第六黃帝問曰脾病而四肢不用何也岐伯對曰四肢者皆稟氣於胃而不得至經必因脾乃得稟今脾病不能為胃行其津液四肢不得稟水穀氣氣日以衰脈道不通筋骨肌肉皆無氣以生故不用焉曰脾不主時何也曰脾者土也土者中央常以四時長四臟各十八日寄治不獨主時脾者土臟常著胃上之精也土者生萬物而法天地故上下至頭足不得主時曰脾與胃以募相連耳而能故為之行津液何也曰足太陰者三陰也其脈貫胃屬脾絡嗌故太陰為之行氣於三陰陽明者表也五臟六腑之海也亦為之行氣於三陽臟腑各因其經而受氣於陽明故為胃行津液四肢不得稟水穀氣氣日以衰陰道不利筋骨肌肉皆無氣以生故不用焉身重骨酸不相知太白主之脾胃大腸受病發腹脹滿腸中鳴短氣第七邪在脾胃則病肌肉痛陽氣有餘陰氣不足則熱中善飢陽氣不足陰氣有餘則寒中腸鳴腹痛陰陽俱有餘若俱不足則有寒有熱皆調其三里飲食不下鬲塞不通邪在胃脘在上脘則抑而下之在下脘則散而去之胃病者腹䐜脹胃脘當心而痛上榰兩脅鬲咽不通食飲不下取三里腹中雷一本作常鳴氣常沖胸喘不能久立邪在大腸也刺肓之原巨虛上廉三里腹中不便取三里盛則瀉之虛則補之大腸病者腸中切痛而鳴濯濯冬日重感於寒當臍而痛不能久立與胃同候取巨虛上廉腹滿大便不利腹大上走胸嗌靈樞下有喘息二字喝喝然取足少陽腹滿食不化響響然不得大便取足太陽腹痛刺臍左右動脈已刺按之立已不已刺氣街按之立已腹暴痛滿按之不下取太陽經絡血者則已又刺少陰一本作少陽俞去脊椎三寸傍五用員利針刺已如食頃久立已必視其經之過於陽者數刺之腹滿不能食刺脊中腹中氣脹引脊痛食飲而身羸瘦名曰食㑊先取脾俞後取季脅大腸轉氣按之如覆杯熱引胃痛脾氣寒四肢不嗜食脾俞主之胃中寒脹食多身體羸瘦腹中滿而鳴腹䐜風厥胸脅榰滿嘔吐脊急痛筋攣食不下胃俞主之頭痛食不下腸鳴臚脹欲嘔時泄三焦俞主之腹滿臚脹大便泄意舍主之臚脹水腫食飲不下多寒千金作惡寒胃倉主之寒中傷飽食飲不化五臟䐜滿脹心腹胸脅榰滿脹則生百病上脘主之腹脹不通寒中傷飽食飲不化中脘主之食飲不化入腹還出下脘主之腸中常鳴時上衝心灸臍中心滿氣逆陰都主之大腸寒中千金作疝大便乾腹中切痛肓俞主之腹中盡痛外陵主之腸鳴相逐不可傾倒承滿主之腹脹善滿積氣關門主之食飲不下腹中雷鳴大腸不節小便赤黃陽綱主之腹脹腸鳴氣上衝胸不能久立腹中痛濯濯冬日重感於寒則泄當臍而痛腸胃間遊氣切痛食不化不嗜食身腫一本作重俠臍急天樞主之腹中有大熱不安腹有大氣如相俠暴腹脹滿癃淫濼氣衝主之腹滿痛不得息正臥屈一膝伸一股並刺氣衝針上入三寸氣至瀉之寒氣腹滿癃淫濼身熱腹中積聚疼痛衝門主之腹中腸鳴盈盈然食不化脅痛不得臥煩熱中不嗜食胸脅榰滿喘息而沖鬲嘔心痛及傷飽身黃疾骨羸瘦章門主之腸鳴而痛溫留主之腸腹時寒腰痛不得臥手三里主之腹中有寒氣隱白主之腹滿響響然不便心下有寒痛商丘主之腹中熱若寒腹善鳴強欠時內痛心悲氣逆腹滿漏谷主之已刺外踝上氣不止腹脹而氣快然引肘脅下皆主之腹中氣脹嗑嗑不嗜食脅下滿陰陵泉主之喘少氣不足以息腹滿大便難時上走胸中鳴脹滿口舌中吸吸善驚咽中痛不可納食善怒恐不樂大鐘主之嗌乾腹瘈痛坐臥目䀮䀮善怒多言復留主之寒腹脹滿厲兌主之腹大不嗜食衝陽主之厥氣上榰太谿主之大腹有熱腸鳴腹滿俠臍痛食不化喘不能久立巨虛上廉主之腸中寒脹滿善噫聞食臭胃氣不足腸鳴腹痛泄食不化心下脹三里主之腹滿胃中有熱不嗜食懸鐘主之大腸實則腰背痛痹寒轉筋頭眩痛虛則鼻衄癲疾腰痛濈濈然汗出令人慾食而走承筋主之取腳下三折橫視盛者出血腎小腸受病發腹脹腰痛引背少腹控睪第八邪在腎則病骨痛陰痹陰痹者按之而不得腹脹腰痛大便難肩背頸項強痛時眩取之湧泉崑崙視有血者盡取之少腹控睪引腰脊上衝心肺邪在小腸也小腸者連睪系屬於脊貫肝肺絡心系氣盛則厥逆上衝腸胃熏肝肺散於胸結於臍故取肓原以散之刺太陰以予之取厥陰以下之取巨虛下廉以去之按其所過之經以調之小腸病者少腹痛腰脊控睪而痛時窘之後耳前熱若寒甚若獨肩上熱甚及手小指次指間熱若脈陷者此其候也黃帝問曰有病厥者診右脈沉堅左手浮遲不知病生安在岐伯對曰冬診之右脈固當沉堅此應四時左脈浮遲此逆四時左當主病診左在腎頗在肺當腰痛曰何以言之曰少陰脈貫腎絡肺今得肺脈腎為之病故為腰痛足太陽脈令人腰痛引項脊尻背如腫狀刺其郄中太陽正經去血春無見血少陽令人腰痛如以針刺其皮中循循然不可俯仰不可以左右顧刺少陽盛骨之端出血盛骨在膝外廉之骨獨起者夏無見血陽明令人腰痛不可以顧顧如有見者善悲刺陽明於胻前三痏上下和之出血秋無見血足少陰令人腰痛痛引脊內廉刺足少陰於內踝上二痏春無見血若出血太多虛不可復厥陰之脈令人腰痛腰中如張弓弩弦刺厥陰之脈在腨踵魚腹之外循循累累然乃刺之其病令人善言默默然不慧刺之三痏解脈令人腰痛痛引肩目䀮䀮然時遺溲刺解脈在膝筋分肉間在郄外廉之橫脈出血血變而止同陰之脈令人腰痛腰如小錘居其中怫然腫剌同陰之脈在外踝上絕骨之端為二痏解脈令人腰痛如裂素問作引帶常如折腰之狀善怒剌解脈在郄中結絡如黍米刺之血射以黑見赤血乃已全元起云有兩解脈病原各異疑誤未詳陽維之脈令人腰痛痛上怫然腫刺陽維之脈脈與太陽合腨下間去地一尺所衡絡之脈令人腰痛得俯不得仰仰則恐僕得之舉重傷腰衡絡絕傷惡血歸之刺之在郄陽之筋間上郄數寸衡居為二痏出血會陰之脈令人腰痛痛上濈濈然汗出汗乾令人慾飲飲已欲走刺直陽之脈上三痏在蹺上郄下三所橫居視其盛者出血素問濈濈然作漯漯然三所作五寸飛揚之脈令人腰痛痛上怫怫然甚則悲以恐刺飛揚之脈在內踝上二寸素問作五寸少陰之前與陰維之會昌陽之脈令人腰痛痛引膺目䀮䀮然甚則反折舌卷不能言刺內筋為二痏在內踝上大筋後上踝一寸所素問大筋作太陰散脈令人腰痛而熱熱甚而煩腰下如有橫木居其中甚則遺溲刺散脈在膝前骨肉分間絡外廉束脈為三痏肉裡之脈令人腰痛不可以咳咳則筋攣刺肉裡之脈為二痏在太陽之外少陽絕骨之端腰痛俠脊而痛至頭几几然目䀮䀮然欲僵仆刺足太陽郄中出血腰痛引少腹控䏚不可以仰刺尻交者兩踝胂上以月死生為痏數髮針立已素問云左取右右取左腰痛上寒取足太陽陽明痛上熱取足厥陰不可以俯仰取足少陽中熱而喘取足少陰郄中血絡腰痛上寒實則脊急強長強主之少腹痛控睪引腰脊疝痛上衝心腰脊強溺黃赤口乾小腸俞主之腰脊痛強引背少腹俯仰難不得仰息腳痿重尻不舉溺赤腰以下至足清不仁不可以久坐膀胱俞主之腰痛不可以俯仰中膂內俞主之腰足痛而清善偃睪跳拳上窌主之腰痛怏怏不可以俯仰腰以下至足不仁入脊腰背寒次窌主之先取缺盆後取尾骶與八窌腰痛大便難飧泄腰尻中寒中窌主之腰痛脊急脅中滿少腹堅急志室主之腰脊痛惡風少腹滿堅癃閉下重不得小便胞肓主之腰痛骶寒俯仰急難陰痛下重不得小便秩邊主之腰痛控睪小腹及股卒俯不得仰刺氣街腰痛不得轉側章門主之腰痛不可以久立俯仰京門及行間主之腰痛少腹痛下窌主之腎腰痛不可俯仰陰陵泉主之腰脊相引如解腰痛少腹滿小便不利如癃狀羸瘦意恐懼氣不足腹中怏怏太衝主之腰痛少腹痛陰包主之腰痛大便難湧泉主之腰脊相引如解實則閉癃悽悽腰脊痛宛轉目循循嗜臥口中熱虛則腰痛寒厥煩心悶大鐘主之腰痛引脊內廉復留主之春無見血若太多虛不可復是前足少陰痛也腰痛不能舉足少坐若下車躓地脛中矯矯然申脈主之腰痛如小錘居其中怫然腫痛不可以咳咳則筋縮急諸節痛上下無常寒熱陽輔主之腰痛不可舉足跟中踝後痛腳痿僕參主之腰痛俠脊至頭𠘧𠘧然目䀮䀮委中主之是前刺足太陽郄中出血者腰痛得俯不得仰仰則恐僕得之舉重惡血歸之殷門主之是前衡絡之脈腰痛者腰脊痛尻脊股臀陰寒大痛虛則血動實則並熱痛痔痛尻脽中腫大便直出承扶主之三焦膀胱受病發少腹腫不得小便第九少腹腫痛不得小便邪在三焦約取之足太陽大絡視其結絡脈與厥陰小結絡而血者腫上及胃脘取三里三焦病者腹脹氣滿少腹尤甚堅不得小便窘急溢則為水留則為脹候在足太陽之外大絡絡在太陽少陽之間亦見於脈取委中膀胱病者少腹偏腫而痛以手按之則欲小便而不得眉一本作肩上熱若脈陷及足小指外側及脛踝後皆熱者取委中病在少腹痛不得大小便病名曰疝得寒則少腹脹兩股間冷刺腰股間刺而多之盡炅病已少腹滿大上走胸至心索索然身時寒熱小便不利取足厥陰胞轉不得溺少腹滿關元主之小便難水脹滿出少轉胞不得溺曲骨主之少腹脹急小便不利厥氣上頭巔漏谷主之溺難痛白濁卒疝少腹腫咳逆嘔吐卒陰跳腰痛不可以俯仰面黑熱腹中䐜滿身熱厥痛行間主之少腹中滿熱閉不得溺足五里主之少腹中滿一本作痛小便不利湧泉主之筋急身熱少腹堅腫時滿小便難尻股寒髀樞痛引季脅內控八窌委中主之陰胞有寒小便不利承扶主之三焦約內閉發不得大小便第十內閉不得溲刺足少陰太陽與骶上以長針氣逆取其太陰陽明厥甚取太陰陽明動者之經三焦約大小便不通水道主之大便難中渚及太白主之大便難大鐘主之足厥陰脈動喜怒不時發㿗疝遺溺癃第十一黃帝問曰刺節言去衣者刺關節之支絡願聞其詳岐伯對曰腰脊者人之關節股胻者人之趨翔莖睪者身中之機陰津之候津液之道路也故飲食不節喜怒不時津液內流而下溢於睪水道不通炅不休息俯仰不便趨翔不能榮然有水不上不下䤵石所取形不可匿裳不可蔽名曰去衣曰有癃者一日數十溲此不足也身熱如炭頸膺如格人迎躁盛喘息氣逆此有餘也素問下有陽氣大盛於外一句陰氣不足則太陰脈細如髮者此不足者也其病安在曰病在太陰其盛在胃頗在肺病名曰厥死不治此得五有餘二不足曰何謂五有餘二不足曰所謂五有餘者病氣之有餘也二不足者亦病氣之不足也今外得五有餘內得二不足此其不表不里亦死證明矣狐疝驚悸少氣巨闕主之陰疝引睪陰交主之少腹痛溺難陰下縱橫骨主之少腹疝臥善驚氣海主之暴疝少腹大熱關元主之陰疝氣疝天樞主之㿗疝大巨及地機中郄主之陰疝痿莖中痛兩丸騫臥不可仰臥刺氣街主之陰疝衝門主之男子陰疝兩丸上下小腹痛五樞主之陰股內痛氣癰狐疝走上下引少腹痛不可俯仰上下商丘主之狐疝太衝主之陰跳遺溺小便難而痛陰上下入腹中寒疝陰挺出偏大腫腹臍痛腹中悒悒不樂大敦主之腹痛上搶心心下滿癃莖中痛怒瞋不欲視泣出長太息行間主之癲疝陰暴痛千金㿗疝陰暴痛痿厥身體不仁中封主之疝癃臍少腹引痛腰中痛中封主之氣痛癃小便黃氣滿塞虛則遺溺身時寒熱吐逆溺難腹滿石門主之氣癃㿗疝陰急股樞腨內廉痛交信主之陰跳腰痛實則挺長寒熱攣陰暴痛遺溺偏大虛則暴癢氣逆腫睪卒疝小便不利如癃狀數噫恐悸氣不足腹中悒悒少腹痛嗌中有熱如有瘜肉狀如著欲出背攣不可俯仰蠡溝主之丈夫㿗疝陰跳痛引纂中不得溺腹中支脅下榰滿閉癃陰痿後時泄四肢不收實則身疼痛汗不出目䀮䀮然無所見怒欲殺人暴痛引髕下節時有熱氣筋攣膝痛不可屈伸狂如新發衄不食喘呼少腹痛引噫足厥痛湧泉主之癃疝然谷主之卒疝少腹痛照海主之病在左取右右取左立已疝四肢淫濼身悶至陰主之遺溺關門及神門委中主之胸滿膨膨然實則癃閉腋下腫虛則遺溺腳急兢兢然筋急痛不得大小便腰痛引腹不得俯仰委陽主之癃中窌主之氣癃溺黃千金此四字前有寒熱不節腎病不可以俯仰關元及陰陵泉主之氣癃小便黃氣滿虛則遺溺石門主之癃遺溺鼠蹊痛小便難而白期門主之小便難竅中熱實則腹皮痛虛則癢瘙會陰主之小腸有熱溺赤黃中脘主之溺黃下廉主之小便黃赤完骨主之小便黃腸鳴相逐上廉主之勞癉小便赤難前谷主之足太陽脈動發下部痔脫肛第十二痔痛攢竹主之痔會陰主之凡痔與陰相通者死陰中諸病前後相引痛不得大小便皆主之痔骨蝕商丘主之痔篡痛飛揚委中及承扶主之痔篡痛承筋主之脫肛下刺氣街主之
