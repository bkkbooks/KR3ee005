body:
  text: 卷六八正八虛八風大論第一黃帝問曰歲之所以皆同病者何氣使然少師對曰此八正之候也候此者常以冬至之日風從南方來者名曰虛風賊傷人者也其以夜半至者萬民皆臥而不犯故其歲民少病其以晝至者萬民懈惰而皆中於邪風故民多病虛邪入客於骨而不發於外至其立春陽氣大發腠理開有因立春之日風從西方來萬民皆中虛風此兩邪相搏經氣結代故諸逢其風而遇其雨者名曰遇歲露焉因歲之和而少賊風者民少病而少死歲多賊風邪氣寒溫不和則民多病而死矣曰虛邪之風其所貴賤何如候之奈何曰正月朔日風從西方來而大名曰白骨將國有殃人多死亡正月朔日平旦西北風行民病多十有三也正月朔日日中北風夏民多死一作多病者正月朔日平旦北風春民多死者正月朔日夕時北風秋民多死者正月朔日天時和溫不風民無病大寒疾風民多病二月醜不風民多心腹病三月戌不溫民多寒熱病四月巳不暑民多疸病十月申不寒民多暴死諸所謂風者髮屋拔樹揚沙石起毫毛發腠理者也風從其沖後來者名曰虛風賊傷人者也主殺害必謹候虛風而謹避之避邪之道如避矢石然後邪弗能害也風從南方來名曰大弱風其傷人也內舍於心外在於脈其氣主為熱風從西南方來名曰謀風其傷人也內舍於脾外在於肌肉其氣主為弱風從西方來名曰剛風其傷人也內舍於肺外在於皮膚其氣主為燥風從西北方來名曰折風其傷人也內舍於小腸外在於手太陽之脈脈絶則泄脈閉則結不通善暴死風從北方來名曰大剛風其傷人也內舍於腎外在於骨與肩背之膂筋其氣主為寒風從東北方來名曰凶風其傷人也內舍於大腸外在於兩脅腋骨下及肢節風從東方來名曰嬰兒風其傷人也內舍於肝外在於筋紐其氣主為濕風從東南方來名曰弱風其傷人也內舍於胃外在於肌其氣主為體重凡此八風者皆從其虛之鄉來乃能病人三虛相搏則為暴病卒死兩虛一實則為淋露寒熱犯其雨濕之地則為痿故聖人避邪如避矢石其三虛偏中於邪風則為擊僕偏枯矣曰四時八風之中人也因有寒暑寒則皮膚急腠理閉暑則皮膚緩腠理開賊風邪氣因得以入乎將必須八正風邪乃能傷人乎曰賊風邪氣之中人也不得以時然必因其開也其入深其內亟一作極也疾其病人也卒暴因其閉也其入淺以留其病人也徐以遲曰其有寒溫和適腠理不開然有卒病者其故何也曰人雖平居其腠理開閉緩急固常有時也夫人與天地相參與日月相應故月滿則海水西盛人血氣積肌肉充皮膚致毛髮堅腠理郤䐃垢著當是之時雖遇賊風其入淺亦不深至其月郭空則海水東盛人血氣虛其衛氣去形獨居肌肉減皮膚緩腠理開毛髮薄䐃垢澤當是之時遇賊風其入深其病人卒暴曰人有卒然暴死者何邪使然曰得三虛者其死疾得三實者邪不能傷也乘年之衰逢月之空失時之和人氣乏少因為賊風邪氣所傷是謂三虛故論不知三虛工反為粗若逢年之盛遇月之滿得時之和雖有賊風邪氣不能傷也逆順病本末方宜形志大論第二黃帝問曰治民治身可得聞乎岐伯對曰治民與自治治彼與治此治小與治大治國與治家未有逆而能治者夫唯順而已矣故入國問其俗臨病人問所便曰便病奈何曰中熱消疸則便寒寒中之屬則便熱胃中熱則消穀令人懸心善飢臍以上皮熱腸中熱則出黃如糜色臍以下皮寒胃中寒則䐜脹腸中寒則腸鳴飧泄胃中寒腸中熱則脹且泄胃中熱腸中寒則疾飢少腹痛脹曰胃欲寒飲腸欲熱飲兩者相逆治之奈何曰春夏先治其標後治其本秋冬先治其本後治其標曰便其相逆者奈何曰便此者食飲衣服欲適寒溫寒無悽愴暑無出汗食飲者熱無灼灼寒無滄滄寒溫中適故氣搏持乃不致邪僻先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本先病而後生熱者治其本先病而後生中滿者治其標先病而後泄者治其本先泄而後生他病者治其本必先調之乃治其他病先病而後中滿者治其標先中滿而後煩心者治其本人有客氣同同一作固氣小大不利治其標小大便利治其本病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本謹察間甚而調之間者並行甚者獨行小大不利而後生他病者治其本東方濱海傍水其民食魚嗜咸魚者使人熱中咸者勝血其民皆黑色疏理其病多壅腫其治宜砭石西方水土剛強其民華食而脂肥故邪不能傷其形體其病生於內其治宜毒藥北方風寒冰冽其民樂野處而乳食臟寒生滿病其治宜灸焫南方其地下水土弱霧露之所聚也其民嗜酸而食臊故致理而赤色其病攣痹其治宜微針中央其地平以濕天地所生物者衆其民食雜而不勞故其病多痿厥寒熱其治宜導引按蹺故聖人離合以治各得其宜形樂志苦病生於脈治之以灸刺形苦志樂病生於筋治之以尉引形樂志樂病生於肉治之以針石形苦志苦病生於困竭一作咽喝治之以甘藥形數驚恐經絡不通病生於不仁治之以按摩醪醴是謂五形故志曰刺陽明出血氣刺太陽出血惡氣刺少陽出氣惡血刺太陰出氣惡血刺少陰出血惡血刺厥陰出血惡氣五臟六腑虛實大論第三黃帝問曰刺法言有餘瀉之不足補之何謂也岐伯對曰神有有餘有不足氣有有餘有不足血有有餘有不足形有有餘有不足志有有餘有不足心藏神肺藏氣肝藏血脾藏肉腎藏志志意通達內連骨髓而成形五臟之道皆出於經渠以行血氣血氣不和百病乃變化而生故守經渠焉神有餘則笑不休不足則憂素問作悲王冰曰作憂者誤血氣未並五臟安定邪客於形淒厥素問作灑淅起於毫毛未入於經絡故命曰神之微神有餘則瀉其小絡之血出血勿之深斥無中其大經神氣乃平神不足者視其虛絡切而致之刺而和之無出其血無泄其氣以通其經神氣乃平曰刺微奈何曰按摩勿釋著針勿斥移氣於足素問作不足神氣乃得復氣有餘則喘咳上氣不足則息利少氣血氣未並五臟安定皮膚微病命曰白氣微泄有餘則瀉其經渠無傷其經無出其血無泄其氣不足則補其經渠無出其氣曰刺微奈何曰按摩勿釋出針視之曰故將深之適人必革精氣自伏邪氣亂散無所休息氣泄腠理真氣乃相得血有餘則怒不足則慧素問作恐血氣未並五臟安定孫絡外溢則絡有留血有餘則刺其盛經出其血不足則視其虛內針其脈中久留之血至素問作而視脈大疾出其針無令血泄曰刺留奈何曰視其血絡刺出其血無令惡血得入於經以成其病形有餘則腹脹涇溲不利不足則四肢不用血氣未並五臟安定肌肉蠕一作溢動名曰微風有餘則瀉其陽經不足則補其陽絡曰刺微奈何曰取分肉間無中其經無傷其絡衛氣得復邪氣乃索志有餘則腹脹飧泄不足則厥血氣未並五臟安定骨節有傷有餘則瀉然筋血者出其血不足則補其復溜曰剌未並奈何曰即取之無中其經以去其邪乃能立虛曰虛實之形不知其何以生曰血氣已並陰陽相頃氣亂於衛血逆於經血氣離居一實一虛血並於陰氣並於陽故為驚狂血並於陽氣並於陰乃為炅中血並於上氣並於下心煩悶善怒血並於下氣並於上亂而喜忘素作善忘曰血並於陰氣並於陽如是血氣離居何者為實何者為虛曰血氣者喜溫而惡寒寒則泣不流溫則消而去之是故氣之所併為血虛血之所併為氣虛曰人之所有者血與氣耳乃言血併為虛氣併為虛是無實乎曰有者為實無者為虛故氣並則無血血並則無氣今血與氣相失故為虛焉絡之與孫脈俱注一作輸於經血與氣並則為實焉血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死曰實者何道從來虛者何道從去曰夫陰與陽皆有輸會陽注於陰陰滿之外陰陽紃音巡平素作均平以充其形九候若一名曰平人夫邪之所生或生於陽或生於陰其生於陽者得之風雨寒暑其生於陰者得之飲食起居陰陽喜怒曰風雨之傷人奈何曰風雨之傷人也先客於皮膚傳入於孫脈孫脈滿則傳入於絡脈絡脈滿乃注於大經脈血氣與邪氣並客於分腠之間其脈堅大故曰實實者外堅充滿不可按按之則痛曰寒濕之傷人奈何曰寒濕之中人也皮膚收素問作不收肌肉堅緊營血澀衛氣去故曰虛虛者攝闢氣不足血澀按之則氣足溫之故快然而不痛曰陰之生實奈何曰喜怒不節則陰氣上逆上逆則下虛下虛則陽氣走之故曰實曰陰之生虛奈何曰喜則氣下悲則氣消消則脈空虛因寒飲食寒氣動臟一作重滿則血泣氣去故曰虛曰陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒不知所由然曰陽受氣於上焦以溫皮膚分肉之間今寒氣在外則上焦不通不通則寒獨留於外故寒栗有所勞倦形氣衰少穀氣不盛上焦不行下焦素問作下脘不通胃氣熱熏胸中故內熱上焦不通利皮膚緻密腠理閉塞素問下有玄府二字不通衛氣不得泄越故外熱厥氣上逆寒氣積於胸中而不瀉不瀉則溫氣去寒獨留則血凝泣凝則腠理不通其脈盛大以澀故中寒曰陰與陽並血氣與並病形已成刺之奈何曰刺此者取之經渠取血於營取氣於衛用形哉因四時多少高下曰血氣已並病形已成陰陽相頃補瀉奈何曰瀉實者氣盛乃內針針與氣俱內以開其門如利其戶針與氣俱出精氣不傷邪氣乃下外門不閉以出其疾搖大其道如利其路是謂大瀉必切而出大氣乃屈曰補虛奈何曰持針勿置以定其意候呼內針氣出針入針空四塞精無從去方實而疾出針氣入針出熱不得還閉塞其門邪氣布散精氣乃得存動後時素問作動氣後時近氣不失遠氣乃來是謂追之曰虛實有十生於五臟五脈耳夫十二經脈者皆生百素作其病今獨言五臟夫十二經脈者皆絡三百六十五節節有病必被經脈經脈之病者皆有虛實何以合之乎曰五臟與六腑為表裡經絡肢節各生虛實視其病所居隨而調之病在脈調之血病在血調之絡病在氣調諸衛病在肉調之分肉病在筋調之筋病在骨調之骨燔針劫刺其下及與急者病在骨焠針藥尉病不知所痛兩蹺為上身形有痛九候莫病則繆刺之病在於左而右脈病者則巨刺之必謹察其九候針道畢矣陰陽清濁順治逆亂大論第四黃帝問曰經脈十二者別為五行分為四時何失而亂何得而治岐伯對曰五行有序四時有分相順而治相逆而亂曰何謂相順而治曰經脈十二以應十二月十二月者分為四時四時者春夏秋冬其氣各異營衛相隨陰陽相合清濁不相干如是則順而治矣曰何謂相逆而亂曰清氣在陰濁氣在陽營氣順脈衛氣逆行清濁相干亂於胸中是謂大悗故氣亂於心則煩心密默俯首靜伏亂於肺則俯仰喘喝按手以呼亂於腸胃則為霍亂亂於臂脛則為四厥亂於頭則為厥逆頭痛一作頭重眩僕氣在心者取之手少陰心主之俞氣在於肺者取之手太陰滎足少陰俞氣在於腸胃者取之手足太陰陽明不下者取之三里氣在於頭者取之天柱大杼不知取足靈樞作手太陽之滎俞氣在臂足者先去血脈後取其陽明少陽之滎俞徐入徐出是謂之導氣補瀉無形是謂之同精是非有餘不足也亂氣之相逆也四時賊風邪氣大論第五黃帝問曰有人於此並行並立其年之長少等也衣之厚薄均也卒然遇烈風疾雨或病或不病或皆死其故何也岐伯對曰春溫風夏陽風秋涼風冬寒風凡此四時之風者其所病各不同形黃色薄皮弱肉者不勝春之虛風白色薄皮弱肉者不勝夏之虛風表色薄皮弱肉者不勝秋之虛風赤色薄皮弱肉者不勝冬之虛風曰黑色不病乎曰黑色而皮厚肉堅固不能傷於四時之風其皮薄而肉不堅色不一者長夏至而有虛風者病矣其皮厚而肌肉堅者長夏至而有虛風者不病矣其皮厚而肌肉堅者必重感於寒內外皆然乃病也曰賊風邪氣之傷人也令人病焉今有不離屏蔽不出室穴之中卒然而病者其故何也曰此皆嘗有所傷於濕氣藏於血脈之中分肉之間久留而不去若有所墜墮惡血在內而不去卒然喜怒不節飲食不適寒溫不時腠理閉不通素下有其開二字而適遇風寒則血氣凝結與故邪相襲則為寒痹其有熱則汗出汗出則受風雖不遇賊風邪氣必有因加而發矣曰夫子之所言皆病人所自知也其無遇邪風又無怵惕之志卒然而病其故何也唯有因鬼神之事乎曰此亦有故邪留而未發也因而志有所惡及有所慕血氣內亂兩氣相搏其所從來者微視之不見聽之不聞故似鬼神曰其有祝由而已者其故何也曰先巫者因知百病之勝先知百病之所從者可祝由而已也內外形診老壯肥瘦病旦慧夜甚大論第六黃帝問曰人之生也有剛有柔有弱有強有短有長有陰有陽願聞其方岐伯對曰陰中有陽陽中有陰審知陰陽刺之有方得病所始刺之有理謹度病端與時相應內合於五臟六腑外合於筋骨皮膚是故內有陰陽外有陰陽在內者五臟為陰六腑為陽在外者筋骨為陰皮膚為陽故曰病在陰之陰者刺陰之滎俞病在陽之陽者刺陽之合病在陽之陰者刺陰之經病在陰之陽者刺陽之絡病在陽者名曰風病在陰者名曰痹陰陽俱病名曰風痹病有形而不痛者陽之類無形而痛者陰之類無形而痛者其陽完九墟完作緩下同而陰傷急治其陽無攻其陰九墟作急治其陰無攻其陽有形而不痛者其陰完而陽傷急治其陰無攻其陽九墟作急治其陽無攻其陰陰陽俱動乍有乍無加以煩心名曰陰勝其陽此謂不表不里其形不久也曰形氣病之先後內外之應奈何曰風寒傷形憂恐忿怒傷氣氣傷臟乃病臟寒傷形乃應形風傷筋脈筋脈乃應此形氣內外之相應也曰刺之奈何曰病九日者三刺而已病一月者十刺而已多少遠近以此衰之久痹不去身者視其血絡盡去其血曰外內之病難易之治奈何曰形先病而未入臟者刺之半其日臟先病而形乃應者刺之倍其日此外內難易之應也曰何以知其皮肉血氣筋骨之病也曰色起兩眉間薄澤者病在皮唇色青黃赤白黑者病在肌肉營氣濡然者病在血氣千金翼方作脈目色青黃赤白黑者病在筋耳焦枯受塵垢者病在骨曰形病何如取之奈何曰皮有部肉有柱氣血有俞千金翼下有筋有結骨有屬皮之部俞在於四末肉之柱在臂胻諸陽肉分間與足少陰分間氣血之俞在於諸絡脈氣血留居則盛而起筋部無陰無陽無左無右候病所在骨之屬者骨空之所以受液而溢腦髓者也曰取之奈何曰夫病之變化浮沉淺深不可勝窮各在其處病間者淺之甚者深之間者少之甚者衆之隨變而調氣故曰上工也曰人之肥瘦小大寒溫有老壯少小之別奈何曰人年五十以上為老三十以上為壯十八以上為少六歲以上為小曰何以度其肥瘦曰人有脂有膏有肉曰別此奈何曰䐃肉堅皮滿者脂䐃肉不堅皮緩者膏皮肉不相離者肉曰身之寒溫何如曰膏者其肉淖而粗理者身寒細理者身熱脂者其肉堅細理者和靈作熱粗理者寒少肉者寒溫之症未詳曰其肥瘦大小奈何曰膏者多氣而皮縱緩故能縱腹垂腴肉者身體容大脂者其身收小曰三者之氣血多少何如曰膏者多氣多氣者熱熱者耐寒也肉者多血多血者則形充形充者則平也脂者其血清氣滑少故不能大此別於衆人也曰衆人如何曰衆人之皮肉脂膏不能相加也血與氣不能相多也故其形不小不大各自稱其身名曰衆人曰治之奈何曰必先別其五形血之多少氣之清濁而後調之治無失常經是故膏人者縱腹垂腴肉人者上下容大脂人者雖脂不能大曰病者多以旦慧晝安夕加夜甚者何也曰春生夏長秋收冬藏是氣之常也人亦應之以一日一夜分為四時之氣朝為春日中為夏日入為秋夜為冬朝則人氣始生病氣衰故旦慧日中則人氣長長則勝邪故安夕則人氣始衰邪氣始生故加夜半人氣入臟邪氣獨居於身故甚曰其時有反者何也曰是不應四時之氣臟獨主其病者是必以臟氣之所不勝時者甚以其所勝時者起也曰治之奈何曰順天之時而病可與期順者為工逆者為粗也陰陽大論第七陰靜陽躁陽生陰長陽殺陰藏陽化氣陰成形寒極生熱熱極生寒寒氣生濁熱氣生清清氣在下則生飧泄濁氣在上則生䐜脹此陰陽反作病之逆順也故清陽為天濁陰為地地氣上為云天氣下為雨雨出地氣云出天氣故清陽出上竅濁陰出下竅清陽發腠理濁陰走五臟清陽實四肢濁陰歸六腑水為陰火為陽陽為氣陰為味味歸形形歸氣氣歸精精歸化精食氣形食味化生精氣生形味傷形氣傷精精化為氣氣傷於味陰味出下竅陽氣出上竅味厚者為陰薄為陰之陽氣厚者為陽薄為陰之陰味厚則泄薄則通氣薄則發泄厚則發熱壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣氣味辛甘發散為陽酸苦湧泄為陰陰勝則陽病陽勝則陰病陰病則熱陽病則寒素問作陽勝則熱陰勝則寒重寒則熱重熱則寒寒傷形熱傷氣氣傷痛形傷腫故先痛而後腫者氣傷形也先腫而後痛者形傷氣也風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡泄天有四時五行以生長收藏以生寒暑燥濕風人有五臟化為五氣以生喜怒悲憂恐故喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽厥氣上行滿脈去形故曰喜怒不節寒暑過度生乃不固重陰必陽重陽必陰此陰陽之變也夫陰在內陽之守也陽在外陰之使也陽勝則身熱腠理閉喘息粗為之後悶素問作俯仰汗不出而熱齒乾以煩悶腹脹死耐冬不耐夏陰勝則身寒汗出身常清數栗而寒寒則厥厥則腹滿死耐夏不耐冬此陰陽更勝之變病之形能也曰調此二者奈何曰能知七損八益則二者可調也不知用此則早衰矣清陽上天濁陰歸地天氣通於肺地氣通於咽風氣通於肝雷氣通於心穀氣通於脾雨氣通於腎六經為川腸胃為海九竅為水注之氣暴風象雷逆氣象陽故治不法天之紀不用地之理則災害至矣邪風之至疾如風雨故善治者治皮毛其次治肌膚其次治筋脈其次治六腑其次治五臟治五臟者半生半死矣故天之邪氣感則害五臟水穀之寒熱感則害六腑地之濕氣感則害皮肉筋脈故善用針者從陰引陽從陽引陰以右治左以左治右以我知彼以表知里以觀過與不及之理見微知過用之不殆善診者察色按脈先別陰陽審清濁而知部分視喘息聽聲音而知病所苦觀權衡視規矩而知病所生按尺寸觀浮沉滑澀而知病所生以治則無過以診則無失矣故曰病之始起可刺而已其盛也可待衰而已故因其輕而揚之因其重而減之因其衰而彰之形不足者溫之以氣精不足者補之以味其高者因而越之其下者引而竭之中滿者瀉之於內其有形者漬形以為汗其在皮者汗而發之其慓悍者按而收之其實者散而瀉之審其陰陽以別柔剛陽病治陰陰病治陽定其血氣各守其鄉血實宜決之氣實宜掣之引之陽從右陰從左素問作陽從左陰從右老從上少從下是以春夏歸陽為生歸秋冬為死反之則歸秋冬為生是以氣之多少逆順皆為厥有餘者厥也血上不下寒厥到膝少者秋冬死老者秋冬生氣上不下頭痛癲疾求陽不得求之於陰素問作求陰不審五部隔無徵若居曠野若伏空室綿綿乎屬不滿目春三月之病在理已盡草與柳葉皆殺陰陽皆絶期在孟春冬三月之病病合陽者至春正月脈有死徵皆歸於春素問作始春春三月之病曰陽殺陰陽皆絶期在草乾夏三月之病至陰不過十日陰陽交期在溓水秋三月之病三陽俱起不治自已陰陽交合者立不能坐坐不能起三陽獨至期在石水二陰獨至期在盛水正邪襲內生夢大論第八黃帝問曰淫邪泮衍奈何岐伯對曰正邪從外襲內未有定舍反淫於臟不得定處與榮衛俱行而與魂魄飛揚使人臥不得安而喜夢凡氣淫於腑則夢有餘於外不足於內氣淫於臟則夢有餘於內不足於外曰有餘不足有形乎曰陰盛則夢涉大水而恐懼陽盛則夢大火而燔焫陰陽俱盛則夢相殺毀傷上盛則夢飛下盛則夢墮甚飽則夢豫甚飢則夢取肝氣盛則夢怒肺氣盛則夢哭泣恐懼飛揚心氣盛則夢喜笑及恐怖脾氣盛則夢歌樂體重手足不舉腎氣盛則夢腰脊兩解而不屬凡此十二盛者至而瀉之立已厥氣客於心則夢見丘山煙火客於肺則夢飛揚見金鐵之器及奇物客於肝則夢見山林樹木客於脾則夢見丘陵大澤壞屋風雨客於腎則夢臨淵沒居水中客於膀胱則夢遊行客於胃則夢飲食客於大腸則夢見田野客於小腸則夢見聚邑行街一作沖衢客於膽則夢見鬥訟自刳客於陰器則夢接內客於項則夢斬首客於胻則夢行走不能前及居深地窖苑中客於股肱則夢禮節拜跪客於胞䐈則夢溲便利凡此十五不足者至而補之立已五味所宜五臟生病大論第九黃帝問曰穀氣有五味其入臟分別奈何岐伯對曰胃者五臟六腑之海皆入於胃五臟六腑皆稟於胃五味各走其所喜故穀味酸先走肝九卷又曰酸入胃其氣澀一作澀以收不能出入不出則留於胃中胃中和溫則下注於膀胱之胞膀胱之胞薄以軟得酸則縮綣約而不能水道不行故癃陰者積筋之所終聚也故酸入胃而走於筋素問曰酸走筋筋病無多食酸其義相順又曰肝欲辛多食酸由肉胝䐢而唇揭謂木勝土也木辛與九卷義錯素問肝欲辛作欲酸苦先走心九卷又曰苦入胃五穀之氣皆不能勝苦苦入下脘下脘者三焦之路皆閉而不通故氣變嘔也齒者骨之所終也故苦入胃而走骨入而復出必黧疏是知其走骨也水火相既骨氣通於心也素問曰苦走骨骨病無多食苦其義相順又曰心欲酸食苦則皮槁而毛拔謂火勝金也火酸與九卷義錯甘先走脾九卷又曰甘入脾其氣弱少不能上至上焦而與谷俱留於胃中甘者令人柔潤也胃柔則緩緩則蟲動蟲動則令人心悶其氣通於皮故曰甘走皮皮者肉之餘蓋皮雖屬肺與肉連體故甘潤肌肉並皮也素問曰甘走肉肉病無多食甘其義相順又曰多食甘則骨痛而發落謂土勝水也與九卷不錯辛先走肺九卷又曰辛入胃其氣走於上焦上焦者受諸氣而營諸陽者也姜韭之氣熏至營衛營衛不時受之久留於心下故洞一作熅心辛者與氣俱行故辛入胃則與汗俱出矣千金云辛入胃而走氣與氣俱出故氣盛素問曰辛走氣氣病無多食辛其義相順又曰肺欲苦多食辛則筋急而爪枯謂金勝木也肺欲苦與九卷義錯咸先走腎九卷又曰鹹入胃其氣上走中焦注於諸脈脈者血之所走也血與咸相得則血涘一作凝下同血涘則胃中竭竭則咽路焦故舌乾而善渴血脈者中焦之路故鹹入而走血矣腎合三焦血脈雖屬肝心而為中焦之道故鹹入而走血也素問曰咸走血血病無多食鹹其義相順又曰多食鹹則脈凝泣而變色謂水勝火也雖俱言血脈其義不同穀氣營衛俱行津液已行營衛大通乃糟粕以次傳下曰營衛俱行奈何曰谷始入於胃其精微者先出於胃之兩焦以溉五臟別出兩焦行於營衛之道其大氣之搏而不行者積於胸中名曰氣海出於肺循於喉嚨故呼則出吸則入天地之精氣其大數常出三而入一故谷不入半日則氣衰一日則氣少矣曰谷之五味可得聞乎曰五穀粳米甘麻素問作小豆酸大豆咸小麥苦黃黍辛五果棗甘李酸栗咸杏苦桃辛五畜牛肉甘犬肉酸豕肉咸羊肉苦雞肉辛五菜葵甘韭酸藿咸薤苦蔥辛五色黃宜甘青宜酸黑宜咸赤宜苦白宜辛脾病者宜食粳米牛肉棗葵甘者入脾用之心病者宜食麥羊肉杏薤苦者入心用之腎病者宜食大豆豕肉栗藿咸者入腎用之肺病者宜食黃黍雞肉桃蔥辛者入肺用之肝病者宜食麻犬肉李韭酸者入肝用之肝病禁辛心病禁咸脾病禁酸肺病禁苦腎病禁甘肝足厥陰少陽主治肝苦急食甘以緩之心手少陰太陽主治心苦緩急食鹹以收之脾足太陰陽明主治脾苦濕急食苦以燥之肺手太陰陽明主治肺苦氣上逆急食苦以泄之腎足少陰太陽主治腎苦燥急食辛以潤之開腠理致津液通氣隧也毒藥攻邪五穀為養五果為助五畜為益五菜為充氣味合而服之以補精益氣此五味者各有所利辛散酸收甘緩苦堅咸軟肺病者兩脅下痛引少腹令人善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之取其經厥陰與少陽血者氣逆則頭痛耳聾不聰頰腫取血者又曰徇蒙招尤目瞑耳聾下實上虛過在足少陽厥陰甚則入肝心病者胸中痛脅支滿兩胠下痛膺背肩胛間痛兩臂內痛虛則胸腹大脅下與腰相引而痛取其經少陰太陽血者素問舌下血者其變病刺郤中血者又曰胸中痛支滿腰脊相引而痛過在手少陰太陽素問云心煩頭痛病在鬲中過在手巨陽少陰脾病者身重善飢肌肉痿足不收行善瘛瘲腳下痛虛則腹脹腸鳴飧泄食不化取其經太陰陽明少陰血者又曰腹滿䐜脹支滿胠脅下厥上冒過在足太陰陽明肝病者喘咳逆氣肩背痛汗出尻陰股膝攣髀腨胻足皆痛虛則少氣不能報息耳聾喉嚨干取其經手太陰足太陽外厥陰內少陰血者又曰咳嗽上氣病素問作厥在胸中過在手陽明太陰腎病者腹大脛腫痛咳喘身重寢汗出憎風虛則胸中痛大腸小腸素問作大腹小腹痛清厥意不樂取其經少陰太陽血者又曰頭痛癲疾下實上虛過在足少陰太陽甚則入腎五臟傳病大論第十病在肝俞於夏夏不愈甚於秋秋不死持於冬起於春病在肝愈於丙丁丙丁不愈加於庚辛庚辛不加素問作不死下同持於壬癸起於甲乙禁當風病在肝平旦慧下晡甚夜半靜病在心愈於長夏長夏不愈甚於冬冬不死持於春起於夏病在心愈於戊己戊己不愈加於壬癸壬癸不加持於甲乙起於丙丁禁衣溫食熱病在心日中慧夜半甚平旦靜病在脾愈於秋秋不愈甚於春春不死持於夏起於長夏病在脾愈於庚辛庚辛不愈加於甲乙甲乙不加持於丙丁起於戊己禁溫衣濕地素問云禁溫衣飽食濕地濡衣病在脾日昳慧平旦素問作日出甚下晡靜病在肺俞於冬冬不愈甚於夏夏不死持於長夏起於秋病在肺愈於壬癸壬癸不愈加於丙丁丙丁不加持於戊己起於庚辛禁寒衣冷飲食病在肺下晡慧日中甚夜半靜病在腎愈於春春不愈甚至長夏長夏不死持於秋起於冬病在腎愈於甲乙甲乙不愈加於戊己戊己不死持於庚辛起於壬癸禁犯焠㶼無食熱無溫衣素問作犯焠㶼熱食溫炙衣病在腎夜半慧日乘四季甚下晡靜邪氣之客於身也以勝相加至其所生而愈至其所不勝而甚至其所生而持自得其位而起腎移寒於脾癰腫少氣脾移寒於肝癰腫筋攣肝移寒於心狂鬲中心移寒於肺為肺消肺消者飲一溲二死不治肺移寒於腎為湧水湧水者按其腹不堅水氣客於大腸疾行腸鳴濯濯如囊裹漿治主肺者素問作水之病也脾移熱於肝則為驚衄肝移熱於心則死心移熱於肺傳為膈消肺移熱於腎傳為柔痓腎移熱於脾傳為虛腸澼死不可治胞移熱於膀胱則癃溺血膀胱移熱於小腸膈腸不便上為口糜小腸移熱於大腸為䗿瘕為沉大腸移熱於胃善食而溲名曰食㑊又胃移熱於膽亦名食㑊膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也傳為衄䁾暝目故得之厥也正臟受氣於其所生傳之於其所勝氣舍於其所生死於其所不勝病之且死必先傳其所行至不勝乃死此言氣之逆行也故死肝受氣於心傳之於脾氣舍於腎至肺而死心受氣於脾傳之於肺氣舍於肝至腎而死脾受氣於肺傳之於腎氣舍於心至肝而死肺受氣於腎傳之於肝氣舍於脾至心而死腎受氣於肝傳之於心氣舍於肺至脾而死此皆逆死也一日一夜五臟之此所以占死者之早暮也黃帝問曰余受九針於夫子而私覽於諸方或有導引行氣按摩灸尉刺爇飲藥一者可獨守耶將盡行之乎岐伯對曰諸人者衆人之方也非一人之所盡行也曰此乃所謂守一勿失萬物畢者也余已聞陰陽之要虛實之理傾移之過可治之屬願聞病之變化淫傳絶敗而不可治者可得聞乎曰要乎哉問道昭乎其如旦醒窘乎其如夜瞑能被而服之神與俱成畢將服之神自得之生神之理可著於竹帛不可傳之於子孫也曰何謂旦醒曰明於陰陽如惑之解如醉之醒曰何謂夜暝曰喑乎其無聲漠乎其無形折毛髮理正氣橫傾淫邪泮衍血脈傳留大氣入臟腹痛下淫可以致死不可以致生曰大氣入臟奈何曰病先發於心心痛一日之肺而咳三日之肝肋支滿五日之脾閉塞不通身體重三日不已死冬夜半夏日中病先發於肺喘咳三日之肝脅支滿一日之脾而身體痛五日之胃而脹十日不已死冬日入夏日出病先發於肝頭痛目眩肋支滿一日之脾而身體痛五日之胃而腹脹三日之腎腰脊少腹痛胻酸三日不已死冬日中素問作日入夏早食病先發於脾身痛體重一日之胃而脹二日之腎少腹腰脊痛胻酸三日之膀胱背膂筋痛小便閉十日不已死冬人定夏晏食病先發於胃脹滿五日之腎少腹腰脊痛胻酸三日之膀胱背膂筋痛小便閉五日而上之心身重六日不已死冬夜半夏日昳病先發於腎少腹腰脊痛胻酸三日之膀胱背膂筋痛小便閉三日而上之心按靈樞素問云三日而上之小腸此云三日而上之心乃皇甫士安合二書為此篇文也心脹三日之小腸兩脅支痛三日不已死冬大晨夏晏晡病先發於膀胱小便閉五日之腎少腹脹腰脊痛胻酸一日之小腸而腹脹二日之脾而身體痛二日不已死冬雞鳴夏下晡諸病以次相傳如是者皆有死期不可刺也壽夭形診病候耐痛不耐痛大論第十一黃帝問曰形有緩急氣有盛衰骨有大小肉有堅脆皮有厚薄其以立壽夭奈何伯高對曰形與氣相任則壽不相任則夭皮與肉相裹則壽不相裹則夭血氣經絡勝形則壽不勝形則夭曰何謂形緩急曰形充而皮膚緩則壽形充而皮膚急則夭形充而脈堅大者順也形充而脈小以弱者氣衰也衰則危矣形充而顴不起者腎小也小則夭矣形充而大皮肉䐃堅而有分者肉堅堅則壽矣形充而大皮肉無分理不堅者肉脆脆則夭矣此天之生命所以立形定氣而視壽夭者也必明於此以立形定氣而後可以臨病人決死生也曰形氣之相勝以立壽夭奈何曰平人而氣勝形者壽病而形肉脫氣勝形者死形勝氣者危也凡五臟者中之府中盛臟滿氣勝傷恐者聲如從室中言是中氣之濕也言而微終日乃復言者此奪氣也衣被不斂言語善惡不避親疏者此神明之亂也倉稟不藏者是門戶不要也水泉不止者是膀胱不藏也得守者生失守者死夫五臟者身之強也頭者精明之府頭傾視深神將奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂俯筋將憊矣骨者髓之府不能久立行則掉栗骨將憊矣得強則生失強則死岐伯曰反四時者有餘者為精不足為消應太過不足為精應不足有餘為消陰陽不相應病名曰關格人之骨強筋徑肉緩皮膚厚者耐痛其於針石之痛大熱亦然加以黑色而善一本作美骨者耐火爇堅肉薄皮者不耐針石之痛於火爇亦然同時而傷其身多熱者易已多寒者難已胃厚色黑大骨肉肥者皆勝毒其瘦而薄者皆不勝毒也形氣盛衰大論第十二黃帝問曰氣之盛衰可得聞乎岐伯對曰人年十歲一作十六五臟始定血氣已通其氣在下故好走二十歲血氣始盛肌肉方長故好趨三十歲五臟大定肌肉堅固血脈盛滿故好步四十歲五臟六腑十二經脈皆大盛平定腠理始開榮華剝落鬢髮頒白平盛不搖故好坐五十歲肝氣始衰肝葉始薄膽汁始減目始不明六十歲心氣始衰乃善憂悲血氣懈墮故好臥七十歲脾氣虛皮膚始枯故四肢不舉八十歲肺氣衰魂魄離散故言善誤九十歲腎氣焦臟乃萎枯經脈空虛至百歲五臟皆虛神氣皆去形骸獨居而終盡矣女子七歲腎氣盛齒更髮長二七天水至素問作天癸至任脈通太衝脈盛月事以時下故有子三七腎氣平均故真牙生而長極四七筋骨堅髮長極身體盛壯五七陽明脈衰面皆焦發始白七七任脈虛太衝一作任脈衰少天水竭地道不通故形壞而無子耳丈夫八歲腎氣實髮長齒更二八腎氣盛天水至而精氣溢瀉陰陽和故能有子三八腎氣平均筋骨徑強故真牙生而長極四八筋骨隆盛肌肉滿壯五八腎氣衰發墮齒槁六八陽氣衰於上面焦鬢髮頒白七八肝氣衰筋不能動天水竭精少腎氣衰形體皆極八八則齒髮去腎者主水受五臟六腑之精而藏之故五臟盛乃能瀉今五臟皆衰筋懈骨墮天水盡矣故髮鬢白體重行步不正而無子耳
