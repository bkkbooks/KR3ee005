body:
  text: 卷十一胸中寒發脈代第一脈代不至寸口四逆脈鼓不通雲門主之胸中寒脈代時至上重下輕足不能地少腹脹上搶心胸榰滿咳唾有血然谷主之陽厥大驚發狂癇第二黃帝問曰人生而病癲疾者安所得之岐伯對曰此得之在母腹中時其母數有大驚氣上而不下精氣並居故令子發為癲疾病在諸陽脈且寒且熱諸分且寒且熱名曰狂刺之虛脈視分盡熱病已止病初發歲一發不治月一發不治月四五發名曰癲疾刺諸分其脈尤寒者以針補之素問云諸分諸脈其無寒者以針調之病已止曰有病狂怒者此病安生曰生於陽也曰陽何以使人狂也曰陽氣者因暴折而難決故善怒病名曰陽厥曰何以知之曰陽明者常動太陽少陽不動不動而動大疾此其候也曰治之奈何曰衰素問作奪其食即已夫食入於陰氣長於陽故奪其食即已使人服以生鐵落為後飲夫生鐵落者下氣候也素問候作疾癲疾脈搏大滑久自已脈小堅急死不治一作脈沉小急實死不治小牢急亦不可治癲疾脈虛可治實則死厥成為癲疾貫疽素問作黃疸暴病厥癲疾狂久逆之所生也五臟不平六腑閉塞之所生也癲疾始生先不樂頭重痛直視舉目赤甚作極已而煩心候之於顏取手太陽太陰血變而止癲疾始作而引口啼呼喘悸者候之以手陽明太陽左強者攻其右一本作左右強者攻其左一本作右血變而止治癲疾者常與之居察其所當取之處病至視之有過者即瀉之置其血於瓠壺之中至其發時血獨動矣不動灸窮骨三十壯窮骨者尾骶也骨癲疾者頷齒諸俞分肉皆滿而骨倨強直汗出煩悶嘔多涎沫氣下泄不治脈癲疾者暴僕四肢之脈皆脹而縱脈滿盡刺之出血不滿灸之俠項太陽又灸帶脈於腰相去三寸諸分肉本俞嘔多涎沫氣下泄不治筋癲疾者身卷攣急脈大刺項大經之大杼嘔多涎沫氣下泄不治狂之始生先自悲也善忘善怒善恐者得之憂飢治之先取手太陰陽明血變而止及取足太陰陽明狂始發少臥不飢自高賢也自辨智也自尊貴也善罵詈日夜不休治之取手陽明太陰太陽狂目妄見耳妄聞善呼者少氣之所生也治之取手太陽太陰陽明舌下少陰視脈之盛者皆取之不盛者釋之狂善驚善笑好歌樂妄行不休者得之大恐治之取手陽明太陰太陽狂目妄見耳妄聞善呼者少氣之所生也治之取手太陰陽明足太陽及頭兩頷狂多食善見鬼神善笑而不發於外者得之有所大喜治之取足太陰陽明太陽後取手太陰陽明太陽狂而新發未應如此者先取曲泉左右動脈及盛者見血立頃已不已以法取之灸骶骨二十壯骶骨者尾屈也癲疾嘔沫神庭及兌端承漿主之其不嘔沫本神及百會後頂玉枕天衝大杼曲骨尺澤陽溪外丘當上脘傍五分通谷金門承筋合陽主之委中下二寸為合陽癲疾上星主之先取噫嘻後取天牖風池癲疾嘔沫暫起僵仆惡見風寒面赤腫囟會主之癲疾狂走瘛瘲搖頭口喎戾頸強強間主之癲疾瘛瘲狂走頸項痛後頂主之後頂頂後一寸五分癲疾骨酸眩狂瘛瘲口噤羊鳴千金作喉鳴刺腦戶狂易多言不休及狂走欲自殺及目妄見刺風府癲疾僵仆目妄見恍惚不樂狂走瘛瘲絡卻主之癲疾大瘦腦空主之癲疾僵仆瘧完骨及風池主之癲疾互引天柱主之癲疾怒欲殺人千金又云瘛瘲身熱狂走譫語見鬼身柱主之狂走癲疾脊急強目轉上插筋俞主之癲疾發如狂走者面赤厚敦敦不治虛則頭重洞泄淋癃大小便難腰尻重難起居長強主之癲疾憎風時振寒不得言得寒益甚身熱狂走欲自殺目反妄見瘛瘲泣出死不知人肺俞主之癲疾膈俞及肝俞主之癲疾互引水溝及齦交主之癲疾狂瘛瘲眩僕癲疾喑不能言羊鳴沫出聽宮主之癲疾互引口喎喘悸者大迎主之及取陽明太陰候手足變血而止狂癲疾吐舌太乙及滑肉門主之太息善悲少腹有熱欲走日月主之狂易魚際及合谷腕骨支正少海崑崙主之狂言太淵主之心懸如飢狀善悲而驚狂面赤目黃間使主之狂言笑見鬼取之陽溪及手足陽明太陰癲疾多言耳鳴口僻頰腫實則聾齲後痹不能言齒痛鼻鼽衄虛則痹鬲俞偏歷主之癲疾吐舌鼓頷狂言見鬼溫留主之在腕後五寸目不明腕急身熱驚狂躄痿痹瘛瘲曲池主之癲疾吐舌曲池主之狂疾腋門主之又俠溪丘墟光明主之狂互引頭痛耳鳴目痹中渚主之熱病汗不出互引頸嗌外腫肩臂酸重脅腋急痛不舉痂疥項不可顧支溝主之癲疾吐血沫出羊鳴戾頸天井主之在肘後熱病汗不出狂互引癲疾前谷主之狂互引癲疾數發後溪主之狂癲疾陽谷及築賓通谷主之癲疾狂多食善笑不發於外煩心渴商丘主之癲疾短氣嘔血胸背痛行間主之痿厥癲疾洞泄然谷主之狂僕溫留主之狂癲陰谷主之癲疾發寒熱缺煩滿悲泣出解溪主之狂妄走善缺巨虛上廉主之狂易見鬼與火解溪主之癲狂互引僵仆申脈主之先取陰蹺後取京骨頭上五行目反上視若赤痛從內眥始復下半寸各三痏左取右右取左寒厥癲疾噤齘瘛瘲驚狂陽交主之癲疾狂妄行振寒京骨主之身痛狂善行癲疾束骨主之補諸陽癲疾僵仆轉筋僕參主之癲疾目䀮䀮鼽衄崑崙主之癲狂疾體痛飛揚主之癲疾反折委中主之凡好太息不嗜食多寒熱汗出病至則善嘔嘔已乃衰即取公孫及井俞實則腸中切痛厥頭面腫起煩心狂多飲虛則鼓濁腹中氣大滯熱痛不嗜臥霍亂公孫主之陽脈下墜陰脈上爭發尸厥第三尸厥死不知人脈動如故隱白及大敦主之恍惚尸厥頭痛中極及僕參主之尸厥暴死金門主之氣亂於腸胃發霍亂吐下第四霍亂刺俞傍五足陽明及上傍三嘔吐煩滿魄戶主之陽逆霍亂刺人迎刺入四分不幸殺人霍亂泄出不自知先取太溪後取太倉之原霍亂巨闕關衝支溝公孫千金又取陰陵泉解溪主之霍亂泄注期門主之厥逆霍亂府舍主之胃逆霍亂魚際主之霍亂逆氣魚際及太白主之霍亂遺矢氣三里主之暴霍亂僕參主之霍亂轉筋金門僕參承山承筋主之霍亂脛痹不仁千金云主瘛瘲腳痠承筋主之轉筋於陽理其陽轉筋於陰理其陰皆卒刺之足太陰厥脈病發溏泄下痢第五春傷於風夏生飧泄腸澼久風為飧泄飧泄而脈小手足寒者難已飧泄而脈大手足溫者易已黃帝問曰腸澼便血何如岐伯對曰身熱則死寒則生曰腸澼下白沫何如曰脈沉則生浮則死曰腸澼下膿血何如曰懸絶則死滑大則生曰腸澼之屬身不熱脈不懸絶何如曰脈滑大皆生懸澀皆死以臟期之飧泄補三陰交上補陰陵泉皆久留之熱行乃止病注下血取曲泉五里腸中有寒熱泄注腸澼便血會陽主之腸鳴澼泄下窖主之腸澼泄切痛四滿主之便膿血寒中食不化腹中痛腹哀主之繞臍痛搶心膝寒注利腹哀主之溏瘕腹中痛臟痹地機主之飧泄太衝主之溏不化食寒熱不節陰陵泉主之腸澼中郤主之飧泄大腸痛巨虛上廉主之五氣溢發消渴黃疸第六黃帝問曰人之善病消疸者何以候之岐伯對曰五臟皆柔弱者善病消疸夫柔弱者必剛強剛強多怒柔者易傷也此人薄皮膚而目堅固以深者長衡直揚其心剛剛則多怒怒則氣上逆胸中蓄積血氣逆留太素作留積腹皮充脹太素作髖皮充肌血脈不行轉而為熱熱則消渴故為消疸此言其剛暴而肌肉弱者也面色微黃齒垢黃爪甲上黃黃疸也安臥小便黃赤脈小而澀者不嗜食曰有病口甘者病名曰何何以得之曰此五氣之溢也名曰脾疸夫五味入口藏於胃脾為之行其精氣津液在脾故令人口甘此肥美之所發也此人必數食美而多食甘肥肥令人內熱甘令人中滿故其氣上溢轉為消疸素問作渴治之以蘭除陳氣也凡治消疸治偏枯厥氣逆滿肥貴人則膏粱之病也鬲塞閉絶上下不通暴憂之病也消疸脈實大病久可治脈懸絶小堅病久不可治也曰熱中消中不可服膏粱芳草石藥石藥發疽素問作疸芳草發狂夫熱中消中者皆富貴人也今禁膏粱是不合其心禁芳草石藥是病不愈願聞其說曰夫芳草之氣美石藥之氣悍二者其氣急疾堅徑故非緩心和人不可以服此二者夫熱氣慓悍藥氣亦然二者相遇恐內傷脾脾者土也而惡木服此藥也至甲乙日當愈甚素問作當更論疸成為消中黃疸千金云腹滿不欲食刺脊中黃疸善缺脅下滿欲吐千金云身重不能動脾俞主之消渴身熱面赤千金作目黃意舍主之消渴嗜飲承漿主之黃疸目黃勞宮主之嗜臥四肢不欲動搖身體黃灸手五里左取右右取左消渴腕骨主之黃疸熱中善渴太衝主之身黃時有微熱不嗜食膝內內踝前痛少氣身體重中封主之消疸善喘氣塞喉咽而不能言手足清溺黃大便難嗌中腫痛唾血口中熱唾如膠太溪主之消渴黃疸足一寒一熱舌縱煩滿然谷主之陰氣不足熱中消穀善飢腹熱身煩狂言三里主之動作失度內外傷發崩中瘀血嘔血唾血第七黃帝問曰人年半百而動作皆衰者人將失之耶岐伯對曰今時之人以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰矣夫聖人之教也形勞而不倦神氣從以順色欲不能勞其目淫邪不能惑其心智愚賢不肖不懼於物故合於道數年度百歲而動作不衰者以其德全不危故也久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋曰有病胸脅榰滿妨於食食至則先聞腥臊臭出清涕先唾血四肢清目眩時時前後血何以得之曰病名曰血枯此得之少年時有所大奪血若醉以入房中氣竭肝傷故使月事衰少不來也治之以烏賊魚骨䕡茹二物併合丸以雀卵大如小豆以五丸為後飯飲以鮑魚汁以飲利腸中及傷肝也曰勞風為病何如曰勞風發在肺下其為病也使人強上而瞑視唾出若涕惡風而振寒此為勞風之病也曰治之奈何曰以救俯仰太陽引精者三日中年者五日不精者七日千金云候之三日及五日中不精明者是也咳出青黃涕狀如膿大如彈丸從口中若鼻空出不出則傷肺傷肺則死矣少氣身漯漯也言吸吸也骨酸體重懈惰不能動補足少陰短氣息短不屬動作氣索補足少陰去血絡男子陰端寒上衝心中俍俍會陰主之男子脊急目赤支溝主之脊內廉痛溺難陰痿不用少腹急引陰及腳內廉陰谷主之善厭夢者商丘主之丈夫失精中極主之男子精溢陰上縮大赫主之男子精不足太衝主之崩中腹上下痛中郤主之胸中瘀血胸脅榰滿鬲痛不能久立膝痿寒三里主之心下有鬲嘔血上脘主之嘔血有息脅下痛口乾心痛與背相引不可咳咳則腎痛不容主之唾血振寒嗌乾太淵主之咳血大陵及郤門主之嘔血上氣神門主之內傷不足三陽絡主之內傷唾血不足外無膏澤刺地五會凡唾血瀉魚際補尺澤邪氣聚於下脘發內癰第八黃帝問曰氣為上鬲上鬲者食入而還出余已知之矣蟲為下鬲下鬲者食晬時乃出未得其意願卒聞之岐伯對曰喜怒不適食飲不節寒溫不時則寒汁留於腸中留則蟲寒蟲寒則積聚守於下脘守下脘則腸胃充郭胃氣不營邪氣居之人食則蟲上食蟲上食則下脘虛下脘虛則邪氣勝勝則積聚以留留則癰成癰成則下脘約其癰在脘內者則沉而痛深其癰在脘外者則癰外而痛浮癰上皮熱按其癰視氣所行先淺刺其傍稍內益深還而刺之無過三行察其浮沉以為淺深已刺必尉令熱入中日使熱內邪氣益衰大癰乃潰互以參禁以除其內恬淡無為乃能行氣後服酸苦化谷乃下鬲矣曰有病胃脘癰者診當何如曰診此者當候胃脈其脈當沉澀素問作細沉澀者氣逆氣逆者則人迎甚盛甚盛則熱人迎者胃脈也逆而盛則熱聚於胃口而不行故胃脘為癰肝滿腎滿肺滿皆實則為瘇肺癰喘而兩脛素問作胠滿肝癰兩脅素問作胠下滿臥則驚不得小便腎癰胠素問作腳下至少腹滿脛有大小髀脛跛易偏枯寒氣客於經絡之中發癰疽風成發厲浸淫第九上黃帝問曰腸胃受谷上焦出氣以溫分肉以養骨節通腠理中焦出氣如霧上注溪谷而滲孫脈津液和調變化赤而為血血和則孫絡先滿乃注於絡脈絡脈皆盈乃注於經脈陰陽乃張因息而行行有經紀周有道理與天合同不得休止切而調之從虛去實瀉則不足疾則氣減留則先後從實去虛補則有餘血氣已調神氣乃持余已知血氣之至與不至未知癰疽之所從生成敗之時死生之期或有遠近何以度之曰經脈流行不止與天同度與地合紀故天宿失度日月薄蝕地經失紀水道流溢草螢不成五穀不殖經紀不通民不往來巷聚邑居別離異處血氣猶然請言其故夫血脈營衛周流不休上應天宿下應經數寒邪客經絡之中則血泣血泣則不通不通則衛氣歸之不得復反故癰腫也寒氣化為熱熱勝則肉腐肉腐則為膿膿不瀉則筋爛筋爛則骨傷骨傷則髓消不當骨空不得泄瀉則筋骨枯空枯空則筋骨肌肉不相親經絡敗漏熏於五臟臟傷則死矣寒氣客於經絡之中發癰疽風成發厲浸淫第九下黃帝問曰病之生時有喜怒不測飲食不節陰氣不足陽氣有餘營氣不行乃發為癰疽陰陽氣不通而熱相搏乃化為膿小針能取之乎岐伯對曰夫致使身被癰疽之疾膿血之聚者不亦離道遠乎癰疽之生膿血之成也積聚之所生故聖人自治於未形也愚者遭其已成也曰其已有形膿已成為之奈何曰膿已成十死一生曰其已成有膿血可以小針治乎曰以小治小者其功小以大治大者其功大以小治大者多害大故其已成膿血者其惟砭石䤵鋒之所取也曰多害者其不可全乎曰在逆順焉耳曰願聞順逆曰已為傷者其白晴青黑眼小是一逆也內藥而嘔是二逆也腹痛渴甚是三逆也肩項中不便是四逆也音嘶色脫是五逆也除此五者為順矣邪之入於身也深其寒與熱相搏久留而內著寒勝其熱則骨疼肉枯熱勝其寒則爛肉腐肌為膿內傷骨為骨蝕有所疾前筋屈不得伸氣居其間而不反發為筋瘤也有所結氣歸之衛氣留之不得復反津液久留合而為腸一本作瘍疽留久者數歲乃成以手按之柔有所結氣歸之津液留之邪氣中之凝結日以易甚連以聚居為昔瘤以手按之堅有所結氣深中骨氣因於骨骨與氣並息日以益大則為骨疽有所結氣中於肉宗氣歸之邪留而不去有熱則化為膿無熱則為肉疽凡此數氣者其發無常處而有常名曰病癰腫頸痛胸滿腹脹此為何病曰病名曰厥逆灸之則喑石之則狂須其氣並乃可治也陽氣重上一本作止有餘於上灸之陽氣入陰入則喑石之陽氣虛虛則狂須其氣並而治之使愈曰病頸癰者或石治之或以針灸治之而皆已其治何在曰此同名而異等者也夫癰氣之息者宜以針開除去之夫氣盛血聚者宜石而瀉之此所謂同病而異治者也曰諸癰腫筋攣骨痛此皆安在曰此皆寒氣之腫也八風之變也曰治之奈何曰此四時之病也以其勝治其俞暴癰筋濡一本作軟隨分而痛魄汗不盡胞氣不足治在其經俞腋癰大熱刺足少陽五刺而熱不止刺手心主三刺手太陰經絡者大骨之會各三癰疽不得頃回癰不知所按之不應手乍來乍已刺手太陰傍三與纓脈各二治癰腫者刺癰上視癰大小深淺刺之刺大者多而深之必端內針為故止也素問云刺大者多血小者深之必端內針為故止項腫不可俯仰頰腫引耳完骨主之咽腫難言天柱主之䪼腫唇癰顴窖主之頰腫痛天窗主之頭項癰腫不能言天容主之身腫關門主之胸下滿痛膺腫乳根主之馬刀腫瘻淵腋章門支溝主之面腫目癰腫刺陷谷出血立已犢鼻腫可刺其上堅勿攻攻之者死癰疽竅陰主之厲風者索刺其腫上已刺以吮其處按出其惡血腫盡乃止常食方食無食他食脈風成為厲管疽發厲竅陰主之頭大浸淫間使主之管疽商丘主之瘃蛘欲嘔大陵主之痂疥陽溪主之黃帝問曰願盡聞癰疽之形與忌日名岐伯對曰癰發於嗌中名曰猛疽不急治化為膿膿不瀉塞咽半日死其化為膿者膿瀉已則合豕膏冷食三日已發於頸者名曰夭疽其狀大而赤黑不急治則熱氣下入淵腋前傷任脈內熏肝肺熏則十餘日死矣陽氣大發消腦瘤項名曰腦爍其色不樂腦項痛如刺以針煩心者死不治發於肩及臑名曰疵疽其狀赤黑急治之此令人汗出至足不害五臟癰發四五日逆焫之發於腋下赤堅者名曰米疽治之以砭石欲細而長疏砭之塗以豕膏六日已勿裹之其癰堅而不潰者為馬刀挾癭以急治之發於胸名曰井疽其狀如大豆三四日起不早治下入腹不治七日死發於膺名曰甘疽色青其狀如谷實栝蔞常苦寒熱急治之去其寒熱不急治十歲死死後出膿癰發於脅名曰敗疵此言女子之病也灸之其狀大癰膿其中乃有生肉大如赤小豆治之以陵翹草根及赤松子根各一升以水一斗六升煮之令竭得三升即強飲厚衣坐於釜上令汗至足已發於股脛一作胻名曰股脛疽其狀不甚變色癰膿內薄於骨急治之不急治四十日死發於尻名曰鋭疽其狀赤堅大急治之不治三十日死發於股陰名曰赤弛不治六十日死在兩股之內不治十日死發於膝名曰疵疽其狀大癰色不變寒熱而堅者勿石石之者即死須其色異柔乃石之者生諸癰之發於節而相應者不可治發於陽者百日死發於陰者四十日死發於脛名曰兔齧其狀如赤豆至骨急治之不急治殺人發於內踝名曰走緩其狀癰色不變數石其俞而止其寒熱不死發於足上下名曰四淫其狀大癰不急治之百日死發於足傍名曰厲癰其狀不大初從小指發急除去之其狀黑者不可消輒益不治百日死發於足指名曰脫疽其狀赤黑者死不治不赤黑者不死治之不衰急斬去之不去則死矣黃帝問曰何為癰岐伯對曰營氣積留於經絡之中則血泣而不行不行則衛氣歸之歸而不通壅遏而不得行故曰熱大熱不止熱勝則肉腐肉腐則為膿然不能陷肌膚於骨髓骨髓不為焦枯五臟不為傷故名曰癰曰何謂疽曰熱氣純盛下陷肌膚筋髓骨肉內連五臟血氣竭絶當其癰下筋骨良肉皆無餘故名曰疽疽者曰其上皮夭瘀以堅狀如牛領皮癰者其皮上薄以澤此其候也曰有疽死者奈何曰身五部伏兔一腨靈樞作腓二背三五臟之俞四項五此五部有疽死也曰身形應九野奈何曰請言身形之應九野也左手一作足應立春其日戊寅己丑左胸一作脅應春分其日乙卯左足應立夏其日戊辰己巳膺喉頭首應夏至其日丙午右手應立秋其日戊申己未右胸一作脅應秋分其日辛酉右足應立冬其日戊戌己亥腰尻下竅應冬至其日壬子六腑及鬲下五臟應中州其日大禁太乙所在之日及諸戊己凡此九者善候八正所在之處主左右上下身體有癰腫者欲治之無以其所直之日潰治之是謂天忌日也五子夜半五醜雞鳴五寅平旦五卯日出五辰食時五巳㽷中五午日中五未日昳五申晡時五酉日入五戌黃昏五亥人定以上此時得疾者皆不起
