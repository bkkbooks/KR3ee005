body:
  text: 卷八五臟傳病發寒熱第一上黃帝問曰五臟相通移皆不次五臟有病則各傳其所勝不治法三月若六月若三日若六日傳五臟而當死素問下有是順傳所勝之次故曰別於陽者知病從來別於陰者知死生之期言至其所困而死者也是故風者百病之長也今風寒客於人使人毫毛畢直皮膚閉而為熱當是之時可汗而發或痹不仁腫痛當是之時可湯尉及一本作足字火灸刺而去弗治病入舍於肺名曰肺痹發咳上氣弗治肺即傳而行之肝病名曰肝痹一名曰厥脅痛出食當是之時可按可刺弗治肝傳之脾病名曰脾風發疸腹中熱煩心汗出黃疸素問無汗疸二字當此之時可汗可藥可烙一本作浴弗治脾傳之腎病名曰疝瘕少腹煩冤而痛汗出素問作出白一名曰蠱當此之時可按可藥弗治腎傳之心病筋脈相引而急名之曰瘈當此之時可灸可藥弗治十日法當死腎傳之心心即復反傳而之肺發寒熱法當三歲死此病之次也然其卒發者不必治其傳化有不以次者憂恐悲喜怒令不得以其次故令人大病矣因而喜大虛則腎氣乘矣怒則肝氣乘矣悲則肺氣乘矣恐則脾氣乘矣憂則心氣乘矣此其道也故病有五五五二十五變及其傳化傳乘之名也大骨枯槁大肉陷下胸中氣滿喘息不便其氣勝形期六月死真臟脈見乃豫之期日大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項期一月死真臟脈見乃豫之期日大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項痛熱脫肉破䐃真臟脈見十月之內死大骨枯槁大肉陷下胸中氣滿腹內痛心中不便肩項身熱䐃破脫肉目眶陷真臟脈見目不見人立死其見人者至其所不勝之時而死急虛中身卒至五臟閉絶脈道不通氣不往來譬之墮溺不可為期其脈絶不來若一息五六至其形肉不脫真臟雖不見猶死真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至緊一本作堅而搏如循薏苡子纍纍然色赤黑不澤毛折乃死真肺脈至大而虛如以毛羽中人膚色赤白不澤毛折乃死真脾脈至弱而乍疏乍數色青黃不澤毛折乃死真腎脈至搏而絶如指彈石辟辟然色黑黃不澤毛折乃死諸真臟脈見者皆死不治曰寒熱瘰癧在於頸腋者何氣所生曰此皆鼠瘻寒熱之毒氣稽於脈而不去者也靈樞稽作堤字鼠瘻之本皆在於臟其末上出頸腋之間其浮於胸中未著於肌肉而外為膿血者易去也曰去之奈何曰請從其本引其末可使衰去而絶其寒熱審按其道以豫之徐往徐來以去之其小如麥者一刺知三刺已決其死生反其目視之其中有赤脈從上下貫瞳子者見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死赤脈不下貫瞳子者可治曰人有善病寒熱者何以候之曰小骨弱肉者善病寒熱顴骨者骨之本也顴大則骨大顴小則骨小皮薄而肉弱無䐃其臂懦懦然其地色炲然不與天地同色汙然獨異此其候也然臂薄者其髓不滿故善病寒熱風感則為寒熱皮寒熱皮不可附席毛髮焦鼻槁臘不得汗取三陽之絡補手太陽肌寒熱病肌痛毛髮焦唇槁臘不得汗取三陽於下以去其血者補太陰以去其汗骨寒骨熱痛無所安汗注不休齒本槁痛取其少陰於陰股之絡齒色槁死不治骨厥亦然男子如蠱女子如阻身體腰脊如解不欲食先取湧泉見血視跗上盛者盡出血灸寒熱之法先取項大椎以年為壯數次灸撅骨以年為壯數視背俞陷者灸之舉臂肩上陷者灸之兩季脅之間灸之外踝上絶骨之端灸之足小指次指之間灸之腨上陷脈灸之外踝後灸之缺盆骨上切之堅動如筋者灸之膺中陷骨間灸之掌束骨下灸之臍下關元三寸灸之毛際動脈灸之臍下二寸分間灸之足陽明跗上動脈灸之巔上一灸之取犬所齧處灸之即以犬傷病法三炷灸之凡當灸二十九處寒熱頭痛喘喝目不能視神庭主之其目泣出頭不痛者聽會主之寒熱頭痛如破目痛如脫喘逆煩滿嘔吐流汗難言頭維主之寒熱刺腦戶五臟傳病發寒熱第一下寒熱取五處乃天池風池腰俞長強大杼中膂內俞上窖齦交上關關元天牖天容合谷陽溪關衝中渚陽池消濼少澤前谷腕骨陽谷少海然谷至陰崑崙主之寒熱骨痛玉枕主之寒熱懈爛一本作懶淫濼脛酸四肢重痛少氣難言至陽主之肺氣熱呼吸不得臥上氣嘔沫喘氣相追逐胸滿脅膺急息難振栗脈鼓氣隔胸中有熱支滿不嗜食汗不出腰脊痛肺俞主之寒熱心痛循循然與背相引而痛胸中悒悒不得息咳唾血多涎煩中善饐食不下咳逆汗不出如瘧狀目䀮䀮淚出悲傷心俞主之咳而嘔鬲寒食不下寒熱皮肉膚痛少氣不得臥胸滿支兩脅鬲上兢兢脅痛腹䐜胸脘暴痛上氣肩背寒痛汗不出喉痹腹中痛積聚默然嗜臥怠惰不欲動身常濕濕心痛無可搖者脾俞主之咳而脅滿急不得息不得反側腋脅下與臍相引筋急而痛反折目上視眩目中循循然肩項痛驚狂衄少腹滿目䀮䀮生白翳咳引胸痛筋寒熱唾血短氣鼻酸肝俞主之寒熱食多身羸瘦兩脅引痛心下賁痛心如懸下引臍少腹急痛熱面急一本作黑目䀮䀮久喘咳少氣溺濁赤腎俞主之骨寒熱溲難腎俞主之寒熱頭痛水溝主之寒熱頸瘰癧大迎主之肩痛引項寒熱缺盆主之身熱汗不出胸中熱滿天窖主之寒熱肩腫引胛中痛肩臂酸腨俞主之寒熱項癧適耳無聞引缺盆肩中熱痛麻痹不舉一本作手臂不舉肩貞主之寒熱癧目不明咳上氣唾血肩俞主之寒熱癧適胸中滿有大氣缺盆中滿痛者死外潰不死肩引項不舉缺盆中痛汗不出喉痹咳嗽血缺盆主之咳上氣喘暴喑不能言及舌下挾縫青脈頸有大氣喉痹咽中干急不得息喉中鳴翕翕寒熱項腫肩痛胸滿腹皮熱衄氣短哽心痛隱疹頭痛麵皮赤熱身肉盡不仁天突主之肺系急胸中痛惡寒胸滿悒悒然善嘔膽胸中熱喘逆氣氣相追逐多濁唾不得息肩背風汗出面腹腫鬲中食噎不下食喉痹肩息肺脹皮膚骨痛寒熱煩滿中府主之寒熱胸滿頭痛四肢不舉腋下腫上氣胸中有聲喉中鳴天池主之咳脅下積聚喘逆臥不安席時寒熱期門主之寒熱腹䐜脹怏怏然不得息京門主之寒濯濯舌煩手臂不仁唾沫唇乾引飲手腕攣指支痛肺脹上氣耳中生風咳喘逆痹臂痛嘔吐飲食不下膨膨然少商主之唾血時寒時熱瀉魚際補尺澤臂厥肩膺胸滿痛目中白翳眼青轉筋掌中熱乍寒乍熱缺盆中相引痛數咳喘不得息臂內廉痛上鬲飲已煩滿太淵主之寒熱胸背急喉痹咳上氣喘掌中熱數缺伸汗出善忘四肢厥善笑溺白列缺主之胸中膨膨然甚則交兩手而瞀暴痹喘逆刺經渠及天府此謂之大俞寒熱咳嘔沫掌中熱虛則肩臂寒栗少氣不足以息寒厥交兩手而瞀口沫出實則肩背熱痛汗出四肢暴腫身濕一本作溫搖時寒熱飢則煩飢則善面色變口噤不開惡風泣出列缺主之煩心咳寒熱善噦勞宮主之寒熱唇口乾喘息目急痛善驚三間主之胸中滿耳前痛齒痛目赤痛頸腫寒熱渴飲輒汗出不飲則皮乾熱曲池主之寒熱頸癧適咳呼吸難灸五里左取右右取左寒熱頸癧適肩臂不可舉臂臑俞主之風寒熱液門主之寒熱頸頷腫後溪主之寒熱善嘔商丘主之嘔厥寒時有微熱脅下支滿喉痛嗌乾膝外廉痛淫濼脛酸腋下腫馬刀瘻肩腫吻傷痛太衝主之心千金作心痛如懸陰厥腳腨後廉急不可前卻血癰腸澼便膿血足跗上痛舌卷不能言善笑足痿不收履溺青赤白黃黑青取井赤取滎黃取輸白取經黑取合血痔泄千金下有利字後重腹痛如癃狀狂僕必有所扶持及大氣涎出鼻孔中痛腹中常鳴骨寒熱無所安汗出不休復留主之男子如蠱女子如阻寒熱少腹偏腫陰谷主之少腹痛泄出糜次指間熱若脈陷寒熱身痛唇渴不幹汗出毛髮焦脫肉少氣內有熱不欲動搖泄膿血腰引少腹痛暴驚狂言非常巨虛下廉主之胸中滿腋下腫馬刀瘻善自齧舌頰天牖中腫淫濼脛酸頭眩枕骨頷腮腫目澀身痹灑淅振寒季脅支滿寒熱脅腰腹膝外廉痛臨泣主之寒熱頸腫丘墟主之寒熱頸腋下腫申脈主之寒熱酸㾓四肢不舉腋下腫馬刀瘻喉痹髀膝頸骨搖酸痹不仁陽輔主之寒熱痹脛不收陽交主之寒熱腰痛如折束骨主之寒熱目䀮䀮善咳喘逆通谷主之寒熱善唏頭重足寒不欲食腳攣京骨主之寒熱篡反出承山主之寒熱篡後出瘛瘲腳腨酸重戰栗不能久立腳急腫跗痛足筋攣少腹引喉嗌大便難承筋主之跟厥膝急腰脊痛引腹篡陰股熱陰暴痛寒熱膝酸重合陽主之經絡受病入腸胃五臟積發伏梁息賁肥氣痞氣奔豚第二黃帝問曰百病始生三部之氣所傷各異願聞其會岐伯對曰喜怒不節則傷於臟臟傷則病起於陰清濕襲虛則病起於下風雨襲虛則病起於上是謂三部至其淫泆不可勝數風雨寒熱不得虛邪不能獨傷人卒然逢疾風暴雨而不病者蓋無虛邪不能獨傷此必因虛邪之風與其身形兩虛相搏乃客於形兩實相逢中人肉間其中於虛邪也因其天時與其躬身參以虛實大病乃成氣有定舍因處為名上下內外分為三真是故虛邪之中人也始於皮膚皮膚緩則腠理開腠理開則邪從毛髮入毛髮入則稍深稍深則毛髮立灑然皮膚痛留而不去則傳舍於絡在絡之時通於肌肉其病時痛時息大經乃代留而不去傳舍於經在經之時灑淅善驚留而不去傳舍於俞在俞之時六經不通四節即痛腰脊乃強留而不去傳舍於伏沖之脈在伏沖之脈時身體重痛留而不去傳舍於腸胃在腸胃之時賁晌腹脹多寒則腸鳴飧泄不化多熱則溏出糜留而不去傳舍於腸胃之外募原之間留著於脈稽留而不去息而成積或著孫絡或著脈絡或著經脈或著俞脈或著於伏沖之脈或著於膂筋或著於腸胃之募原上連於緩筋邪氣淫泆不可勝論其著孫絡之脈而成積往來上下擘音拍破盡也乎太素作臂手孫絡之居也浮而緩不能拘積而止之故往來移行腸胃之外湊滲注灌濯濯有音有寒則腹䐜滿雷引故時切痛其著於陽明之經則俠臍而居飽則益大飢則益小其著於緩筋也似陽明之積飽則痛飢則安其著於腸胃之募原也痛而外連於緩筋也飽則安飢則痛其著於伏沖之脈者揣之應手而動發手則熱氣下於兩股如湯沃之狀其著於膂筋在腸後者飢則積見飽則積不見按之弗得其著於俞脈者閉塞不通津液不下而空竅乾此邪氣之從入內從上下者也曰積之始生至其已成奈何曰積之始也得寒乃生厥止乃成積曰其成奈何曰厥氣生足溢靈樞作足俯足溢生脛寒脛寒則脈血凝泣寒熱上下入於腸胃入於腸胃則䐜脹外之汁沫迫聚不得散日以成積卒然盛食多飲則脈滿起居不節用力過度則絡脈傷陽絡傷則血外溢溢則衄血陰絡傷則血內溢溢則便血外之絡傷則血溢於腸外有寒汁沫與血相搏則併合凝聚不得散而成積矣卒然中於寒若內傷於憂恐則氣上逆氣上逆則穴俞不通溫氣不行凝血蘊里而不散津液凝澀著而不去而積皆成矣曰其生於陰者奈何曰憂思傷心重寒傷肺忿怒傷肝醉飽入房汗出當風則傷脾用力過度入房汗出浴水則傷腎此內外三部之所生病也察其所痛以知其應有餘不足當補則補當瀉則瀉無逆天時是謂至治曰人之善病腸中積者何以候之曰皮薄而不澤肉不堅而淖澤如此則腸胃惡惡則邪氣留止積聚乃作腸胃之積寒溫不次邪氣乃一本作稍止其蓄積止大聚乃起曰病有身體腰股胻背皆腫環臍而痛是謂何病曰名曰伏梁此風根也不可動動之為水溺澀之病病有少腹盛左右上下皆有根者名曰伏梁也裹大膿血居腸胃之外不可治之每切按之至死此下則因陰必下膿血上則迫胃脘生鬲俠一本作依胃脘內癰此久病也難治居臍上為逆居臍下為順勿動亟奪其氣溢素問作泄於大腸而著於肓肓之原在臍下故環臍而痛也難經曰心之積名曰伏梁起於臍上上至心下大如臂久久不愈病煩心心痛以秋庚辛日得之腎病傳心心當傳肺肺以秋王不受邪因留結為積難經曰肺之積名曰息賁在右脅下覆大如杯久久不愈病灑灑惡寒氣逆喘咳發肺癰以春甲乙日得之心病傳肺肺當傳肝肝以春王不受邪因留結為積曰病脅下滿氣逆行三二歲不已是為何病曰病名息賁此不妨於食不可灸刺積為導引服藥藥不能獨治也難經曰肝之積名曰肥氣在左脅下如覆杯有頭足如龜鱉狀久久不愈發咳逆㾬瘧連歲月不已以季夏戊己日得之肺病傳肝肝當傳脾脾以季夏王不受邪因留結為積此與息賁略同難經曰脾之積名曰痞氣在胃脘覆大如盤久久不愈病四肢不收發黃疸飲食不為肌膚以冬壬癸日得之肝病傳脾脾當傳腎腎以冬王不受邪因留結為積難經曰腎之積名曰賁豚發於少腹至心下若豚狀或上或下無時久不已令人喘逆骨痿少氣以夏丙丁日得之肺病傳腎腎當傳心心以夏王不受邪因留結為積也息賁時唾血巨闕主之腹中積上下行懸樞主之疝積胸中痛不得窮屈天容主之暴心腹痛疝橫發上衝心雲門主之心下大堅肓俞期門及中脘主之臍下疝繞臍痛沖胸不得息中極主之賁豚上腹䐜堅痛引陰中不得小便兩丸騫陰交主之臍下疝繞臍痛石門主之奔豚氣上腹䐜痛強不能言莖腫前引腰後引小腹腰臗堅痛下引陰中不得小便兩丸騫石門主之奔豚寒氣入小腹時欲嘔傷中溺血小便數背臍痛引陰腹中窘急欲湊後泄不止關元主之奔豚上搶心甚則不得息忽忽少氣尺厥心煩痛飢不能食善寒中腹脹引䐈而痛小腹與脊相控暴痛時窘之後中極主之腹中積聚時切痛商曲主之臍下積疝瘕胞中有血四滿主之臍疝繞臍而痛時上衝心天樞主之氣疝噦嘔面腫奔豚天樞主之奔豚卵上入痛引莖歸來主之奔豚上下期門主之疝瘕髀中急痛循脅上下搶心腹痛積聚府舍主之奔豚腹脹腫章門主之少腹積聚勞宮主之環臍痛陰騫兩丸縮堅痛不得臥太衝主之寒疝下至腹腠膝腰痛如清水大腹一作小腹諸疝按之至膝上伏兔主之寒疝痛腹脹滿痿厥少氣陰市主之大疝腹堅丘墟主之五臟六腑脹第三黃帝問曰脈之應於寸口如何而脹岐伯對曰其至大堅直以澀者脹也曰何以知其臟腑之脹也曰陰為臟而陽為腑也曰夫氣之令人脹也在於血脈之中耶抑臟腑之內乎曰二者皆在焉然非脹之舍也曰願聞脹舍曰夫脹者皆在於腑臟之外排臟腑而廓胸脅脹皮膚故命曰脹曰臟腑之在內也若匣匱之藏禁器也各有次舍異名而同處一域之中其氣各異願聞其故曰夫胸腹者臟腑之城郭膻中者心主之中宮也胃者太倉也咽喉少腹者傳道也胃之五竅者閭里之門戶也廉泉玉英者津液之道路也故五臟六腑各有畔界其病各有形狀營氣循脈衛氣逆為脈脹衛氣並血脈循分肉為膚脹靈樞作營氣循脈為脈脹衛氣並脈循分肉為膚脹取三里瀉之近者一下一本作分下同遠者三下無問虛實工在疾瀉也曰願聞脹形曰心脹者煩心短氣臥不得安肺脹者虛滿而喘咳肝脹者脅下滿而痛引少腹脾脹者苦噦四肢悶體重不能衣腎脹者腹滿引背怏怏然腰髀痛胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯冬日重感於寒則泄飧不化小腸脹者小腹䐜脹引腰而痛膀胱脹者小腹滿而氣癃三焦脹者氣滿於皮膚中殼殼然而不堅膽脹者脅下痛脹口苦好太息凡此諸脹其道在一明知逆順針數不失瀉虛補實神去其室致邪失正真不可定粗工所敗謂之夭命補虛瀉實神歸其室久塞其空謂之良工曰脹者焉生何因而有名曰衛氣之在身也常並脈循分肉行有逆順陰陽相隨乃得天和五臟皆治四時皆敘五穀乃化然而厥氣在下營衛留止寒氣逆上真邪相攻兩氣相搏乃舍為脹曰何以解惑曰合之於真三合而得曰無問虛實工在疾瀉近者一下遠者三下今有三而不下其過焉在曰此言陷於肉肓而中氣穴者也不中氣穴而氣內閉藏不陷肓則氣不行上越中肉則衛氣相亂陰陽相逆其於脹也當瀉而不瀉故氣不下必更其道氣下乃止不下復起可以萬全惡有殆者乎其於脹也必審其診當瀉則瀉當補則補如鼓之應桴惡有不下者乎心脹者心俞主之亦取列缺肺脹者肺俞主之亦取太淵肝脹者肝俞主之亦取太衝脾脹者脾俞主之亦取太白腎脹者腎俞主之亦取太溪胃脹者中脘主之亦取章門大腸脹者天樞主之小腸脹者中窖主之膀胱脹者曲骨主之三焦脹者石門主之膽脹者陽陵泉主之五臟六腑之脹皆取三里三里者脹之要穴也水膚脹鼓脹腸覃石瘕第四黃帝問曰水與膚脹鼓脹腸覃石瘕何以別之岐伯對曰水之始起也目窠上微腫如新臥起之狀頸脈動時咳陰股間寒足脛腫腹乃大其水已成也以手按其腹隨手而起如裹水之狀此其候也膚脹者寒氣客於皮膚之間殼殼然不堅腹大身盡腫皮膚厚按其腹腹陷而不起腹色不變此其候也鼓脹者腹身皆腫大如膚脹等其色蒼黃腹筋一本作脈起此其候也腸覃者寒氣客於腸外與衛氣相搏正氣不得營因有所繫瘕而內著惡氣乃起息肉乃生其始生也大如雞卵稍以益大至其成也如杯子狀久者離歲月按之則堅推之則移月事時下此其候也石瘕者生於胞中寒氣客於子門子門閉塞氣不通惡血當瀉不瀉血衃乃留止日以益大狀如杯子月事不以時下皆生於女子可導而下之曰膚脹鼓脹可刺耶曰先刺其腹之血絡後調其經亦刺去其血脈曰有病心腹滿旦食則不能暮食此為何病曰此名為鼓脹治之以雞矢醴一劑知二劑已曰其時有復發者何也曰此食飲不節故時有病也雖然其病且已因當風氣聚於腹也風水膚脹為五十九刺靈樞作五十七刺取皮膚之血者盡取之徒水先取環谷下三寸以䤵針刺之而藏之引而內之入而復出以盡其水必堅束之束緩則煩悶束急則安靜間日一刺之水盡乃止飲則閉藥方刺之時徒飲之方飲無食方食無飲無食他食百三十五日水腫人中盡滿唇反者死水溝主之水腫大臍平灸臍中無理不治水腫水氣行皮中陰交主之水腫腹大水脹水氣行皮中石門主之石水痛引脅下脹頭眩痛身盡熱關元主之振寒大腹石水四滿主之石水刺氣衝石水章門及然谷主之石水天泉主之腹中氣盛腹脹逆千金作水脹逆不得臥陰陵泉主之水中留飲胸脅支滿刺陷谷出血立已水腫脹皮腫三里主之胞中有大疝瘕積聚與陰相引而痛苦湧泄上下出補尺澤太溪手陽明寸口皆補之腎風發風水面胕腫第五黃帝問曰少陰何以主腎腎何以主水岐伯對曰腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也其本在腎其末在肺皆積水也曰腎何以聚水而生病曰腎者胃之關也關門不利故聚水而從其類上下溢於皮膚故為胕腫胕腫者聚水而生病也曰諸水皆主於腎乎曰腎者牝藏也地氣上者屬於腎而生水液故曰至陰勇而勞甚則腎汗出腎汗出逢於風內不得入於腑臟外不得越於皮膚客於玄府行於皮里傳為胕腫本之於腎名曰風水曰有病腎風者面胕龐然腫素問無腫字壅害於言可刺否曰虛不當刺不當刺而刺後五日其氣必至曰其至何如曰至必少氣時從胸背上至頭汗出手熱口乾苦渴小便黃目下腫腹中鳴身重難行月事不來煩而不能食食不能正偃正偃則咳甚病名曰風水曰願聞其說曰邪之所湊其氣必虛陰虛者陽必湊之故少氣時熱而汗出小便黃小便黃者少腹氣熱也不能正偃者胃中不和也正偃則咳甚上迫肺也諸有水氣者微腫見於目下曰何以言之曰水者陰也目下亦陰也腹者至陰之所居故水在腹者必使目下腫真氣上逆故口苦舌乾臥不得正偃則咳出清水也諸水病者皆不得臥臥則驚驚則咳甚也腹中鳴者脾本於胃也傳脾則煩不能食食不下者胃脘隔也身重難以行者胃脈在足也月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也曰有病龐然如水氣狀切其脈大緊身無痛者形不瘦不能食食少名為何病曰病主素問作生在腎名曰腎風腎風而不能食善驚不已素無不字心氣痿者死風水膝腫巨虛上廉主之面胕腫上星主之先取噫嘻後取天牖風池主之風水面胕胕一作浮腫衝陽主之風水面胕腫顏黑解溪主之
