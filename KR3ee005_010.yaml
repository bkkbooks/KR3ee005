body:
  text: 卷十陰受病發痹第一上黃帝問曰周痹之在身也上下移徙隨其脈上下左右相應間不容空願聞此痛在血脈之中耶將在分肉之間乎何以致是其痛之移也間不及下針其蓄痛之時不及定治而痛已止矣何道使然岐伯對曰此衆痹也非周痹也此各在其處更發更止更居更起以左應右以右應左非能周也更發更休刺此者痛雖已止必刺其處勿令復起曰周痹何如曰周痹在於血脈之中隨脈以上循脈以下不能左右各當其所其痛從上下者先刺其下以通之通一作遏後刺其上以脫之其痛從下上者先剌其上以通之後刺其下以脫之曰此病安生因何有名曰風寒濕氣客於分肉之間迫切而為沫沫得寒則聚聚則排分肉而分裂分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痹發發則如是此內不在臟而外未發於皮獨居分肉之間真氣不能周故名曰周痹故刺痹者必先循切其上下之大經視其虛實及大絡之血結而不通者及虛而脈陷空者而調之尉而通之其瘈緊者轉引而行之曰何以候人之善病痹者少俞對曰粗理而肉不堅者善病痹欲知其高下視其三部曰刺有三變何也曰有刺營者有刺衛者有刺寒痹之留經者刺營者出血刺衛者出氣刺寒痹者內熱曰營衛寒痹之為病奈何曰營之生病也寒熱少氣血上下行衛之生病也氣血時來去怫愾賁向風寒客於腸胃之中寒痹之為病也留而不去時痛而皮不仁曰刺寒痹內熱奈何曰刺布衣者用火淬之刺大人者藥尉之方用醇酒二十升蜀椒一升乾薑一升桂一升凡四物各細㕮咀著清酒中綿絮一斤細白布四丈二尺並納酒中置酒馬矢熅中善封塗勿使氣泄五日五夜出布絮曝乾復漬之以盡其汁每漬必晬其日乃出布絮干之並用滓與絮布長六七尺為六巾即用之生桑炭炙巾以尉寒痹所乘之處令熱入至於病所寒復炙巾以尉之三十遍而止即汗出炙巾以拭身亦三十遍而止起步內中無見風每刺必尉如此病已失此所謂內熱曰痹將安生曰風寒濕三氣合至雜而為痹其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹曰其有五者何也曰以冬遇此者為骨痹以春遇此者為筋痹以夏遇此者為脈痹以至陰遇此者為肌痹以秋遇此者為皮痹曰內舍五臟六腑何氣使然曰五臟皆有合病久而不去者內舍於合故骨痹不已復感於邪邪內舍於腎筋痹不已邪復感於內舍於肝脈痹不已復感於邪內舍於心肌痹不已復感於邪內舍於脾皮痹不已復感於邪內舍於肺所謂痹者各以其時感於風寒濕之氣也諸痹不已亦益內也其風氣勝者其人易已曰其時有死者或疼久者或易已者何也曰其入臟者死其留連筋骨間者疼久其留連皮膚間者易已曰其客六腑者何如曰此亦其飲食居處為其病本也六腑各有俞風寒濕氣中其俞而食飲應之循俞而入各舍其腑也曰以針治之奈何曰五臟有俞六腑有合循脈之分各有所發各治其過則病瘳矣曰營衛之氣亦令人痹乎曰營者水穀之精氣也和調五臟灑陳六腑乃能入於脈故循脈上下貫五臟絡六腑衛者水穀之悍氣也其氣慓疾滑利不能入於脈也故循皮膚之中分肉之間熏於肓膜聚素問作散於胸腹逆其氣則病順其氣則愈不與風寒濕氣合故不為痹也陰受病發痹第一下黃帝問曰痹或痛或不痛或不仁或寒或熱或燥或濕者其故何也岐仁對曰痛者其寒氣多有寒故痛其不痛不仁者病久入深營衛之行澀經絡時疏故不痛皮膚不營故不仁其寒者陽氣少陰氣多與病相益故為寒其熱者陽氣多陰氣少病氣勝陽乘陰故為熱其多寒汗出而濡者此其逢濕勝也其陽氣少陰氣盛兩氣相感故寒汗出而濡也夫痹在骨則重在脈則凝而不流在筋則屈而不伸在肉則不仁在皮則寒故具此五者則不痛凡痹之類逢寒則急逢熱則縱曰或有一脈生數十病者或痛或癰或熱或癢或痹或不仁變化無有窮時其故何也曰此皆邪氣之所生也曰人有真氣有正氣有邪氣何謂也曰真氣者所受於天與水穀氣並而充身者也正氣者正風從一方來非虛風也太素云非災風也邪氣者虛風也虛風之賊傷人也其中人也深不得自去正風之中人也淺而自去其氣柔弱不能傷真氣故自去虛邪之中人也淒索動形起毫毛而發腠理其入深內薄於骨則為骨痹薄於筋則為筋攣薄於脈中則為血閉而不通則為癰薄於肉中與衛氣相搏陽勝則為熱陰勝則為寒寒則其氣去去則虛虛則寒薄於皮膚其氣外發腠理開毫毛搖氣一本作淫氣往來微行則為癢氣留而不去故為痹衛氣不去則為不仁病在骨骨重不可舉骨髓痠痛寒氣至名曰骨痹深者刺無傷脈肉為故其道大小分骨熱病已止病在筋筋攣節痛不可以行名曰筋痹刺筋上為故刺分肉間不可中骨病起筋熱病已止病在肌膚肌膚盡痛名曰肌痹傷於寒濕刺大分小分多髮針而深之以熱為故無傷筋骨筋骨傷癰發若變諸分盡熱病已止曰人身非衣寒也中非有寒氣也寒從中生者何曰是人多痹陽氣少而陰氣多故身寒如從水中出曰人有身寒湯火不能熱也厚衣不能溫也然不為凍栗是為何病曰是人者素腎氣勝以水為事太陽氣衰腎脂枯不長一水不能勝兩火腎者水也而主骨腎不生則髓不能滿故寒甚至骨所以不能凍栗者肝一陽也心二陽也腎孤臟也一水不能勝上二火故不能凍栗病名曰骨痹是人當攣節著痹不去久寒不已為肝痹一作骭痹骨痹舉節不用而痛汗注煩心取三陰之經補之厥痹者厥氣上及腹取陰陽之絡視主病者瀉陽補陰經也風痹注靈樞作淫濼病不可已者足如履冰時如入湯中肢脛淫濼煩心頭痛時嘔時悶眩已汗出久則目眩悲以喜怒短氣不樂不出三年死足髀不可舉側而取之在樞闔中以員利針大針不可膝中痛取犢鼻以員利針針發而間之針大如犛刺膝無疑足不仁刺風府腰以下至足清不仁不可以坐起尻不舉腰俞主之痹會陰及太淵消濼照海主之嗜臥身體不能動搖大溫一本作濕三陽絡主之骨痹煩滿商丘主之足下熱痛不能久坐濕痹不能行三陰交主之膝內廉痛引臏不可屈伸連腹引咽喉痛膝關主之痹脛重足跗不收跟痛巨虛下廉主之脛痛足緩失履濕痹足下熱不能久立條口主之脛苕苕一本作苦痹膝不能屈伸不可以行梁丘主之膝寒痹不仁不可屈伸髀關主之膚痛痿痹外丘主之膝外廉痛不可屈伸脛痹不仁陽關主之髀痹引膝股外廉痛不仁筋急陽陵泉主之寒氣在分肉間痛上下筋痹不仁中瀆主之髀樞中痛不可舉以毫針寒留之以月生死為痏數立已長針亦可腰脅相引急痛髀筋瘈脛痛不可屈伸痹不仁環跳主之風寒從足小指起脈痹上下帶胸脅痛無常處至陰主之足大指搏傷下車挃地通背指端傷為筋痹解溪主之陽受病發風第二上黃帝問曰風之傷人也或為寒熱或為熱中或為寒中或為厲風或為偏枯其為風也其病各異其名不同或內至五臟六腑不知其解願聞其說岐伯對曰風氣藏於皮膚之間內不得通外不得泄風氣者善行而數變腠理開則淒素問作灑然寒閉則熱而悶其寒也則衰食飲其熱也則消肌肉使人解㑊素問作怢栗悶而不能食名曰寒熱風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出風氣與太陽俱入行諸脈俞散分肉間衛氣悍邪時與衛氣相干素問無衛氣悍邪時五字其道不利故使肌肉䐜脹而有瘍衛氣凝而有所不行故其肉有不仁厲者有榮氣熱浮其氣不清故使鼻柱壞而色敗皮膚瘍以潰風寒客於脈而不去名曰厲風或曰寒熱以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以季夏戊己傷於風者為脾風以秋庚辛傷於風者為肺風以冬壬癸傷於風者為腎風風氣中五臟六腑之俞亦為臟腑之風各入其門戶風之所中則為偏風風氣循風府而上則為腦風入系頭則為目風眼寒飲酒中風則為漏風入房汗出中風則為內風新沐中風則為首風久風入中則為腸風飧泄而外在腠理則為泄風故風者百病之長也至其變化乃為他病無常方然故有風氣也肺風之狀多汗惡風色皏音平然白時咳短氣晝日則差暮則甚診在眉上其色白心風之狀多汗惡風焦絶善怒色赤病甚則言不快診在口其色赤肝風之狀多汗惡風善悲色微蒼嗌乾善怒時憎女子診在目下其色青脾風之狀多汗惡風身體怠惰四肢不欲動色薄微黃不嗜食診在鼻上其色黃腎風之狀多汗惡風面龐然浮腫腰脊痛不能正立色炲隱曲不利診在肌上其色黑胃風之狀頸多汗惡風食飲不下鬲塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大首風之狀頭痛面多汗惡風先當風一日則病甚頭痛不可以出內至其風日則病少愈漏風之狀或多汗常不可單衣食則汗甚則身汗喘息惡風衣常濡口乾善渴不能勞事泄風之狀多汗汗出泄衣上咽素問作口中干上漬其風不能勞事身體盡痛則寒曰邪之在經也其病人何如取之奈何曰天有宿度地有經水人有經脈天地溫和則經水安靜天寒地凍則經水凝泣天暑地熱則經水沸溢卒風暴起關經水波舉素問作湧而隴起夫邪之入於脈中寒則血凝泣暑則氣淖澤虛邪因而入客也亦如經水之得風也經之動脈其至也亦時隴起於脈中循循然其至寸口中手也時大時小大則邪至小則平其行無常處在陰與陽不可為度循而察之三部九候卒然逢之早遏其路吸則內針無令氣忤靜以久留無令邪布吸則轉針以得氣為故候呼引針呼盡乃去大氣皆出故名曰瀉曰不足者補之奈何曰必先捫而循之切而散之推而按之彈而怒之抓而下之通而散之外引其門以閉其神呼盡內針靜以久留以氣至為故知待所貴不知日暮其氣已至適以自護候吸引針氣不得出各在其外推闔其門令真氣素問作神氣存大氣留止故名曰補曰候氣奈何曰夫邪去絡入於經舍於血脈之中其寒溫未相得如湧波之起也時來時去故不常在故曰方其來也必按而止之止而取之無迎素問作逢其沖而瀉之真氣者經氣也經氣大虛故曰其氣素問作其來不可逢此之謂也故曰候邪不審大氣已過瀉之則真氣脫脫則不復邪氣益至而病益畜故曰其往不可追此之謂也不可掛以發者待邪之至時而髮針瀉焉若先若後者血氣已盡其病不下故曰知其可取如發機不知其取如叩椎故曰知機道者不可掛以發不知機者叩之不發此之謂也曰真邪以合波隴不起候之奈何曰審捫循三部九候之盛虛而調之不知三部者陰陽不別天地不分地以候地天以候天人以候人調之中府以定三部故曰刺不知三部九候病脈之處雖有大過且至工不得素問作能禁也誅罰無過命曰大惑反亂大經真不可復用實為虛以邪為正素問作真用針無義反為氣賊奪人正氣以順為逆營衛散亂真氣已失邪獨內著絶人長命豫人夭殃不知三部九候故不能久長固素問作因不知合之四時五行因加相勝釋邪攻正絶人長命邪之新客來也未有定處推之則前引之則上逢而瀉之其病立已曰人之善病風灑灑汗出者何以候之曰肉不堅腠理疏者善病風曰何以候肉之不堅也曰膕肉不堅而無分理者肉不堅膚粗而皮不致者腠理疏也陽受病發風第二下黃帝問曰刺節言解惑者盡知調諸陰陽補瀉有餘不足相傾移也何以解之岐伯對曰大風在身血脈偏虛虛者不足實者有餘輕重不得傾側宛狀不知東西南北乍上乍下反復顛倒無常甚於迷惑補其不足瀉其有餘陰陽平復用針如此疾於解惑淫邪偏客於半身其入深內居營衛營衛稍衰則真氣去邪氣獨留發為偏枯其邪氣淺者脈偏痛風逆暴四肢痛身漯漯唏然時寒飢則煩飽則善變取手太陰表裡足少陰陽明之經肉反清取營骨清取井經也偏枯身偏不用而痛言不變智不亂病在分腠之間巨針取之益其不足損其有餘乃可復也痱之為病也身無痛者四肢不收智亂不甚其言微知可治甚則不能言不可治也病先起於陽後入於陰者先取其陽後取其陰必審其氣之浮沉而取之病大風骨節重鬚眉墜名曰大風刺肌肉為故汗出百日刺骨髓汗出百日凡二百日鬚眉生而止針曰有病身熱懈惰汗出如浴惡風少氣此為何病曰名酒風治之以澤瀉術各十分麋銜五分合以三指撮為後飲身有所傷出血多及中風寒若有所墜墮四肢解㑊不收名曰體解取其少腹臍下三結交三結交者陽明太陰一本作陽臍下三寸關元也風眩善嘔煩滿神庭主之如顏青者上星主之取上星者先取噫嘻後取天牖風池頭痛顏青者囟會主之風眩引頷痛上星主之取上星亦如上法風眩目瞑惡風寒面赤腫前頂主之頂上痛風頭重目如脫不可左右顧百會主之風眩目眩顱上痛後頂主之頭重頂痛目不明風到腦中寒重衣不熱汗出頭中惡風刺腦戶主之頭痛項急不得傾倒目眩鼻不得喘息舌急難言刺風府主之頭眩目痛頭半寒千金下有痛字玉枕主之腦風目瞑頭痛風眩目痛腦空主之頸頷榰滿痛引牙齒口噤不開急痛不能言曲鬢主之頭痛引頸竅陰主之風頭耳後痛煩心及足不收失履口喎僻頭項搖瘈痛牙車急完骨主之眩頭痛重目如脫項似拔狂見鬼目上反項直不可以顧暴攣足不任身痛欲折天柱主之腰脊強不得俯仰刺脊中大風汗出膈俞主之又噫嘻主之素問骨空論云大風汗出灸噫嘻眩頭痛刺絲竹空主之口僻顴窖及齦交下關主之面目惡風寒䪼腫臃痛招搖視瞻瘛瘲口僻巨窖主之口不能水漿喎僻水溝主之口僻噤外關主之瘛瘲口沫出上關主之偏枯四肢不用善驚大巨主之大風逆氣多寒善悲大橫主之手臂不得上頭尺澤主之風汗出身腫喘喝多睡恍惚善忘嗜臥不覺天府主之在腋下三寸臂內動脈之中風熱善怒中心喜悲思慕歔欷善笑不休勞宮主之兩手攣不收伸及腋偏枯不仁手瘈偏小筋急大陵主之頭身風善嘔怵寒中少氣掌中熱胕急腋腫間使主之足不收痛不可以行天泉主之足下緩失履衝陽主之手及臂攣神門主之痱痿臂腕不用唇吻不收合谷主之肘痛不能自帶衣起頭眩頷痛面黑風肩背痛不可顧關衝主之嗌外腫肘臂痛五指瘈不可屈伸頭眩頷額顱痛中渚主之馬刀腫瘻目痛肩不舉心痛楮滿逆氣汗出口噤不可開支溝主之大風默默不知所痛嗜臥善驚瘛瘲千金云悲傷不樂天井主之偏枯臂腕發痛肘屈不得伸手又風頭痛涕出肩臂頸痛項急煩滿驚五指掣不可屈伸戰怵腕骨主之風眩驚手腕痛千金手腕痛作手卷泄風汗出至腰陽谷主之風逆暴四肢腫濕則唏然寒飢則煩心飽則眩大都主之風入腹中俠臍急胸痛脅滿楮衄不止五指端盡痛足不得地湧泉主之偏枯不能行大風默默不知所痛視如見星溺黃小腹熱咽乾照海主之瀉左陰蹺右少陰俞先刺陰蹺後刺少陰在橫骨中風逆四肢腫復留主之風從頭至足面目赤口痛齧舌解溪主之大風目外眥痛身熱痱缺盆中痛臨泣主之善自齧頰偏枯腰髀樞痛善搖頭京骨主之大風頭多汗腰尻腹痛腨跟腫上齒痛脊背尻重不欲起聞食臭惡聞人音泄風從頭至足崑崙主之痿厥風頭重頞痛樞股腨外廉骨痛瘛瘲痹不仁振寒時有熱四肢不舉趺陽主之腰痛頸項痛歷節汗出而步履寒復不仁腨中痛飛揚主之八虛受病發拘攣第三黃帝問曰人有八虛各以何候岐伯對曰肺心有邪其氣留於兩腋肝有邪其氣留於兩肘脾有邪其氣留於兩髀腎有邪其氣留於兩膕凡此八虛者此機關之室真氣之所過血絡之所由是八邪氣惡血因而得留留則傷筋骨機關不得屈伸故拘攣暴拘攣癇眩足不任身取天柱主之腋拘攣暴脈急引脅而痛內引心肺噫嘻主之從項至脊自脊以下至十二椎應手刺之立已轉筋者立而取之可令遂已痿厥者張而引之可令立快矣熱在五臟發痿第四黃帝問曰五臟使人痿何也岐伯對曰肺主身之皮毛心主身之血脈肝主身之筋膜脾主身之肌肉腎主身之骨髓故肺氣熱則葉焦焦則皮毛虛弱急薄著著則生痿躄矣故心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折瘈脛腫而不任地素問瘈作挈腫作瘲肝氣熱則膽熱泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿脾氣熱則胃干而渴肌肉不仁發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿曰何以得之曰肺者臟之長也為心之蓋有所亡失所求不得則發為肺鳴鳴則肺熱葉焦發為痿躄悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下崩數溲血故本病曰大經空虛發為肌痹傳為脈痿思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫故下經曰筋痿生於肝使內也有漸於濕以水為事若有所留居處傷濕肌肉濡漬痹而不仁發為肉痿故下經曰肉痿者得之濕地有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱合素問作舍於腎腎者水臟今水不勝火則骨枯而髓空故足不任身熱發為骨痿故下經曰骨痿生於大熱曰何以別之曰肺熱者色白而毛敗心熱者色赤而絡脈溢肝熱者色蒼而爪枯脾熱者色黃而肉蠕動腎熱者色黑而齒槁曰治痿者獨取陽明何謂也曰陽明者五臟六腑之海主潤宗筋宗筋者主束骨而利機關衝脈者經脈之海主滲灌溪谷與陽明合於宗筋陰陽總宗筋之會會於氣衝而陽明為之長皆屬於帶脈而絡於督脈故陽明虛則宗筋縱帶脈不引故足痿不用治之各補其營而通其俞調其虛實和其逆順則筋脈骨肉各以其時受月則病矣痿厥為四末束悶乃疾解之日二不仁者十日而知無休病已止足緩不收痿不能行不能言語手足痿躄不能行地倉主之痿不相知一云身重骨痿不相知太白主之痿厥身體不仁手足偏小先取京骨後取中封絶骨皆瀉之痿厥寒足腕不收躄坐不能起髀樞腳痛丘墟主之虛則痿躄坐不能起實則厥脛熱肘痛身體不仁手足偏小善齧頰光明主之手太陰陽明太陽少陽脈動發肩背痛肩前臑皆痛肩似拔第五肩痛不可舉天容及秉風主之肩背髀痛臂不舉寒熱淒索肩井主之肩腫不得顧氣舍主之肩背髀不舉血瘀肩中不能動搖巨骨主之肩中熱指臂痛肩髃主之肩重不舉臂痛肩窖主之肩重肘臂痛不可舉天宗主之肩胛中痛而寒至肘肩外俞主之肩胛周痹曲垣主之肩痛不可舉引缺盆痛雲門主之肘痛尺澤主之臂瘈引口中寒䪼腫肩腫引缺盆商陽主之肩肘中痛難屈伸手不可舉腕重急曲池主之肩肘節酸重臂痛不可屈伸肘窖主之肩痛不能自舉汗不出頸痛陽池主之肘中濯濯臂內廉痛不可及頭外關主之肘痛引肩不可屈伸振寒熱頸項肩背痛臂痿痹不仁千金雲肩內麻木天井主之肩不可舉不能帶衣清冷淵主之肘臂腕中痛頸腫不可以顧頭項急痛眩淫濼肩胛小指痛前谷主之肩痛不可自帶衣臂腕外側痛不舉陽谷主之臂不可舉頭項痛咽腫不可咽前谷主之肩痛欲折臑如拔手不能自上下養老主之肩背頭痛時眩湧泉主之水漿不消發飲第六溢飲脅下堅痛中脘主之腰清脊強四肢懈惰善怒咳少氣郁然不得息厥逆肩不可舉馬刀瘻身瞤章門主之溢飲水道不通溺黃小腹痛裡急腫洞泄體痛引骨京門主之飲渴身伏多唾隱白主之腠理氣臑會主之
