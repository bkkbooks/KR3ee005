body:
  text: 卷七六經受病發傷寒熱病第一上黃帝問曰夫熱病者皆傷寒之類也或愈或死其死皆以六七日之間其愈皆以十日以上者何也岐伯對曰太陽者諸陽之屬也其脈連於風府故為諸陽主氣人之傷於寒也則為病熱熱雖甚不死其兩感於寒而病者必不免於死矣傷寒一日太陽受之故頭項痛腰脊背強素問無背字二日陽明受之陽明主肉其脈俠鼻絡於目故身熱目痛而鼻乾不得臥三日少陽受之少陽主骨素問作膽其脈循脅絡於耳故胸脅痛而耳聾三陽素下有經絡二字皆受病而未入於腑素問作臟者故可汗而已四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾五日少陰受之少陰脈貫腎絡肺系舌本故口燥舌乾而渴六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮三陰三陽五臟六腑皆受病營衛不行五臟不通則死矣其不兩感於寒者七日太陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止素問下有不滿二字舌乾乃已十二日厥陰病衰囊縱少腹微下大氣皆下其病日已矣治之各通其臟脈病日衰已矣其未滿三日者可汗而已其滿三日者可泄而已曰熱病已愈時有所遺者何也曰諸遺者熱甚而強食故有所遺若此者皆病已衰而熱有所藏因其穀氣相搏兩熱相合故有所遺治遺者視其虛實調其逆順可使立已病熱少愈食肉則復多食則遺此其禁也其兩感於寒者一日太陽與少陰俱病則頭痛口乾煩滿二日陽明與太陰俱病則腹滿身熱不欲食譫語三日少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人者故六日而死矣曰五臟已傷六腑不通營衛不行如是後三日乃死何也曰陽明者十二經脈之長其血氣盛故不知人三日其氣乃盡故死肝熱病者小便先黃腹痛多臥身熱熱爭則狂言及驚胸中素問無胸中二字脅滿痛手足躁不得安臥庚辛甚甲乙大汗氣逆則庚辛死刺足厥陰少陽其逆則頭疼貢貢素問作員字脈引沖頭痛也心熱病者先不樂數日乃熱熱爭則心素心字作卒心痛三字煩悶善嘔頭痛面赤無汗壬癸甚丙丁大汗氣逆則壬癸死刺手少陰太陽脾熱病者先頭重頰痛煩心素下有顏青二字欲嘔身熱熱爭則腰痛不可用俯仰腹滿泄兩頷一本作額痛甲乙甚戊己大汗氣逆則甲乙死刺足太陰陽明肺熱病者先悽悽然厥起皮毛惡風寒舌上黃身熱熱爭則喘咳痛走胸膺背不得大息頭痛不甚素作堪汗出而寒丙丁甚庚辛大汗氣逆則丙丁死刺手太陰陽明出血如大豆立已腎熱病者先腰痛胻酸苦渴數飲身熱熱爭則項痛而強胻寒且酸足下熱不欲言其逆則項痛員員素問下有淡淡二字然戊己甚壬癸大汗氣逆則戊己死刺足少陰太陽諸當汗者至其所勝日汗甚肝熱病者左頰先赤心熱病者顏頷先赤脾熱病者鼻先赤肺熱病者右頰先赤腎熱病者頤先赤病雖未發者見赤色者刺之名曰治未病熱病從部所起者至期而已其刺之反者三周而已重逆則死諸治熱病先飲之寒水乃刺之必寒衣之居止寒處身寒而止病甚者為五十九刺熱病先胸脅痛滿手足躁刺足少陽補足太陰病甚者為五十九刺熱病先身重骨痛耳聾好瞑刺足少陰病甚者為五十九刺熱病先眩冒而熱胸脅滿刺足少陰少陽太陽之脈色榮顴骨熱病也榮未夭素問作未交下同曰今且得汗待時自已與厥陰脈爭見者死其死不過三日熱病氣內連腎少陽之脈色榮頰前熱病也榮未夭曰今且得汗待時自已與手少陰脈爭見者死其死不過三日其熱病氣穴三椎下間主胸中熱四椎下間主胃中熱五椎下間主肝熱六椎下間主脾熱七椎下間主腎熱榮在骶也項上三椎骨陷者中也頰下逆顴為大瘕下牙車為腹滿顴後為脅痛頰上者鬲上也冬傷於寒春必溫病夏傷於暑秋必病瘧凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑暑當與汗皆出勿止所謂玄府者汗孔也曰刺節言徹衣者盡刺諸陽之奇俞未有常處願卒聞之曰是陽氣有餘而陰氣不足陰氣不足則內熱陽氣有餘則外熱兩熱相搏熱於懷炭衣熱不可近身身熱不可近席腠理閉塞而不汗舌焦唇槁䘁黃帝古針經作槁臘嗌乾欲飲取天府大杼三痏刺中膂以去其熱補手足太陰以去其汗熱去汗晞疾於徹衣八十一難曰陽虛陰盛汗出而愈下之即死陽盛陰虛汗出而死下之即愈與經乖錯於義反倒不可用也曰人有四肢熱逢風寒如灸如火者何也曰是人陰氣虛陽氣盛四肢熱者陽也兩陽相得而陰氣虛少少水不能滅盛火而陽氣獨治獨治者不能生長也獨盛而止耳故逢風如灸如火者是人當肉爍也曰人身非常溫也非常熱也而煩滿者何也曰陰氣少陽氣勝故熱而煩滿曰足太陰陽明為表裡脾胃脈也生病異者何也曰陰陽異位更實更虛更逆更順或從內或從外所從不同故病異名陽者天氣也主外陰者地氣也主內陽道實陰道虛故犯賊風虛邪者陽受之則入腑食飲不節起居不時者陰受之則入臟入六腑則身熱不得眠上為喘呼入五臟則䐜滿閉塞下為飧泄久為腸澼故喉主天氣咽主地氣故陽受風氣陰受濕氣故陰氣從足上行至頭而下行循臂至指端陽氣從手上行至頭而下行至足故曰陽病者上行極而下陰病者下行極而上故傷於風者上先受之傷於濕者下先受之也六經受病發傷寒熱病第一中黃帝問曰病熱有所痛者何也岐伯對曰病熱者陽脈也以三陽之盛也人迎一盛在少陽二盛在太陽三盛在陽明夫陽入於陰故病在頭與腹乃䐜脹而頭痛也曰病身熱汗出而煩滿不解者何也曰汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥太陽為諸陽主氣素問作巨陽主氣故先受邪少陰其表裡也得熱則上從上從則厥治之表裡刺之飲之服湯曰溫病汗出輒復熱而脈躁疾者不為汗衰狂言不能食病名曰何曰名曰陰陽交交者死人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪退精勝精勝則當能食而不復熱復熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也不能食者精無裨也熱而留者壽可立而傾也夫汗出而脈躁盛者死今脈不與汗相應此不勝其病其死明矣狂言者是失志失志者死此有三死不見一生雖愈必死病風且寒且熱炅汗出一日數缺先刺諸分理絡脈汗出且寒且熱三日一刺百日而已曰何謂虛實曰邪氣盛則實精氣奪則虛重實者內素問作言大熱病氣熱脈滿是謂重實曰經絡俱實何如曰經絡皆實是寸脈急而尺緩也皆當俱治故曰滑則順澀則逆夫虛實者皆從其物類治素問作始故五臟骨肉滑利可以久長寒氣暴上脈滿而實實而滑順則生實而逆則死盡滿者脈急大堅尺滿一作澀而不應也如是者順則生逆則死所謂順者手足溫所謂逆者手足寒也曰何謂重虛曰脈虛氣虛尺虛是謂重虛也所謂氣虛者言無常也尺虛者行步恇然也脈虛者不象陰也如此者滑則生澀則死氣虛者肺虛也氣逆者足寒也非其時則生當其時則死餘臟皆如此也脈實滿手足寒頭熱一作痛者春秋則生冬夏則死脈浮而澀澀而身有熱者死絡氣不足經氣有餘者脈口熱而尺寒秋冬為逆春夏為順治主病者經虛絡滿者尺熱滿脈口寒澀春夏死秋冬生絡滿經虛灸陰刺陽經滿絡虛刺陰灸陽曰秋冬無極陰春夏無極陽者何謂也曰無極陽者春夏無數虛陽明陽明虛則狂無極陰者秋冬無數虛太陰太陰虛則死春極治經絡夏極治經俞秋極治六腑冬則閉塞治用藥而少針石所謂少針石者非癰疽之謂也熱病始手臂者先取手陽明太陰而汗出始頭首者先取項太陽而汗出始足脛者先取足陽明而汗出臂太陰靈樞作陽可出汗足陽明可出汗取陰而汗出甚者止之陽取陽而汗出甚者止之陰振寒悽悽鼓頷不得汗出腹脹煩悶取手太陰熱病三日氣口靜人迎躁者取之諸陽五十九刺以瀉其熱而出其汗實其陰以補其不足身熱甚陰陽皆靜者勿刺之其可刺者急取之不汗則泄所謂勿刺皆有死徵也熱病七日八日脈口動喘而眩者急刺之汗且自出淺刺手大指間熱病七日八日脈微小病者溲血口中乾一日半而死脈代者一日死熱病已得汗而脈尚躁一本作盛喘且復熱勿庸一本作膚刺喘盛者必死熱病七日八日脈不躁不散數後三日中有汗三日不汗四日死未汗勿庸刺熱病先膚痛窒鼻充面取之皮以第一針五十九刺苛鼻乾靈樞作診鼻乾索於皮肺不得索之於火火者心也熱病先身澀煩而熱煩悶唇嗌乾取之皮以第一針五十九刺熱病膚脹口乾寒汗出索脈於心不得索之於水水者腎也熱病嗌乾多飲善驚臥不能安取之膚肉以第六針五十九刺目眥赤靈樞作青索肉於脾不得索之於木木者肝也熱病而胸脅痛靈樞作面青胸痛手足躁取之筋間以第四針針於四逆筋躄目浸索筋於肝不得索之於金金者肺也熱病數驚瘛瘲而狂取之脈以第四針急瀉有餘者癲疾毛髮去索血於心不得索之於腎腎者水也熱病身重骨痛耳聾好瞑取之骨以第四針五十九刺骨病不食齧齒耳青赤索骨於腎不得索之於土土者脾也熱病不知所病耳聾不能自收口乾陽熱甚陰頗有寒者熱在髓也死不治熱病頭痛顳顬目脈緊一本作瘈善衄厥熱病也取之以第三針視有餘不足寒熱痔一作痛熱病體重腸中熱取之以第四針於其俞及下諸指間索氣於胃絡得氣也熱病俠臍急痛胸脅滿取之湧泉與陰陵泉以第四針針嗌裡熱病而汗且出及脈順可汗者取魚際太淵大都太白瀉之則熱去補之則汗出汗出太甚取內踝上橫脈以止之熱病已得汗而脈尚躁盛者此陰脈之極也死其得汗而脈靜者生熱病脈常躁盛而不得汗者此陽脈之極也死其脈躁盛得汗而脈靜者生厥俠脊而痛主頭項𠘧𠘧目䀮䀮然腰脊強取足太陽膕中血絡嗌乾口熱如膠取足少陽此條出素問刺腰痛篇宜在後刺腰痛內熱病死候有九一曰汗不出大顴發赤者死太素云汗不出大顴發赤者必不反而死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿者死五曰汗不出嘔血靈樞作嘔下血者死六曰舌本爛熱不已者死七曰咳而衄汗出出不至足者死八曰髓熱者死九曰熱而痓者死熱而痓者腰反折瘛瘲齒噤齘也凡此九者不可刺也所謂五十九刺者兩手內外側各三凡十二痏五指間各一凡八痏足亦如是頭入髮際一寸傍三分靈樞無分字各三凡六痏更入髮際三寸邊五凡十痏耳前後口下靈樞作以下者各一項中一凡六痏顛上一囟會一髮際一廉泉一風池二天柱二甲乙經原缺囟會至天柱諸穴今按靈樞經文補之素問曰五十九者頭上五行行五者以越諸陽之熱逆也大杼膺俞缺盆背椎此八者以瀉胸中之熱一作陽氣衝三里巨虛上下廉此八者以瀉胃中之熱雲門髃骨委中髓空此八者以瀉四肢之熱五臟俞傍五此十者以瀉五臟之熱凡此五十九者皆熱之左右也按二經雖不同皆瀉熱之要穴也頭腦中寒鼻衄目泣出千金作寒熱頭痛神庭主之頭痛身熱鼻窒喘息不利煩滿汗不出曲差主之頭痛目眩頸項強急胸脅相引不得傾側本神主多熱病千金下有煩滿二字汗不出上星主之先取噫嘻後取天牖風池熱病汗不出而苦嘔煩心承光主之頭項痛重暫起僵仆鼻窒鼽衄喘息不得通通天主之頭項惡風汗不出淒厥惡寒嘔吐目系急痛引頞頭重項痛玉枕主之頰清千金作喜齧頰不得視口沫泣出兩目眉頭痛臨泣主之腦風頭痛惡見風寒鼽衄鼻窒喘息不通承靈主之頭痛身熱引兩頷急一作痛腦空主之醉酒風熱發兩角一作兩目眩痛不能飲食煩滿嘔吐率谷主之千金以此條置風門項強刺喑門熱病汗不出天柱及風池商陽關衝腋門主之頸痛項不得顧目泣出多眵䁾鼻鼽衄目內眥赤痛氣厥耳目不明咽喉僂引項筋攣不收風池主之傷寒熱盛煩嘔大椎主之頭重目瞑淒厥寒熱汗不出陶道主之身熱頭痛進退往來神道主之頭痛如破身熱如火汗不出瘛瘲千金作頭痛寒熱汗不出惡寒裡急腰腹相引痛命門主之頸項痛不可以俯仰頭痛振寒瘛瘲氣實則脅滿俠脊有寒氣熱汗不出腰背痛大杼主之風眩頭痛鼻不利時嚏清涕自出風門主之悽悽振寒數缺伸鬲俞主之熱病汗不出上窖及孔最主之千金作臂厥熱病汗不出皆灸刺之此穴可以出汗肩髆間急淒厥惡寒魄戶主之項背痛引頸魄戶主之肩痛胸腹滿淒厥脊背急強神堂主之喘逆鼽衄肩胛內廉痛不可俯仰䏚季脅引少腹而痛脹噫嘻主之背痛惡寒脊強俯仰難食不下嘔吐多涎鬲俞千金作陽關主之熱病頭痛身重懸顱主之胸脅脹滿背痛惡風寒飲食不下嘔吐不留住魂門主之善嚏頭痛身熱頷厭主之熱病頭痛引目外眥而急煩滿汗不出引頷齒面赤皮痛懸釐主之熱病偏頭痛引目外眥懸釐主之頭目瞳子痛不可以視挾項強急不可以顧陽白主之頭風痛鼻鼽衄眉頭痛善嚏目如飲脫汗出寒熱面赤頰中痛項椎不可左右顧目系急瘛瘲攢竹主之寒熱淒厥鼓頷承漿主之身熱痛胸脅痛不可反側顱息主之肩背痛寒熱瘰癧繞頸有大氣暴聾氣蒙瞀耳目不開頭頷痛淚出鼻衄不得息不知香臭風眩喉痹天牖主之熱病胸中淡淡腹滿暴痛恍惚不知人手清少腹千金作心腹滿瘛瘲心痛氣滿不得息巨闕主之頭眩病身熱汗不出千金作煩滿汗不出上脘主之身寒熱陰都主之熱病象瘧振栗鼓頷腹脹睥睨喉中鳴少商主之寒厥及熱煩心少氣不足以息陰濕癢腹痛不可以食飲肘攣支滿喉中焦乾渴魚際主之熱病振栗鼓頷腹滿陰萎咳引尻溺出虛也鬲中虛食飲嘔身熱汗不出數唾血下肩背寒熱脫色目泣出皆虛也刺魚際補之病溫身熱五日以上汗不出刺太淵留針一時取之若未滿五日禁不可刺也熱病先手臂瘛瘲唇口聚鼻張目下汗出如轉珠兩乳下二寸堅脅滿悸列缺主之六經受病發傷寒熱病第一下振寒瘛瘲手不伸咳嗽唾濁氣鬲善嘔鼓頷不得汗煩滿千金作煩心身痛因為瘲衄尺澤主之左窒刺右右窒刺左兩脅下痛嘔泄上下出胸滿短氣不得汗補手太陰以出之熱病煩心心悶而汗不出掌中熱心痛身熱如火浸淫煩滿舌本痛中衝千金又作天卯主之熱病發熱煩滿而欲嘔噦三日以往不得汗怵惕胸脅痛不可反側咳滿溺赤大便千金作小便血衄不止嘔吐血氣逆噫不止嗌中痛食不下善渴舌中爛掌中熱飲嘔勞宮主之熱病煩心而汗不止肘攣腋腫善笑不休心中痛目赤黃小便如血欲嘔胸中熱苦不樂太息喉痹嗌乾喘逆身熱如火頭痛如破短氣胸痛大陵主之熱病煩心善嘔胸中淡淡善動而熱間使主之面赤皮熱熱病汗不出中風熱目赤黃肘攣腋腫實則心暴痛虛則煩心心惕惕不能動失智內關主之心淡淡然善驚身熱煩心口乾手清逆氣嘔血千金作唾時瘈善搖頭顏青汗出不過肩傷寒溫病曲澤主之多臥善唾肩髃痛寒鼻鼽赤多血浸淫起面身熱喉痹如梗目眥傷忽振寒肩疼二間主之鼻鼽衄熱病汗不出䑊音迷目目痛瞑頭痛齲齒痛泣出厥逆頭痛胸滿不得息陽溪主之熱病腸澼臑肘臂痛虛則氣鬲滿有一作手不舉溫留主之傷寒餘熱不盡曲池主之頭痛振寒清冷淵主之頭痛項背急消濼主之振寒小指不用寒熱汗不出頭痛喉痹舌卷小指之間熱口中熱煩心心痛臂內廉及脅痛聾咳瘛瘲口乾頭痛不可顧少澤主之振寒寒熱肩臑肘臂痛頭不可顧煩滿身熱惡寒目赤痛眥爛生翳膜暴痛鼽衄發聾臂重痛肘攣痂疥胸中引臑泣出而驚頸項強身寒頭不可以顧後溪主之熱病汗不出胸痛不可息頷腫寒熱耳鳴聾無所聞陽谷主之泄風汗出腰項急不可以左右顧及俯仰肩弛肘廢目痛痂疥生疣瘛瘲頭眩目痛陽谷主之振寒熱頸項腫實則肘攣頭項痛狂易虛則生疣小者痂疥支正主之風眩頭痛小海主之氣喘熱病衄不止煩心善悲腹脹逆息熱氣足脛中寒不得臥氣滿胸中熱暴泄仰息足下寒中悶嘔吐不欲食飲隱白主之熱病汗不出且厥手足清暴泄心腹脹痛心尤痛甚此胃心痛也大都主之並取隱白腹滿善嘔煩悶此皆主之熱病先頭重額痛煩悶身熱熱爭則腰痛不可以俯仰胸滿兩頷痛甚暴泄善泄飢不欲食善噫熱中足清腹脹食不化善嘔泄有膿血若嘔無所出先取三里後取太白章門主之熱病滿悶不得臥千金云不得臥身重骨痛不相知太白主之熱中少氣厥陽寒灸之熱去千金作灸湧泉煩心不嗜食咳而短氣善喘喉痹身熱脊脅相引忽忽善忘湧泉主之熱病煩心足寒清多汗先取然谷後取太溪大指間動脈皆先補之目痛引眥少腹偏痛背一作脊傴瘛瘲視昏嗜臥照海主之瀉左陰蹺取足左右少陰前先刺陰蹺後刺少陰氣在橫骨上熱病汗不出默默嗜臥溺黃少腹熱嗌中痛腹脹內腫羡音涎心痛如錐針刺太溪主之手足寒至節喘息者死熱病刺然谷千金作陷谷足先寒寒上至膝乃出針善齧頰齒唇熱病汗不出口中熱痛衝陽主之胃脘痛時寒熱皆主之熱病汗不出善噫腹脹滿胃熱譫語解溪主之厥頭痛面浮腫煩心狂見鬼善笑不休發於外有所大喜喉痹不能言豐隆主之陽厥悽悽而寒少腹堅頭痛脛股腹痛消中小便不利善嘔三里主之脅痛咳逆不得息竅陰主之及爪甲與肉交者左取右右取左立已不已復取手足清煩一作脈熱汗不出手肢轉筋頭痛如錐刺之然不可以動動益煩心喉痹舌卷干臂內廉痛不可及耳聾鳴竅陰皆主之膝外廉痛熱病汗不出目外眥赤痛頭眩兩頷痛寒逆泣出耳鳴聾多汗目癢胸中痛不可反側痛無常處俠溪主之厥四逆喘氣滿風身汗出而清髖髀中痛不可得行足外皮痛臨泣主之目視不明振寒目翳瞳子不見腰兩脅痛腳痠轉筋丘墟主之身懈寒少氣熱甚惡人心惕惕然取飛揚及絶骨跗下臨泣立已淫濼脛酸熱病汗不出皆主之頭重鼻衄及瘛瘲汗不出煩心足下熱不欲近衣項痛目翳鼻及小便皆不利至陰主之身疼痛善驚互引鼻衄通谷主之暴病頭痛身熱痛肌肉動耳聾惡風目眥爛赤項不可以顧髀樞痛泄腸澼束骨主之鼽衄血不止淫濼頭痛目白翳跟尻瘈頭頂腫痛泄注上搶心目赤眥爛無所見痛從內眥始千金作翳從內眥始腹滿頸項強腰脊不可俯仰眩心痛與肩背相引如從後觸之狀身寒從脛起京骨主之下部寒熱病汗不出體重逆氣頭眩飛揚主之鼽衄腰脊腳腨酸重戰栗不能久立腨如裂腳跟急痛足攣引少腹痛喉咽痛大便難䐜脹承山主之熱病俠脊痛委中主之足陽明脈病發熱狂走第二黃帝問曰足陽明之脈病惡人與火聞木音則惕然而驚欲獨閉戶牖而處願聞其故岐伯對曰陽明者胃脈也胃土也聞木音而驚者土惡木也陽明主肌肉其血氣盛邪客之則熱熱甚則惡火陽明厥則喘悶悶則惡人陰陽相搏陽盡陰盛故欲獨閉戶牖而處按陰陽和薄至此本在素問脈解篇士安移續於此曰或喘而生者或喘而死者何也曰厥逆連臟則死連經則生曰病甚則棄衣而走登高而歌或至不食數日逾垣上屋非其素所未能病反能者何也曰陰陽爭而外並於陽此八字亦素問脈解篇文邪盛則四肢實實則能登高而歌熱盛於身故棄衣而欲走陽盛故妄言罵詈不避親疏大熱遍身故狂言而妄見妄聞視足陽明及大絡取之虛者補之血如實者瀉之因令偃臥居其頭前以兩手四指按其頸動脈久持之卷而切推之下至缺盆中復上如前熱去乃已此所謂推而散之者也身熱狂走譫語見鬼瘛瘲身柱主之狂妄言怒火惡火善罵詈巨厥主之熱病汗不出鼽衄眩時僕而浮腫足脛寒不得臥振寒惡人與木音喉痹齲齒惡風鼻不利多善驚厲兌主之四厥手足悶者使人久持之厥熱一本作逆冷脛痛腹脹皮痛善伸數缺惡人與木音振寒嗌中引外痛熱病汗不出下齒痛惡寒目急喘滿寒栗斷口噤僻不嗜食內庭主之狂歌妄言怒惡人與火罵詈三里主之陰衰發熱厥陽衰發寒厥第三黃帝問曰厥之寒熱者何也岐伯對曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥曰熱厥必起于于足下者何也曰陽氣起於足五指之表陰脈者集於足下而聚於足心故陽勝則足下熱曰寒厥必起於五指而上於膝者何也曰陰氣起於五指之裡集於膝下而聚於膝上故陰氣盛則從五指到膝上寒其寒也不從外皆從內曰寒厥何失而然也曰厥陰者衆筋之所聚素問作前陰者宗筋之所聚太陰陽明之所合春夏則陽氣多而陰氣少秋冬則陰氣盛而陽氣衰此人質壯以秋冬奪於所用下氣上爭不能復精氣溢下邪氣從而上之所中素問所中二字作氣因於中陽氣衰不能滲營其經絡陽氣日損陰氣獨在故手足為之寒曰熱厥何如曰酒入於胃則絡脈滿而經脈虛脾主為胃行其津液者也陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不營其四肢此人必數醉若飽以入房氣聚於脾中不得散酒氣與穀氣相搏熱遍於身內熱而溺赤夫酒氣盛而慓悍腎氣日衰陽氣獨盛故手足為之熱曰厥或令人腹滿或令人暴不知人或至半日遠至一日乃知人者何謂也曰陰氣盛於上則下虛下虛則腹滿腹滿素問腹滿二字作陽氣盛於上則下氣重上而邪氣逆逆則陽氣亂陽氣亂則不知人矣太陽之厥則腫首頭重足不能行發為眩僕陽明之厥則癲疾欲走呼腹滿不得臥面赤而熱妄見妄言少陽之厥則暴聾頰腫而熱脅痛䯒不可以運太陰之厥則腹滿䐜脹後不利不欲食食則嘔不得臥少陰之厥則舌乾溺赤腹滿心痛厥陰之厥則少腹腫痛䐜脹涇溲不利好臥屈膝陰縮胻內熱盛則瀉之虛則補之不盛不虛以經取之請言解論與天地相應四時相副人參天地故可為解下有漸洳上生薄葦此所以知氣形之多少也陰陽者寒暑也熱則滋雨而在上根莖靈樞作亥少汁人氣在外皮膚緩腠理開血氣盛汗大泄皮淖澤寒則地凍水冰人氣在中皮膚致腠理閉汗不泄血氣強皮堅澀當是之時善行水者不能往冰善窮地者不能鑿凍夫善用針者亦不能取四逆血脈凝結堅搏不往來亦不可即柔故行水者必待天溫冰釋窮地者必待凍解而後地可窮人脈猶是治厥者必先尉火以調和其經掌與腋肘與腳項與脊以調其氣大道已通血脈乃行後視其病脈淖澤者刺而平之堅緊者破而決之氣下乃止此所謂解結用針之類在於調氣氣積於胃以通營衛各行其道宗氣留積在海其下者注於氣街上行者注於息道故厥在足宗氣不下脈中之血凝而留止弗之火調針弗能取用針者必先察其經絡之虛實切而循之按而彈之視其應動者乃後取而下之六經調者謂之不病雖病謂之自已一經上實下虛而不通者此必有橫絡盛加於大經令之不通視而瀉之通而決之是所謂解結者也上寒下熱先刺其項太陽久留之已刺則火尉項與肩臂令熱下合一本作冷乃止所謂推而上之者也上熱下寒視其虛脈而陷下於經絡者取之氣下而止所謂引而下之者也刺熱厥者留針反為熱刺熱厥者二陰一陽刺寒厥者一陰二陽所謂二陰者二刺陰所謂二陽者二刺陽熱厥取太陰少陽寒厥取陽明少陰於足留之厥胸滿面腫者肩中熱暴言難甚則不能言取足陽明厥氣走喉而不言手足微滿清大便不利取足少陰厥而腹膨膨多寒氣腹中爂爂音最九墟作榮便溲難取足太陰厥逆為病足暴清胸中若將裂腹腸若以刀切之䐜而不食脈大皆澀緩取足少陰清取足陽明清則補之溫則瀉之厥逆腹滿脹腸鳴胸滿不得息取之下胸三肋間咳而動應手者與背俞以指按之立快足厥喘逆足下清至膝湧泉主之太陽中風感於寒濕發痓第四熱病而痓者腰反折瘛瘲齒噤齗張仲景曰太陽病其證備其身體強𠘧𠘧然脈反沉遲者此為痓夫痓脈來按之築築而弦直上下行剛痓為病胸滿口噤臥不著席腳攣急其人必齘齒病發熱脈沉細為痓痓家其脈伏堅直上下太陽病發熱無汗惡寒此為剛痓太陽病發熱汗出不惡寒此為柔痓太陽中濕病痓其脈沉與筋平太陽痛無汗小便少氣上衝胸口噤不能語欲作剛痓然剛痓太陽中風感於寒濕者也其脈往來進退以沉遲細異於傷寒熱病其治不宜發汗針灸為嘉治之以藥者可服葛根湯風痓身反折先取太陽及膕中及血絡出血痓中有寒取三里痓取之陰蹺及三毛上及血絡出血痓取囟會百會及天柱鬲俞上關光明主之痓目不昫刺腦戶痓脊強反折瘛瘲癲疾頭重五處主之痓互引善驚太衝主之痓反折心痛形氣短尻䐜澀小便黃閉長強主之痓脊強互引惡風時振栗喉痹大氣滿喘胸中鬱郁氣熱䀮䀮項強寒熱偃仆不能久立煩滿裡急身不安席大椎主之痓筋痛急互引肝俞主之熱痓脾俞及腎俞主之熱痓互引汗不出反折尻臂內痛似疸瘧狀膀胱俞主之痓反折互引腹脹腋攣背中怏怏引脅痛內引心中膂內肺俞主之又刺陽明從項而數背椎俠脊膂而痛按之應手者刺之尺澤三痏立已痓互引身熱然谷譩嘻主之痓反目憎風刺絲竹空主之痓互引唇吻強兌端主之痓煩滿齦交主之痓口噤互引口乾小便赤黃或時不禁承漿主之痓口噤大迎主之痓不能言翳風主之痓先取太溪後取太倉之原主之痓脊強里緊腹中拘痛水分主之痓脊強口不開多唾大便難石關主之痓脊強反折京門主之痓腹大堅不得息期門主之痓上氣魚際主之痓互引腕骨主之熱病汗不出善嘔苦痓身反折口噤善鼓頷腰痛不可以顧顧而有似拔者善悲上下取之出血見血立已痓身反折口噤喉痹不能言三里主之痓驚互引腳如結腨如裂束骨主之痓目反白多鼻不通利涕黃更衣一本作便出血京骨主之痓脊強項眩痛腳如結腨如裂崑崙主之痓互折飛揚主之陰陽相移發三瘧第五黃帝問曰夫瘧疾皆生於風其以日作以時發者何也岐伯對曰瘧之始發先起於毫毛缺伸乃作寒栗鼓頷腰脊俱痛寒去則內外俱熱頭痛如破渴欲飲水曰何氣使然曰陰陽上下交爭虛實更作陰陽相移也陽並於陰則陽實而陰虛陽明虛則寒栗鼓頷也太陽虛則腰背頭項痛三陽俱虛則陰氣一作二陰勝陰氣勝則骨寒而痛寒生於內故中外皆寒陽勝則外熱陰虛則內熱內外皆熱則喘渴故欲冷飲此皆得之夏傷於暑熱氣盛藏於皮膚之內腸胃之外此營氣之所舍也令人汗出空疏腠理開因得秋氣汗出遇風得浴水氣舍於皮膚之內與衛氣並居衛氣者晝行於陽夜行於陰此氣得陽而外出得陰而內薄內外相搏是以日作曰其間日而作者何也曰其氣之舍深內薄於陰陽氣獨發陰邪內著陰與陽爭不得出是以間日而作曰其作日晏與其日早何氣使然曰邪氣客於風府循膂而下衛氣一日一夜大會於風府其明日日下一節故其作也晏此皆客於脊背每至於風府則腠理開腠理開則邪氣入邪氣入則病作以此日作稍益晏也其出於風府日下一節二十一日下至骶骨二十二日入於脊內注於太衝之脈素問二十一作二十五二十五作二十六太衝作伏膂其氣上行九日出於缺盆之中其氣日高故作日益早其間日發者由邪氣內薄於五臟橫連募原其道遠其氣深其行遲不能與營氣俱行不能偕出故間日乃作曰衛氣每至於風府腠理乃發發則邪入入則病作今衛氣日下一節其氣之發不當風府其日作奈何曰素問此下有八十八字甲乙經本無故不抄入風無常府衛氣之所發必開其腠理邪氣之所合則其病作素問作則其府也曰風之與瘧相似同類而風獨常在瘧得有時休者何也曰風氣常留其處故常在瘧氣隨經絡次而內傳素問作沉以內薄故衛氣應乃作曰瘧先寒而後熱者何也曰夏傷於大暑汗大出腠理開發因遇風夏氣淒滄之水寒迫之藏於腠理及皮膚之中秋傷於風則病成矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱病以時作名曰寒瘧也曰先熱而後寒者何也曰此先傷於風後傷於寒故先熱而後寒亦以時作名曰溫瘧也其但熱而不寒者陰氣先絶陽氣獨發則熱而少氣煩冤手足熱而欲嘔者名曰疸瘧曰經言有餘者瀉之不足者補之今熱為有餘寒為不足夫瘧之寒湯火不能溫及其熱冰水不能寒此皆有餘不足之類當此之時良工不能止必待其自衰乃刺之何也曰經言無刺熇熇之熱無刺渾渾之脈無刺漉漉之汗為其病逆未可治也夫瘧之始發也陽氣並於陰當是之時陽虛陰盛而外無氣故先寒栗也陰氣逆極則復出之陽陽與陰並於外則陰虛而陽實故先熱而渴夫瘧並於陽則陽勝並於陰則陰勝陰勝者則寒陽勝者則熱熱瘧者風寒氣不常也病極則復至病之發也如火之熱如風雨不可當也故經曰方其盛必毀因其衰也事必大昌此之謂也夫瘧之未發也陰未並陽陽未並陰因而調之真氣乃安邪氣乃亡故工不能治已發為其氣逆也瘧之且發也陰陽之且移也必從四末始陽已傷陰從之故氣未並先其時堅束其處令邪氣不得入陰氣不得出審候見之在孫絡盛堅而血者皆取之此其往而未得並者也曰瘧不發其應何如曰瘧者必更盛更虛隨氣之所在病在陽則熱而脈躁在陰則寒而脈靜極則陰陽俱衰衛氣相離故病得休衛氣集則復病曰時有間二日或至數日發或渴或不渴其故何也曰其間日邪氣與衛氣客於六腑而相失時不相得故休數日乃發也陰陽更勝或甚或不甚故或渴或不渴曰夏傷於暑秋必病瘧今不必應者何也曰此應四時也其病異形者反四時也其以秋病者寒甚以冬病者寒不甚以春病者惡風以夏病者多汗曰溫瘧與寒瘧者皆安舍其在何臟曰溫瘧者得之於冬中於風寒寒氣藏於骨髓之中至春則陽氣大發寒氣不能出因遇大暑腦髓鑠肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏在腎其氣先從內出之於外如是者陰虛而陽盛陽盛則熱衰矣衰則氣反復入復入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧曰疸瘧何如曰肺素有熱氣盛於身厥氣逆上中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不反之陰故但熱而不寒氣內藏於心而外舍分肉之間令人消鑠脫肉故名曰疸瘧瘧脈滿大急刺背俞用中針傍五胠俞各一適肥瘦出血瘧脈小實急灸脛少陰刺指井瘧脈緩大虛便用藥不宜用針凡治瘧先發如食頃乃可以治過之則失時一瘧不渴間日而作九卷曰取足陽明素問刺太陰渴而間日作九卷曰取手少陽素問刺足少陽一瘟瘧汗不出為五十九刺解在熱病部一足太陽瘧令人腰痛頭重寒從背起先寒後熱渴渴止汗乃出難已間日作刺膕中出血素問先寒後熱下有熇熇喝喝然五字一足少陽瘧令人身體解㑊寒不甚惡見人心惕惕然熱多汗出甚刺足少陽一足陽明瘧令人先寒灑淅灑淅寒甚久乃熱熱去汗出喜見日月光火氣乃快然刺陽明跗上及調衝陽一足太陽瘧令人不樂好太息不嗜食多寒少熱汗出病至則善嘔嘔已乃衰即取之足太陰一足少陰瘧令人嘔吐甚多寒少熱欲閉戶牖而處其病難已取太溪一足厥陰瘧令人腰痛少腹滿小便不利如癃狀非癃也數便意恐懼氣不足腹中悒悒刺足厥陰一肺瘧令人心寒甚熱熱間善驚如有所見者刺手太陰陽明一心瘧令人煩心甚欲得見清水寒多素問作反寒多太素作及寒多不甚熱刺手少陰是謂神門一肝瘧令人色蒼蒼然素問下有太息二字其狀若死者刺足厥陰見血一脾瘧令人病寒腹中痛熱則腸中鳴鳴已汗出刺足太陰一腎瘧令人悽悽然素問作灑灑然腰脊痛宛轉大便難目眴眴然手足寒刺足太陽少陰一胃瘧令人且病寒善飢而不能食食而支滿腹大刺足陽明太陰橫脈出血一瘧發身熱刺跗上動脈開其空出血立寒一瘧方欲寒刺手陽明太陰足陽明太陰一諸瘧如脈不見者刺十指間出血血去必已先視身之赤如小豆者盡取之一十二瘧者其發各不同時察其病形以知其何脈之病先其發時如一食頃而刺之一刺則衰二刺則知三刺則已不已刺舌下兩脈出血不已刺郤中盛經出血又刺項以下俠脊者必已舌下兩脈者廉泉穴也一刺瘧者必先問其病之所先發者先刺之先頭痛及重者先刺頭上及兩額兩肩間出血先項背痛者先刺之先腰脊痛者先刺郤中出血先手臂痛者先刺手少陰陽明十指間先足脛痠痛者先刺足陽明十指間出血風瘧發則汗出惡風刺足三陽經背俞之血者脛痠痛按之不可名曰肘髓病以鑱針針絶骨出其血立已身體小痛刺諸陰之井無出血間日一刺㾬瘧神庭及百會主之㾬瘧上星主之先取噫嘻後取天牖風池大杼㾬瘧取完骨及風池大杼心俞上窖噫嘻陰都太淵三間合谷陽池少澤前谷後溪腕骨陽谷俠溪至陰通谷京骨皆主之瘧振寒熱甚狂言天樞主之瘧熱盛列缺主之瘧寒厥及熱厥煩心善噦心滿而汗出刺少商出血立已熱瘧口乾商陽主之瘧寒甚千金下云欲嘔沫陽溪主之風瘧汗不出偏歷主之瘧面赤腫溫留主之痎瘧心下脹滿痛上氣灸手五里左取右右取左瘧項痛因忽暴逆腋門主之瘧發有四時面上赤䀮䀮無所見中渚主之瘧食時發心痛悲傷不樂天井主之風瘧支正主之瘧背膂振寒項痛引肘腋腰痛引少腹四肢不舉少海主之瘧不知所苦大都主之瘧多寒少熱大鐘主之瘧咳逆心悶不得臥嘔甚熱多寒少欲閉戶牖而處寒厥足熱太溪主之瘧熱少氣間寒不能自溫䐜脹切痛引心復溜主之瘧不嗜食厲兌主之瘧瘛瘲驚股膝重胻轉筋頭眩痛解溪主之瘧日西發臨泣主之瘧振寒腋下腫丘墟主之瘧從胻起束骨主之瘧多汗腰痛不能俯仰目如脫項如拔崑崙主之瘧實則腰背痛虛則鼽衄飛揚主之瘧頭重寒背起先寒後熱渴不止汗乃出委中主之瘧不渴間日作崑崙主之
