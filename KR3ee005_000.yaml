body:
  text: 林序臣聞通天地人曰儒通天地不通人曰技斯醫者雖曰方技其實儒者之事乎班固序藝文志稱儒者助人君順陰陽明教化此亦通天地人之理也又云方技者論病以及國原診以知政非能通三才之奧安能及國之政哉晉皇甫謐博綜典籍百家之言沉靜寡欲有高尚之志得風痹因而學醫習覽經方前臻至妙取黃帝素問針經明堂三部之書撰為針灸經十二卷歷古儒者之不能及也或曰素問針經明堂三部之書非黃帝書似出於戰國曰人生天地之間八尺之軀臟之堅脆腑之大小谷之多少脈之長短血之清濁十二經之血氣大數皮膚包絡其外可剖而視之乎非大聖上智孰能知之戰國之人何與焉大哉黃帝內經十八卷針經三卷最出遠古皇甫士安能撰而集之惜簡編脫落者已多是使文字錯亂義理顛倒世失其傳學之者鮮矣唐甄權但修明堂圖孫思邈從而和之其餘篇第亦不能盡言之國家詔儒臣校正醫書今取素問九墟靈樞太素經千金方及翼外臺祕要諸家善書校對玉成繕寫將備親覽恭惟主上聖哲文明光輝上下孝慈仁德蒙被衆庶大頒岐黃遠及方外使皇化兆於無窮和氣浹而充塞茲亦助人靈順陰陽明教化之一端云國子博士臣高保衡尚書屯田郎中臣孫奇光祿卿直祕閣臣林億等上皇甫序夫醫道所興其來久矣上古神農始嘗草木而知百藥黃帝咨訪岐伯伯高少俞之徒內考五臟六腑外綜經絡血氣色候參之天地驗之人物本性命窮神極變而針道生焉其論至妙雷公受業傳之於後伊尹以亞聖之才撰用神農本草以為湯液中古名醫有俞跗醫緩扁鵲秦有醫和漢有倉公其論皆經理識本非徒診病而已漢有華他張仲景其它奇方異治施世者多亦不能盡記其本末若知直祭酒劉季琰病發於畏惡治之而瘥云後九年季琰病應發發當有感仍本於畏惡病動必死終如其言仲景見侍中王仲宣時年二十餘謂曰君有病四十當眉落眉落半年而死令服五石湯可免仲宣嫌其言忤受湯而勿服居三日見仲宣謂曰服湯否仲宣曰已服仲景曰色候固非服湯之診君何輕命也仲宣猶不言後二十年果眉落後一百八十七日而死終如其言此二事雖扁鵲倉公無以加也華他性惡矜技終以戮死仲景論廣伊尹湯液為數十卷用之多驗近代太醫令王叔和撰次仲景選論甚精指事可施用按七略藝文志黃帝內經十八卷今有針經九卷素問九卷二九十八卷即內經也亦有所亡失其論遐遠然稱述多而切事少有不編次比按倉公傳其學皆出於素問論病精微九卷是原本經脈其義深奧不易覺也又有明堂孔穴針灸治要皆黃帝岐伯選事也三部同歸文多重復錯互非一甘露中吾病風加苦聾百日方治要皆淺近乃撰集三部使事類相從刪其浮辭除其重復論其精要至為十二卷易曰觀其所聚而天地之情事見矣況物理乎事類相從聚之義也夫受先人之體有八尺之軀而不知醫事此所謂遊魂耳若不精通於醫道雖有忠孝之心仁慈之性君父危困赤子塗地無以濟之此固聖賢所以精思極論盡其理也由此言之焉可忽乎其本論其文有理雖不切於近事不甚刪也若必精要後其間暇當撰核以為教經云爾序例諸問黃帝及雷公皆曰問其對也黃帝曰答岐伯之徒皆曰對上章問及對已有名字者則下章但言問言對亦不更説名字也若人異則重復更名字此則其例也諸言主之者可灸可刺其言刺之者不可灸言灸之者不可刺亦其例也晉玄晏先生皇甫謐士安集朝散大夫守光祿直祕閣判登聞檢院上護軍臣林億朝奉郎守尚書屯田郎中同校正醫書上騎都尉賜緋魚袋臣孫奇朝奉郎守國子博士同校正醫書上騎都尉賜緋魚袋臣高保衡
