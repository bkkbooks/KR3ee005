body:
  text: 卷十二欠噦唏振寒噫嚏軃泣出太息羡下耳鳴齧舌善忘善飢第一黃帝問曰人之欠者何氣使然岐伯對曰衛氣晝行於陽夜行於陰陰主夜夜主臥陽主上陰主下故陰氣積於下陽氣未盡陽引而上陰引而下陰陽相引故數欠陽氣盡陰氣盛則目瞑陰氣盡陽氣盛則寤腎主欠故瀉足少陰補足太陽曰人之噦者何曰谷入胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻相逆復出於胃故為噦肺主噦故補手太陰瀉足太陰亦可以草刺其鼻嚏而已無息而疾引之立已大驚之亦可已曰人之唏者何曰此陰氣盛而陽氣虛陰氣疾而陽氣徐陰氣盛陽氣終故為唏者陰盛陽絶故補足太陽瀉足少陰曰人之振寒者何曰寒氣客於皮膚陰氣盛陽氣虛故為振寒寒栗補諸陽曰人之噫者何曰寒氣客於胃厥逆從下上散復出於胃故為噫補足太陰陽明一云補眉本曰人之嚏者何曰陽氣和利滿於心出於鼻故為嚏補足太陽滎眉本一云眉上曰人之軃者何曰胃不實則諸脈虛諸脈虛則筋脈懈惰筋脈懈惰則行陰用力氣不能復故為軃因其所在補分肉間曰人之哀而泣涕者何曰心者五臟六腑之主也目者宗脈之所聚也上液之道也口鼻者氣之門戶也故悲哀愁憂則心動心動則五臟六腑皆搖搖則宗脈感宗脈感則液道開液道開故涕泣出焉液者所以灌精濡空竅者也故上液之道開則泣泣不止則液竭液竭則精不灌精不灌則目無所見矣故名曰奪精補天柱經俠頸俠頸者頭中分也曰有哭泣而淚不出者若出而少涕不知水所從生涕所從出也曰夫心者五臟之專精也目者其竅華色其榮是以人有德則氣和於目有亡憂知於色是以悲哀則泣下泣下水所由生也衆精素問作水宗者積水也積水者至陰也至陰者腎之精也宗精之水所以不出者是精持之也輔之裹之故水不行也夫氣之傳也水之精為志火之精為神水火相感神志俱悲是以目之水生也故諺言曰心悲又名曰志悲志與心精共湊於目也是以俱悲則神氣傳於心精上下傳於志而志獨悲故泣出也泣涕者腦也腦者陽素問作陰也髓者骨之充也故腦滲為涕志者骨之主也是以水流涕從之者其類也夫涕之與泣者譬如人之兄弟急則俱死生則俱生太素作出則俱亡其志以早悲是以涕泣俱出而相從者所屬之類也曰人哭泣而泣不出者若出而少涕不從之何也曰夫泣不出者哭不悲也不泣者神不慈也神不慈則志不悲陰陽相持泣安能獨來夫志悲者惋惋則沖陰沖陰則志去目志去則神不守精精神去目涕泣出也夫經言乎厥則目光無所見自涕之與泣者以下至目光無所見原本漏今以素問靈樞補之夫人厥則陽氣並於上陰氣並於下陽並於上則火獨光也陰並於下則足寒足寒則脹夫一水不能勝五火故目盲是以氣衝風泣下而不止夫風之中目也陽氣內守於精是火氣燔目故見風則泣下也有以比之夫素問下有火字疾風生乃能雨此之類也九卷言其形素問言其精亦互相發明也曰人之太息者何曰憂思則心系急心系急則氣道約約則不利故太息以伸出之補手少陰心主足少陽留之曰人之羡下者何曰飲食皆入於胃胃中有熱熱則蟲動蟲動則胃緩胃緩則廉泉開故𬌺下補足少陰曰人之耳中鳴者何曰耳者宗脈之所聚也故胃中空則宗脈虛虛則下溜脈有所竭者故耳鳴補客主人手大指甲上與肉交者曰人之自齧舌者何曰此厥逆走上脈氣皆至也少陰氣至則自齧舌少陽氣至則齧頻陽明氣至則齧唇矣視主病者補之曰人之善忘者何曰上氣不足下氣有餘腸胃實而心肺虛虛則榮衛留於下久不以時上故善忘也曰人之善飢不嗜食者何也曰精氣並於脾則熱留於胃胃熱則消穀消穀故善飢胃氣逆上故胃脘塞胃脘塞故不嗜食善忘及善飢先視其腑臟誅其小過後調其氣盛則瀉之虛則補之凡此十四邪者皆奇邪走空竅者也邪之所在皆為不足故上氣不足腦為之不滿耳為之善鳴頭為之傾目為之瞑中氣不足溲便為之變腸為之善鳴補之足外踝下留之下氣不足則乃為痿厥心悶急刺足大指上二寸留之一曰補足外踝下留之寒氣客於厭發喑不能言第二黃帝問曰人之卒然憂恚而言無音者何氣不行少師對曰咽喉者水穀之道路也喉嚨者氣之所以上下者也會厭者音聲之戶也唇口者音聲之扇也舌者音聲之機也懸壅垂者音聲之關也頏顙者分氣之所泄也橫骨者神氣之所使主發舌者也故人之鼻洞涕出不收者頏顙不閉分氣失也其厭小而薄則發氣疾其開闔利其出氣易其厭大而厚則開闔難其出氣遲故重言也所謂吃者其言逆故重之卒然無音者寒氣客於厭則厭不能發發不能下至其機扇機扇開闔不利故無音足少陰之脈上繫於舌本絡於橫骨終於會厭兩瀉血脈濁氣乃闢會厭之脈上絡任脈復取之天突其厭乃發也暴喑氣硬刺扶突與舌本出血喑不能言刺腦戶暴喑不能言喉嗌痛刺風府舌緩喑不能言刺喑門喉痛喑不能言天突主之暴喑氣哽喉痹咽腫不得息食飲不下天鼎主之食飲善嘔不能言通谷主之喑不能言期門主之暴喑不能言支溝主之喑不能言合谷及湧泉陽交主之目不得眠不得視及多臥臥不安不得偃臥肉苛諸息有音及喘第三黃帝問曰夫邪氣之客於人也或令人目不得眠者何也伯高對曰五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心肺而行呼吸焉營氣者泌其津液注之於脈化而為血以營四末內注五臟六腑以應刻數焉衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間而不休息也晝行於陽夜行於陰其入於陰也常從足少陰之分間行於五臟六腑今邪氣客於五臟則衛氣獨營其外行於陽不得入於陰行於陽則陽氣盛陽氣盛則陽蹺滿不得入於陰陰氣虛故目不得眠治之補其不足瀉其有餘調其虛實以通其道而去其邪飲以半夏湯一劑陰陽已通其臥立至此所以決瀆壅塞經絡大通陰陽得和者也其湯方以流水千里以外者八升揚之萬遍取其清五升煮之炊以葦薪火沸煮秫米一升治半夏五合徐炊令竭為一升半去其滓飲汁一小杯日三稍益以知為度故其病新發者覆杯則臥汗出則已矣久者三飲而已曰目閉不得視者何也曰衛氣行於陰不得入於陽行於陰則陰氣盛陰氣盛則陰蹺滿不得入於陽則陽氣虛故目閉焉九卷行作留入作行曰人之多臥者何也曰此人腸胃大而皮膚澀九卷作濕下同澀則分肉不解焉腸胃大則氣行留久皮膚澀分肉不解則行遲夫衛氣者晝常行於陽夜常行於陰故陽氣盡則臥陰氣盡則寤故腸胃大衛氣行留久皮膚澀分肉不解則行遲留於陰也久其氣不精一作清則欲瞑故多臥矣其腸胃小皮膚滑以緩分肉解利衛氣之留於陽也久故少臥焉曰其非常經也卒然多臥者何也曰邪氣留於上焦上焦閉而不通已食若飲湯衛氣久留於陰而不行故卒然多臥曰治此諸邪奈何曰先視其腑臟誅其小過後調其氣盛者瀉之虛者補之必先明知其形氣之苦樂定乃取之曰人有臥而有所不安者何也曰臟有所傷及情有所倚則臥不安素問作精所之寄則安太素作精有所倚則不安故人不能懸其病也曰人之不得偃臥者何也曰肺者臟之蓋也肺氣盛則脈大脈大則不得偃臥曰人之有肉苛者何也是為何病曰營氣虛衛氣實也營氣虛則不仁衛氣虛則不用營衛俱虛則不仁且不用肉加苛也人身與志不相有也三十日死曰人有逆氣不得臥而有音者有不得臥而息無音者有起居如故而息有音者有得臥行而喘者有不得臥不能行而喘者有不得臥臥而喘者此何臟使然曰不得臥而息有音者是陽明之逆也足三陽者下行今逆而上行故息有音也陽明者胃脈也胃者六腑之海也其氣亦下行陽明逆不得從其道故不得臥下經曰胃不和則臥不安此之謂也夫起居如故而息有音者此肺之絡脈逆不得隨經上下行故留經而不行絡脈之病人也微故起居如故而息有音也夫不得臥臥則喘者水氣客也夫水氣循津液而留素問作流者也腎者水臟主津液主臥與喘也驚不得眠善齘水氣上下五臟遊氣也三陰交主之不得臥浮郤主之身腫皮膚不可近衣淫濼苛獲久則不仁屏翳主之足太陽陽明手少陽脈動發目病第四黃帝問曰余嘗上青霄之臺中陛而惑獨冥視之安心定氣久而不解被髮長跪俯而復視之久不已卒然自止何氣使然岐伯對曰五臟六腑之精氣上注於目而為之精精之裹靈樞作窠下同者為眼骨之精者為瞳子筋之精為黑精靈樞作黑眼血之精為其絡氣之精為白精靈樞亦作白眼肌肉之精為約束裹契一作擷筋骨血氣之精而與脈併為系上屬於腦後出於項中故邪中於頭目逢身之虛其入深則隨眼系以入於腦入則腦轉腦轉則引目系急目系急則目眩以轉矣邪中之精則其精所中者不相比不相比則精散精散則視歧故見兩物也目者五臟六腑之精也營衛魂魄之所常營也神氣之所生也故神勞則魂魄散志意亂是故瞳子黑眼法於陰白晴赤脈法於陽故陰陽合揣靈樞作傳而精明也目者心之使也心者神之所舍也故神分精亂而不揣一作轉卒然見非常之處精氣魂魄散不相得故曰惑曰余疑何其然也余每之東苑未嘗不惑去之則復余惟獨為東苑勞神乎何其異也曰不然夫心有所喜神有所惡卒然相惑則精氣亂視誤故惑神移乃復是故間者為迷甚者為惑目眥外決一作次於面者為鋭眥在內近鼻者上為外眥下為內眥目色赤者病在心白色者病在肺青色者病在肝黃色者病在脾黑色者病在腎黃色不可名者病在胸中診目痛赤脈從上下者太陽病從下上者陽明病從外走內者少陽病夫膽移熱於腦則辛頞鼻淵一作洞鼻淵者濁涕下不止傳為鼽懵素問作衄蔑瞑目故得之氣厥足陽明有俠鼻入於面者名曰懸顱屬口對入系目本頭痛引頷取之視有過者取之損有餘補不足反者益甚足太陽有通項入於腦者正屬目本名曰眼系頭目苦痛取之在項中兩筋間入腦乃別陰蹺陽蹺陰陽相交陽入陰出陰陽交於鋭眥陽氣絶則乃瞑目陰氣絶則眠目中赤痛從內眥始取之陰蹺目中痛不能視上星主之先取噫嘻後取天牖風池青肓遠視不明承光主之目瞑遠視䀮䀮目窗主之目䀮䀮赤痛天柱主之目眩無所見偏頭痛引外眥而急頷厭主之目不明惡風日淚出憎寒目痛目眩內眥赤痛目䀮䀮無所見眥癢痛淫膚白翳睛明主之青肓無所見遠視䀮䀮目中淫膚白膜覆瞳子目窗主之目不明淚出目眩瞀瞳子癢遠視䀮䀮昏夜無見目瞤動與項口參相引喎僻口不能言刺承泣目痛口僻戾一作淚出目不明四白主之目赤黃顴窖主之睊目水溝主之目痛不明齦交主之目瞑身汗出承漿主之青盲䐴目惡風寒上關主之青盲商陽主之䐴目目䀮䀮偏歷主之眼痛下廉主之䐴目目䀮䀮少氣灸手五里左取右右取左目中白翳目痛泣出甚者如脫前谷主之白膜覆珠瞳子無所見解溪主之手太陽少陽脈動發耳病第五暴厥而聾耳偏塞閉不通內氣暴薄也不從內外中風之病故留瘦著也頭痛耳鳴九竅不利腸胃之所生也黃帝問曰刺節言發蒙者刺府腧以去府病何俞使然岐伯對曰刺此者必於白日中刺其耳聽一作聽宮中其眸子聲聞於外此其俞也曰何謂聲聞於外曰已刺以手堅按其兩鼻竅令急偃其聲必應其中耳鳴取耳前動脈耳痛不可刺者耳中有膿若有干擲抵一本作盯聹耳無聞也耳聾取手少指太素云少指次指爪甲上與肉交者先取手後取足耳鳴取手中指爪甲上左取右右取左先取手後取足聾而不痛取足少陽聾而痛取手陽明耳鳴百會及頷厭顱息天窗大陵偏歷前谷後溪皆主之耳痛聾鳴上關主之刺不可深耳聾鳴下關及陽溪關衝腋門陽谷主之耳聾鳴頭頷痛耳門主之頭重頷痛引耳中憹憹嘈嘈和窖主之聾耳中癲溲若風聽會主之耳聾填填如無聞憹憹嘈嘈若蟬鳴頞頰鳴聽宮主之下頰取之譬如破聲刺此即九卷所謂發蒙者聾翳風及會宗下關主之耳聾無聞天窗主之耳聾嘈嘈無所聞天容主之耳鳴無聞肩貞及完骨主之耳中生風耳鳴耳聾時不聞商陽主之聾耳中不通合谷主之耳聾兩顳顬痛中渚主之耳熇熇渾渾無所聞外關主之卒氣聾四瀆主之手足陽明脈動發口齒病第六診齲痛按其陽明之來有過者獨熱在左者左熱在右右熱在上上熱在下下熱臂之陽明有入鼽齒者名曰大迎下齒齲取之臂惡寒補之一作取之不惡瀉之靈樞名曰禾窖或曰大迎詳大迎乃足陽明脈所發則當云禾窖是也然而下齒齲又當取足陽明大迎當試可知耳手太陽有入頄遍齒者名曰角孫上齒齲取之在鼻與鼽一作頄前方病之時其脈盛脈盛則瀉之虛則補之一曰取之眉外方病之時盛瀉虛補齒動痛不惡清飲取足陽明惡清飲取手陽明舌緩羡下煩悶取足少陰重舌刺舌柱以扉針上齒齲腫目窗主之上齒齲痛惡風寒正營主之齒牙齲痛浮白及完骨主之齒痛顴窖及二間主之上齒齲兌端及耳門主之齒間出血者有傷酸齒床落痛口不可開引鼻中齦交主之頰腫口急頰車痛不可以嚼頰車主之上齒齲痛惡寒者上關主之厥口僻失欠下牙痛頰腫惡寒口不收舌不能言不得嚼大迎主之失欠下齒齲下牙痛䪼腫下關主之齒牙不可嚼齦腫角孫主之口僻不正失欠口不開翳風主之舌下腫難言舌縱喎戾不端通谷主之舌下腫難以言舌縱涎出廉泉主之口僻刺太淵引而下之口中腫臭勞宮主之口中下齒痛惡寒䪼腫商陽主之齒齲痛惡清三間主之口僻偏歷主之口齒痛溫留主之下齒齲則上齒痛腋門主之齒痛四瀆主之上牙齲痛陽谷一作陽溪主之齒齲痛合谷主之又云少海主之舌縱𬌺下煩悶陰交主之血溢發衄第七鼻鼽息肉著附暴疸內逆肝肺相搏血溢鼻口取天府此為胃之大腧五部也五部按靈樞云陽逆頭痛胸滿不得息取人迎暴喑氣哽刺扶突與舌本出血暴聾氣蒙耳目不明取天牖暴拘攣癇痓足不任身者取天柱暴痹內逆肝肺相搏血溢鼻口取天府此為胃之五大俞五部也今士安散作五穴於篇中此特五部之一耳衄而不止衃血流取足太陽大衄衃血取手太陽不已刺腕骨下不已刺膕中出血鼻鼽衄上星主之先取噫嘻後取天牖風池鼻管疽發為厲腦空主之鼻鼽不利窒洞氣塞喎僻多洟鼽衄有癰迎香主之鼽衄洟出中有懸癰宿肉窒洞不通不知香臭素窖主之鼻窒口僻清洟出不可止鼽衄有癰禾窖主之鼻中息肉不利鼻頭額頞中痛鼻中有蝕瘡齦交主之鼻鼽不得息不收洟不知香臭及衄不止水溝主之衄血不止承漿及委中主之鼻不利前谷主之衄腕骨主之手足陽明少陽脈動發喉痹咽痛第八喉痹不能言取足陽明能言取手陽明喉痹完骨及天容氣舍天鼎尺澤合谷商陽陽溪中渚前谷商丘然谷陽交悉主之喉痹咽腫水漿不下璇璣主之喉痹食不下鳩尾主之喉痹咽如梗三間主之喉痹不能言溫留及曲池主之喉痹氣逆口喎喉咽如扼狀行間主之千金作間使咽中痛不可納食湧泉主之氣有所結髮瘤癭第九癭天窗一本作天容千金作天府及臑會主之瘤癭氣舍主之婦人雜病第十黃帝問曰人有重身九月而喑此為何病岐伯對曰胞之絡脈絶也胞絡者繫於腎少陰之脈貫腎系舌本故不能言無治也當十月復治法曰無損不足益有餘以成其辜素問作沴所謂不足者身羸瘦無用鑱石也無益其有餘者腹中有形而泄之泄之則精出而病獨擅中故曰成辜曰何以知懷子且生也曰身有病而無邪脈也診女子手少陰脈動甚者妊子也乳子而病熱脈懸小手足溫則生寒則死乳子中風病熱喘渴素問作鳴肩息脈急大緩則生急則死乳子下赤白腰俞主之女子絶子陰挺出不禁白瀝上窖主之女子赤白瀝心下積脹次窖主之腰痛不可俯仰先取缺盆後取尾骶女子赤淫時白氣癃月事少中窖主之女子下蒼汁不禁赤瀝陰中癢痛少腹控䏚不可俯仰下窖主之刺腰尻交者兩胂上以月生死為痏數髮針立已腸鳴泄注下窖主之婦人乳余疾肓門主之寒熱短氣臥不安膺窗主之乳癰淒索寒熱不可接乳根主之絶子灸臍中令有子女子手腳拘攣腹滿疝月水不通乳余疾絶子陰癢陰交主之腹滿疝積乳余疾絶子陰癢千金云奔豚上腹堅痛下引陰中不得小便刺陰交入八分刺石門女子絶子衃血在內不下關元主之千金云胞轉不得尿少腹滿石水痛刺關元亦宜矣女子陰中癢腹熱痛乳余疾絶不足子門不端少腹苦寒陰癢及痛經閉不通中極主之婦人下赤白沃後陰中干痛惡合陰陽少腹䐜堅小便閉曲骨千金作屈骨主之女子血不通會陰主之婦人子臟中有惡血逆滿痛石關主之月水不通奔豚泄氣上下引腰脊痛氣穴主之女子赤淫大赫主之女子胞中痛月水不以時休止天樞主之千金云腹脹腸鳴氣上衝胸刺天樞小腹脹滿痛引陰中月水至則腰脊痛胞中瘕子門有寒引臏髀水道主之千金云大小便不通刺水道女子陰中寒歸來主之女子月水不利或暴閉塞腹脹滿癃淫濼身熱腹中絞痛㿗疝陰腫及乳難子搶心若胞衣不出衆氣盡亂腹滿不得反復正偃臥屈一膝伸一膝並氣衝針上入三寸氣至瀉之婦人無子及少腹痛刺氣衝主之婦人産余疾食飲不下胸脅榰滿眩目足寒心切痛善噫聞酸臭脹痹腹滿少腹尤大期門主之婦人少腹堅痛月水不通帶脈主之婦人下赤白裡急瘛瘲五樞主之妒乳千金云膺胸痛太淵主之絶子商丘主之穴在內踝前宛宛中女子疝瘕按之如以湯沃其股內至膝飧泄灸刺曲泉婦人陰中痛少腹堅急痛陰陵泉主之婦人漏下若血閉不通逆氣脹血海主之月事不利見血而有身反敗陰寒行間主之乳癰太衝及復留主之女子疝及少腹腫溏泄癃遺溺陰痛面塵黑目下眥痛太衝主之女子少腹大乳難嗌乾嗜飲中封主之女子漏血太衝主之女子俠臍疝中封主之大疝絶子築賓主之女子疝小腹腫赤白淫時多時少蠡溝主之女子疝瘕按之如以湯沃兩股中少腹腫陰挺出痛經水來下陰中腫或癢漉青汁若葵羹血閉無子不嗜食曲泉主之婦人絶産若未曾生産陰廉主之刺入八分羊矢下一寸是也婦人無子湧泉主之女子不字陰暴出經水漏然谷主之女子不下月水照海主之千金云痹驚善悲不樂如墜墮汗不出刺照海婦人陰挺出四肢淫濼身悶照海主之月水不來而多閉心下痛目䀮䀮不可遠視水泉主之婦人漏血腹脹滿不得息小便黃陰谷主之千金云漏血少腹脹滿如阻體寒熱腹偏腫刺陰谷乳癰有熱三里主之乳癰驚痹脛重足胕不收跟痛巨虛下廉主之月水不利見血而有身則敗及乳腫臨泣主之女子字難若胞不出崑崙主之小兒雜病第十一嬰兒病在頭毛皆逆上者死嬰兒耳間青脈起者瘈腹痛大便青瓣飧泄脈大手足寒難已飧泄脈小手足溫者易已驚癇脈五針手足太陰各五刺經太陽者五刺手足少陰經絡傍者一足陽明一上踝五寸刺三針小兒驚癇本神及前頂囟會天柱主之如反視臨泣主之小兒驚癇加瘛瘲脊急強目轉上插縮筋主之小兒驚癇瘛瘲脊強互相引長強主之小兒食晦頭痛噫嘻主之小兒癇發目上插攢竹主之小兒臍風目上插刺絲竹空主之小兒癇痓嘔吐泄注驚恐失精瞻視不明眵䁾瘈脈及長強主之小兒驚癇不得息顱息主之小兒驚癇如有見者列缺主之並取陽明絡小兒口中腥臭胸脅榰滿勞宮主之小兒咳而泄不欲食者商丘主之小兒癇瘈手足擾目昏口噤溺黃商丘主之小兒癇痓遺精溺虛則病諸癇癲實則閉癃少腹中熱善寐大敦主之小兒臍風口不開善驚然谷主之小兒腹滿不能食飲懸鐘主之小兒馬癇僕參及金門主之風從頭至足瘛瘲口閉不能開每大便腹暴滿按之不下嚏悲喘崑崙主之
