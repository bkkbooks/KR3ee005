body:
  text: 卷四經脈第一上雷公問曰外揣言渾束為一未知其所謂敢問約之奈何黃帝答曰寸口主內人迎主外兩者相應俱往俱來若引繩大小齊等春夏人迎微大秋冬寸口微大者如是者名曰平人人迎大一倍於寸口病在少陽再倍病在太陽三倍病在陽明盛則為熱虛則為寒緊則為痛痹代則乍甚乍間盛則瀉之虛則補之緊則取之分肉代則取之血絡且飲以藥陷下者則從而灸之不盛不虛者以經取之名曰經刺人迎四倍名曰外格外格者且大且數則死不治必審按其本末察其寒熱以驗其臟腑之病寸口大一倍於人迎病在厥陰再倍病於少陰盛則脹滿寒則食不消化虛則熱中出糜少氣溺色變緊則為痛痹代則乍寒乍熱下熱上寒太素作代則乍痛乍止盛則瀉之虛則補之緊則先刺之而後灸之代則取血絡而後調太素作泄字之陷下者則從而灸之陷下者其脈血結於中中有著血則血寒故宜灸不盛不虛以經取之寸口四倍者名曰內關內關者且大且數則死不治必審按其本末察其寒熱以驗其臟腑之病通其滎俞乃可傳於大數大曰盛則從瀉小曰虛則從補緊則從灸刺之且飲藥陷下則從灸之不盛不虛以經取之所謂經治者飲藥亦用灸刺脈急則引脈代一本作脈大以弱則欲安靜無勞用力黃帝問曰病之益甚與其方衰何如岐伯對曰外內皆在焉切其脈口滑小緊以沉者病益甚在中人迎脈大緊以浮者病益甚在外其脈口浮而滑者病日進人迎沉而滑者病日損其脈口滑而沉者病日進在內其人迎脈滑盛以浮者病日進在外脈之浮沉及人迎與氣口氣大小齊等者其病難已病在臟沉而大者其病易已以小為逆病在腑浮而大者其病易已人迎盛緊者傷於寒脈口盛緊者傷於食其脈滑大以代而長者病從外來目有所見志有所存此陽之並也可變而已曰平人何如曰人一呼脈再動一吸脈亦再動呼吸定息脈五動閏疑誤以太息名曰平人平人者不病也常以不病之人以調病人醫不病故為病人平息以調之人一呼脈一動一吸脈一動者曰少氣人一呼脈三動而躁尺熱曰病溫尺不熱脈滑曰病風素作脈澀曰痹人一呼脈四動以上曰死脈絶不至曰死乍疏乍數曰死人常稟氣於胃脈以胃氣為本無胃氣曰逆逆者死持其脈口數其至也五十動而不一代者五臟皆受氣矣四十動而一代者一臟無氣三十動而一代者二臟無氣二十動而一代者三臟無氣十動而一代者四臟無氣不滿十動而一代者五臟無氣與之短期要在終始所謂五十而一代者以為常也以知五臟之期也與之短期者乍數乍疏也肝脈弦心脈鉤脾脈代肺脈毛腎脈石心脈來纍纍然如連珠如循琅玕曰平纍纍素作喘喘連屬其中微曲曰病前鉤後居如操帶鉤曰死肺脈來厭厭聶聶如循素問作落榆葉曰平不上不下如循雞羽曰病如物之浮如風吹毛曰死肝脈來軟弱招招如揭長竿末梢曰平盈實而滑如循長竿曰病急而益徑如新張弓弦曰死脾脈來和柔相離如雞足踐地曰平實而盈數如雞舉足曰病堅鋭如鳥之喙如鳥之距如屋之漏如水之流曰死腎脈來喘喘纍纍如鉤按之堅曰平來如引葛按之益堅曰病發如奪索辟辟如彈石曰死脾脈虛浮似肺腎脈小浮似脾肝脈急沉散似腎曰見真臟曰死何也曰五臟者皆稟氣於胃胃者五臟之本臟氣者皆不能自致於手太陰必因於胃氣乃能至於手太陰故五臟各以其時自為而至於手太陰故邪氣勝者精氣衰也故病甚者胃氣不能與之俱至於手太陰故真臟之氣獨見獨見者病勝臟也故曰死春脈肝也東方木也萬物之所始生也故其氣軟弱輕虛而滑端直以長故曰弦反此者病其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中太過則令人善忘忽忽眩冒而癲疾不及則令人胸滿一作痛引背下則兩脅胠滿夏脈心也南方火也萬物之所盛長也故其氣來盛去衰故曰鉤反此者病其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病在內太過則令人身熱而骨痛一作膚痛為浸淫不及則令人煩心上見咳唾下為氣泄秋脈肺也西方金也萬物之所收成也故其氣來輕虛以浮來急去散故曰浮反此者病其來毛而中央堅兩傍虛此謂太過病在外其氣來毛而微此謂不及病在中太過則令人逆氣而背痛慍慍然不及則令人喘呼少氣而咳上氣見血下聞病音冬脈腎也北方水也萬物之所合藏也故其氣來沉以濡素問作搏故曰營反此者病其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中太過則令人解㑊脊脈痛而少氣不欲言不及則令人心懸如病飢素問下有䏚中清脊中痛小腹滿小便變赤黃四句脾脈土也孤臟以灌四傍者也其善者不可見惡者可見其來如水之流者此謂太過病在外如鳥之喙者此謂不及病在中太過則令人四肢不舉不及則令人九竅不通名曰重強經脈第一中春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈名曰陰出之陽病善怒不治是謂五邪皆同死不治春胃微弦曰平弦多胃少曰肝病但弦無胃曰死胃而有毛曰秋病毛甚曰今病臟真散於肝肝藏筋膜之氣也夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死胃而有石曰冬病石甚曰今病臟真通於心心藏血脈之氣也長夏胃微軟弱曰平胃少軟弱多曰脾病但代無胃曰死軟弱有石曰冬病軟素作弱甚曰今病臟真濡於脾脾藏肌肉之氣也秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰今病臟真高於肺肺行營衛陰陽也冬胃微石曰平胃少石多曰腎病但石無胃曰死石而有鉤曰夏病鉤甚曰今病臟真下於腎腎藏骨髓之氣也胃之大絡名曰虛里貫膈絡肺出於左乳下其動應手脈之宗氣也盛喘數絶者則病在中結而橫有積矣絶不至曰死診得胃脈則能食虛則泄也心脈揣素問作搏堅而長病舌卷不能言其軟而散者病消渴素作煩自已肺脈揣素作搏下同堅而長病唾血其軟而散者病灌汗至令不復散發肝脈揣堅而長色不青病墜若搏因血在脅下令人喘逆其軟而散色澤者病溢飲溢飲者渴渴多飲而溢入肌皮腸胃之外也胃脈揣堅而長其色赤病折髀其軟而散者病食痹痛髀脾脈揣堅而長其色黃病少氣其軟而散色不澤者病足胻腫若水狀腎脈揣堅而長其色黃而赤者病折腰其軟而散者病少血至令不復夫脈者血氣之府也長則氣和短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少澀則心痛渾渾革革至如湧泉病進而色弊之綽綽一本作綿綿其去如弦絶者死寸口脈中手短者曰頭痛寸口脈中手長者曰足脛痛寸口脈沉而堅者病在中寸口脈浮而盛者病在外寸口脈中手促上數素問作擊者曰肩背痛寸口脈緊而橫堅素問作沉而橫者曰脅下腹中有橫積痛寸口脈浮而喘素問作沉而喘者曰寒熱寸口脈盛滑堅者曰病在外寸口脈小實而堅者曰病在內脈小弱以澀者謂之久病脈浮滑而實大素問作滑浮而疾者謂之新病病甚有胃氣而和者曰病無他脈急者曰疝㿗少腹痛脈滑曰風脈澀曰痹盛而緊曰脹緩而滑曰熱中按寸口得四時之順曰病無他反四時及不間臟曰死太陽脈至洪大以長少陽脈至乍數乍疏乍短乍長陽明脈至浮大而短厥陰有餘病陰痹不足病生熱痹滑則病狐疝風澀則病少腹積氣一本作積厥少陰有餘病皮痹癮疹不足病肺痹滑則病肺風疝澀則病積溲血太陰有餘病肉痹寒中不足病脾痹滑則病脾風疝澀則病積心腹時滿陽明有餘病脈痹身時熱不足病心痹滑則病心風疝澀則病積時善驚太陽有餘病骨痹身重不足病腎痹滑則病腎風疝澀則病積時善癲疾少陽有餘病筋痹脅痛不足病肝痹滑則病肝風疝澀則病積時筋急目痛太陰厥逆胻急攣心痛引腹治主病者少陰厥逆虛滿嘔變下泄清治主病者厥陰厥逆攣腰痛虛滿前閉詀語治主病者三陰俱逆不得前後使人手足寒三日死太陽厥逆僵仆嘔血善衄治主病者少陽厥逆機關不利機關不利者腰不可以行項不可以顧發腸癰不可治驚者死陽明厥逆喘咳身熱善驚衄血嘔血不可治驚者死手太陰厥逆虛滿而咳善嘔吐沫治主病者手心主少陰厥逆心痛引喉身熱者死不熱者可治手太陽厥逆耳聾泣出項不可以顧腰不可以俯仰治主病者手陽明少陽厥逆發喉痹嗌腫痛治主病者來疾去徐上實下虛為厥癲疾來徐去疾上虛下實為惡風也故中惡風者陽氣受也有脈俱沉細數者少陰厥也沉細數散者寒熱也浮而散者為眴音順僕諸浮而不躁者皆在陽則為熱其有躁者在手諸細而沉者皆在陰則為骨痛其有靜者在足數動一代者病在陽之脈也其澀者陽氣有餘也滑者陰氣有餘也陽氣有餘則為身熱無汗陰氣有餘則為多汗身寒陰陽有餘則為無汗而寒推而外之內而不外者有心腹積也推而內之外而不內者中有熱也推而上之下而不上者腰足清也推而下之上而不下者頭項痛也按之至骨脈氣少者腰脊痛而身有痹也經脈第一下三陽為經二陽為維一陽為遊部三陽者太陽也至手太陰而弦浮而不沉決以度察以心合之陰陽之論二陽者陽明也至手太陰弦而沉急不鼓炅至以病皆死一陽者少陽也至手太陰上連人迎弦急懸不絶此少陽之病也搏陰則死三陰者六經之所主也交於太陰伏鼓不浮上空至心二陰至肺其氣歸於膀胱外連脾胃一陰獨至經絶氣浮不鼓鉤而滑此六脈者乍陰乍陽交屬相併繆通五臟合於陰陽先至為主後至為客三陽為父二陽為衛一陽為紀三陰為母二陰為雌一陰為獨使二陽一陰陽明主脾一本無脾字病不勝一陰脈軟而動九竅皆沉三陽一陰太陽脈勝一陰不能止內亂五臟外為驚駭二陰二陽病在肺少陽一作陰脈沉勝肺傷脾故外傷四肢二陰二陽皆交至病在腎罵詈妄行癲疾為狂二陰一陽病出於腎陰氣客遊於心脘下空竅堤閉塞不通四支別離一陰一陽代絶此陰氣至心上下無常出入不知喉嗌乾燥病在土脾二陽三陰至陰皆在陰不過陽陽氣不能止陰陰陽並絶浮為血瘕沉為膿胕也三陽獨至者是三陽並至並至如風雨上為癲疾下為漏血病三陽者至陽也積並則為驚病起如風霹靂九竅皆塞陽氣滂溢嗌乾喉塞並於陰則上下無常薄為腸澼此謂三陽直心坐不得起臥者身重三陽之病也黃帝問曰脈有四時動奈何岐伯對曰六合之內天地之變陰陽之應彼春之暖為夏之暑彼秋之忿為冬之怒四變之動脈與之上下以春應中規夏應中矩秋應中衡冬應中權是故冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下陰陽有時與脈為期期而相失如脈所分分之有期故知死時微妙在脈不可不察察之有紀從陰陽始是故聲合五音色合五行脈合陰陽持脈有道虛靜為寶春日浮如魚之遊在波夏日在膚泛泛乎萬物有餘秋日下膚蟄蟲將去冬日在骨蟄蟲周密君子居室故曰知內者按而紀之知外者終而始之此六者持脈之大法也赤脈之至也喘而堅診曰有積氣在中時害於食名曰心痹得之外疾思慮而心虛故邪從之白脈之至也喘而浮上虛下實驚為積氣在胸中喘而虛名曰肺痹寒熱得之醉而使內也黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風青脈之至也長而弦左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法腰痛足清頭痛一本雲頭脈緊黑脈之至也上堅而大有積氣在少腹與陰名曰腎痹得之沐浴清水而臥形氣有餘脈氣不足死脈氣有餘形氣不足生形氣相得謂之可治脈弱以滑是有胃氣命曰易治治之趨之無後其時形氣相失謂之難治色夭不澤謂之難已脈實以堅謂之益甚脈逆四時謂之不治所謂逆四時者春得肺脈夏得腎脈秋得心脈冬得脾脈其至皆懸絶沉澀者名曰逆四時未有臟形於春夏而脈沉澀秋冬而脈浮大病熱脈靜泄而脈大脫血而脈實病在中而脈實堅病在外而脈不實堅者皆為難治名曰逆四時也曰願聞虛實之要曰氣實形實氣虛形虛此其常也反此者病谷盛氣盛谷虛氣虛此其常也反此者病脈實血實脈虛血虛此其常也反此者病氣盛身寒氣虛身熱曰反谷入多而氣少曰反谷不入而氣多曰反脈盛血少曰反脈少血多曰反氣盛身寒得之傷寒氣虛身熱得之傷暑谷入多而氣少者得之有所脫血濕居其下也谷入少而氣多者邪在胃及與肺也脈少血多者飲中熱也脈大血少者脈有風氣水漿不入此謂反也夫實者氣入也虛者氣出也氣實者熱也氣虛者寒也入實者左手開針孔也入虛者左手閉針孔也脈小色不奪者新病也脈不奪色奪者久病也脈與五色俱奪者久病也脈與五色俱不奪者新病也肝與腎脈並至其色蒼赤當病毀傷不見血已見血濕若中水也尺內兩傍則季脅也尺外以候腎尺裡以候腹中附上左外以候肝內以候鬲右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛中事也粗大者陰不足陽有餘為熱中也腹脹身熱脈大一作小是一逆也腹鳴而滿四肢清泄脈大者是二逆也血衄不止脈大者是三逆也咳且溲血脫形脈小而徑者是四逆也咳脫形身熱脈小而疾者是五逆也如是者不過十五日死矣腹大脹四末清脫形泄甚是一逆也腹脹便一作後血其脈大時絶是二逆也咳溲血形肉脫喘是三逆也嘔血胸滿引背脈小而疾是四逆也咳嘔腹脹且飧泄其脈絶是五逆也如是者不及一時而死矣工不察此者而刺之是謂逆治治熱病脈靜汗已出脈盛躁是一逆也病泄脈洪大是二逆也著痹不移膕肉破身熱脈偏絶是三逆也淫而奪形身熱色夭然白及後下血衃篤重是四逆也寒熱奪形脈堅搏是五逆也五實死五虛死脈盛皮熱腹脹前後不通悶瞀是謂五實脈細皮寒氣少泄利前後飲食不入是謂五虛漿粥入胃泄注止則虛者活身汗得後利則實者活此其候也心脈滿大癇痓筋攣肝脈小急癇痓筋攣肝脈瞀悶有所驚駭脈不至若喑不治自已腎脈小急肝脈小急心脈小急不鼓皆為瘕腎脈大急沉肝脈大急沉皆為疝肝腎脈並沉為石水並浮為風水並虛為死並小弦欲為驚心脈揣素問揣作搏下同滑急為心疝肺脈沉揣為肺疝三陽急為瘕二陰急為癇厥一本作二陰急為疝二陽急為驚脾脈外鼓沉為腸澼久自已肝脈小緩為腸澼易治腎脈小揣沉腸澼下血血濕素問作溫身熱者死心肝澼亦下血二臟同病者可治其脈小沉澀為腸澼其身熱者死熱甚素作熱見七日死胃脈沉鼓澀胃外鼓大心脈小堅急皆鬲偏枯男子發左女子發右不喑舌轉者可治三十日起其從者喑三歲起年不滿二十者三歲死脈至而揣衄血身有熱者死脈來懸鉤浮者為熱素作常脈脈至而揣名曰暴厥暴厥者不知與人言脈至而數使人暴驚三四日自已脈至浮合浮合如數一息十至以上是經氣豫不足也微見九十日死脈至如火薪然是心精豫奪也草乾而死脈至如叢棘素作如散葉是肝氣豫虛也木葉落而死脈至如省客省客者脈寒一本作塞如故也是腎氣豫不足也懸去棗華而死脈至如丸泥是胃精豫不足也榆莢落而死脈至如橫格是膽氣豫不足也禾熟而死脈至如弦縷是胞精豫不足也病善言下霜而死不言可治脈至如交棘素作交漆交棘者左右傍至也微見三十日而死脈至如湧泉浮鼓肌中是太陽氣豫不足也少氣味韭花生而死脈至如頽土之狀按之不足是肌氣豫不足也五色見黑白纍發而死脈至如懸雍懸雍者浮揣切之益大是十二俞之氣豫不足也水凍而死脈至如偃刀偃刀者浮之小急按之堅大五臟寒熱素作菀熱寒熱獨並於腎如此其人不得坐立春而死脈至如丸滑不著素作不直手丸滑不著者按之不可得也是大腸氣豫不足也棗葉生而死脈至如舂者令人善恐不欲坐臥行立常聽是小腸氣豫不足也季秋而死病形脈診第二上黃帝問曰邪氣之中人奈何高下有度乎岐伯對曰身半以上者邪中之身半以下者濕中之中於陰則留腑中於陽則留臟曰陰之與陽異名同類上下相會經絡之相貫也如環之無端夫邪之中人也或中於陰或中於陽上下左右無有恆常曰諸陽之會皆在於面人之方乘虛時及新用力若熱飲汗出腠理開而中於邪中於首則下陽明中於面則下太陽中於頰則下少陽中於膺背兩脅亦中其經中於陰者常從臂胻始夫臂與胻其陰皮薄其肉淖澤故俱受於風獨傷於其陰也曰此故傷其臟乎曰身之中於風也不必動臟故邪入於陰經其臟氣實邪氣入而不容故還之於腑是故陽中則留於經陰中則留於腑曰邪之中臟者奈何曰恐懼憂愁則傷心形寒飲冷則傷肺以其兩寒相感中外皆傷故氣逆而上行有所墮墜惡血留內有所大怒氣上而不能下積於脅下則傷肝有所擊僕若醉以入房汗出當風則傷脾有所用力舉重若入房過度汗出浴水則傷腎曰五臟之中風奈何曰陰陽俱相感邪乃得往十二經脈三百六十五絡其血氣皆上於面而走空竅其精陽之氣上走於目而為睛其彆氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣下出於胃而走唇舌而為味其氣之津液皆上熏於面而皮又厚其肉堅故大熱甚寒不能勝之也虛邪之中身也灑淅動其形正邪之中人也微先見於色不知於身若存若亡有形無形莫知其情夫色脈與尺之皮膚相應如桴鼓影響之相應不得相失此亦本末根葉之出候也根死則葉枯矣故色青者其脈弦色赤者其脈鉤色黃者其脈代色白者其脈毛色黑者其脈石見其色而不得其脈反得相勝之脈則死矣得相生之脈則病已矣曰五臟之所生變化之病形何如曰先定其五色五脈之應其病乃可別也曰色脈已定別之奈何曰調其脈之緩急大小滑澀而病形定矣曰調之何如曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚亦減而少氣脈大者尺之皮膚亦大脈沉者尺之皮膚亦沉脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀凡此變者有微有甚故善調尺者不待於寸善調脈者不待於色能參合而行之者可以為上工十全其九行二者為中工十全其七行一者為下工十全其六尺膚溫一作滑以淖澤者風也尺肉弱者解㑊也安臥脫肉者寒熱也一本下作不治尺膚澀者風痹也尺膚粗如枯魚鱗者水泆飲也尺膚寒甚脈急一作小者泄少氣也尺膚熱甚脈盛躁者病溫也其脈盛而滑者汗且出一作病且出也尺膚燒炙人手一作炬然先熱後寒者寒熱也尺膚先寒久持之而熱者亦寒熱也尺膚炬然熱人迎大者當奪血也尺堅大脈小甚則少氣悗有加者立死脈經云尺緊於人迎者少氣肘所獨熱者腰以上熱肘後獨熱者肩背熱肘前獨熱者膺前熱肘後廉以下三四寸熱者腸中有蟲手所獨熱者腰以上一作下熱臂中獨熱者腰腹熱掌中熱者腹中熱也掌中寒者腹中寒也魚際白肉有青血脈者胃中有寒也曰人有尺膚緩甚一云尺脈數甚筋急而見此為何病曰此所謂狐狐素問作疹筋狐筋者是人腹必急白色黑色見則病甚病形脈診第二下黃帝問曰脈之緩急小大滑澀之病形何如岐伯對曰心脈急甚為瘛瘲微急為心痛引背食不下緩甚為狂笑微緩為伏梁在心下上下行有時唾血大甚為喉吤吤微大為心痹引背善淚小甚為善噦微小為消疸滑甚為善渴微滑為心疝引臍少腹鳴澀甚為喑微澀為血溢維經絡有陽維陰維厥耳鳴癲疾肺脈急甚為癲疾微急為肺寒熱怠惰咳唾血引腰背胸若鼻息肉不通緩甚為多汗微緩為痿瘻偏風頭以下汗出不止大甚為頸腫微大為肺痹引胸背起惡日光小甚為泄微小為消疸滑甚為息賁上氣微滑為上下出血澀甚為嘔血微澀為鼠瘻一作漏在頸支腋之間下不勝其上甚能善酸肝脈急甚為惡言一作忘言微急為肥氣在脅下若履杯緩甚為善嘔微緩為水瘕痹大甚為內癰善嘔衄微大為肝痹陰縮咳引少腹小甚為多飲微小為消疸滑甚為㿗疝微滑為遺溺澀甚為溢飲微澀為瘛瘲攣筋脾脈急甚為瘛瘲微急為鬲中食飲入而還出後沃沫緩甚為痿厥微緩為風痿四肢不用心慧然若無病大甚為擊僕微大為疝氣腹裡大膿血在腸胃之外小甚為寒熱微小為消疸滑甚為㿉癃微滑為蟲毒蛔蠍腹熱澀甚為腸㿗一作潰微澀為內潰多下膿血腎脈急甚為骨痿癲疾微急為奔豚沉厥足不收不得前後緩甚為折脊微緩為洞泄洞泄者食不化下嗌還出大甚為陰痿微大為石水起臍下至小腹垂垂然上至胃脘死不治小甚為洞泄微小為消疸滑甚為癰㿗一作癃㿉微滑為骨痿坐不能起起則目無所見視黑丸澀甚為大癰微澀為不月沉痔曰病亦有甚變一作病之六變者刺之奈何曰諸急者多寒緩者多熱大者多氣少血小者血氣皆少滑者陽氣盛而微有熱澀者多血少氣而微有寒是故刺急者深內而久留之刺緩者淺內而疾髮針以去其熱刺大者微瀉其氣無出其血刺滑者疾髮針而淺內之以瀉其陽氣去其熱刺澀者必中其脈隨其逆順而久留之必先按而循之已髮針疾按其痏無令出血以和其諸脈小者陰陽形氣俱不足勿取以針而調之以甘藥曰五臟六腑之氣滎俞所入為合今何道從入入安從道曰此陽明之別入於內屬於腑者也曰滎俞與合各有名乎曰滎俞治外臟經合治內腑曰治內腑奈何曰取之於合合各有名乎曰胃合入於三里大腸合入於巨虛上廉小腸合入於巨虛下廉三焦合入於委陽膀胱合入於委中央膽合入於陽陵泉按大腸合於曲池小腸合於小海三焦合於天井今此不同者古之別法也又詳巨虛上廉乃足陽明與小腸相合之穴也與胃合三里膀胱合委中膽合陽陵泉以脈之所入為合不同三焦合委陽委陽者乃三焦下輔腧也亦未見有為合之說曰取之奈何曰取之三里者低跗取之巨虛者舉足取之委陽者屈伸而取之委中者屈膝而取之陽陵泉者正立豎膝豫之齊下至委陽之陽取之諸外經者揄伸而取之曰願聞六腑之病曰面熱者足陽明病魚絡血者手陽明病兩跗之上脈堅若陷者足陽明病此胃脈也三部九候第三黃帝問曰何謂三部岐伯對曰上部中部下部其部各有三候三候者有天有地有人上部天兩額之動脈上部地兩頰之動脈上部人耳前之動脈中部天手太陰中部地手陽明中部人手少陰下部天足厥陰下部地足少陰下部人足太陰下部之天以候肝地以候腎人以候脾胃之氣中部之天以候肺地以候胸中之氣人以候心上部之天以候頭角之氣地以候口齒之氣人以候耳目之氣此三部者三而成天三而成地三而成人三而三之合為九九分為九野九野為九臟故神臟五形臟四合為九臟五臟已敗其色必夭夭必死矣曰以候奈何曰必先度其形之肥瘦以調其氣之虛實實則瀉之虛則補之必先去其血脈而後調之無問其病以平為期曰決死生奈何曰形盛脈細少氣不足以息者危形瘦脈大胸中多氣者死形氣相得者生參伍不調者病三部九候皆相失者死上下左右之脈相應如參舂者病甚上下左右相失不可數者死中部之候雖獨調與衆臟相失者死中部之候相減者死目內陷者死曰何以知病之所在曰察九候獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病以左手於左足上去踝五寸而按之以右手當踝而彈之其應過五寸以上蠕蠕然者不病其應疾中手渾渾然者病中手徐徐然者病其應上不能至五寸彈之不應者死脫肉身不去者死中部乍疏乍數者死代脈而鉤者病在絡脈九候之相應也上下若一不得相失一候後則病二候後則病甚三候後則病危所謂後者應不俱也察其腑臟以知生死之期必先知經脈而後知病脈真臟脈見者邪素問無邪字勝死也足太陽之氣絶者其足不可以屈伸死必戴眼曰冬陰夏陽奈何曰九候之脈皆沉細懸絶者為陰主冬故以夜半死盛躁喘數者為陽主夏故以日中死寒熱病者以平旦死熱中及熱病者以日中死病風者以日夕死病水者以夜半死其脈乍數乍疏乍遲乍疾者以日乘四季死形肉已脫九候雖調者猶死七診雖見九候皆順者不死所言不死者風氣之病及經月之病似七診之病而非也故言不死若有七診之病其脈候亦敗者死矣必發噦噫必審問其所始病與今之所方病而後素問下有各字切循其脈視其經絡浮沉以上下逆從循之其脈疾者不病其脈遲者病不往不來者素問作脈不往來者死皮膚著者死曰其可治者奈何曰經病者治其經絡病者治其絡素問二絡上有孫字身有痛者治其經絡其病者在奇邪奇邪之脈則繆刺之留瘦不移節而刺之上實下虛切而順之索其結絡脈刺出其血以通其氣瞳子高者太陽不足戴眼者太陽已絶此決死生之要不可不察也
