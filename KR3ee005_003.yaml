一十六穴第二十六黃帝問曰手少陰之脈獨無俞何也岐伯對曰少陰者心脈也心者五臟六腑之大主也為帝王精神之舍也其臟堅固邪弗能容也容之則心傷心傷則神去神去則死矣故諸邪之在於心者皆在心之包絡包絡者心主之脈也故獨無俞焉曰少陰脈獨無俞者心不病乎曰其外經脈病而臟不病故獨取其經於掌後兌骨之端其餘脈出入曲折皆如手少陰少陰少字宜作太字銅人經作厥字心主之脈行也故本俞者皆因其氣之虛實疾徐以取之是謂因沖而泄因衰而補如是者邪氣得去真氣堅固是謂因天之序心出少衝少衝者木也一名經始在手小指內廉之端去爪甲角如韭葉手少陰脈之所出也為井刺入一分留一呼灸一壯少陰八穴其七有治一無治者邪弗能容也故曰無俞焉少府者火也在小指本節後陷者中直勞宮手少陰脈之所留也為滎刺入三分神門者土也一名兌沖一名中都在掌後兌骨之端陷者中手少陰脈之所注也為俞刺入三分留七呼灸三壯素問陰陽論注云神門在掌後五分當小指間手少陰郤在掌後脈中去腕五分刺入三寸灸三壯通里手少陰經在腕後一寸別走太陽刺入三寸灸三壯靈道者金也在掌後一寸五分或曰一寸手少陰脈之所行也為經刺入三分灸三壯少海者水也一名曲節在肘內廉節後陷者中動脈應手手少陰脈之所入也為合刺入五分灸三壯極泉在腋下筋間動脈入胸中手少陰脈氣所發刺入三分灸五壯手陽明及臂凡二十八穴第二十七大腸合手陽明出於商陽商陽者金也一名絶陽在手大指次指內側去爪甲角如韭葉手陽明脈之所出也為井刺入一分留一呼灸三壯二間者水也一名間谷在手大指次指本節前內側陷者中手陽明脈之所留也為滎刺入三分留六呼灸三壯三間者木也一名少谷在手大指次指本節後內側陷者中手陽明脈之所注也為俞刺入三分留三呼灸三壯合谷一名虎口在手大指次指間手陽明脈之所過也為原刺入三分留六呼灸三壯陽溪者火也一名中魁在腕中上側兩傍間陷者手陽明脈之所行也為經刺入三分留七呼灸三壯偏歷手陽明絡在腕後三寸別走太陰者刺入三分留七呼灸三壯溫溜一名逆注一名蛇頭手陽明郤在腕後少士五寸大士六寸刺入三分灸三壯大士少士調大人小兒也下廉在輔骨下去上廉一寸恐疑誤輔齊兌肉其分外邪刺入五分留五呼灸三壯上廉在三里下一寸其分抵陽明之會外邪刺入五分灸五壯手三里在曲池下二寸按之肉起兌肉之端刺入三分灸三壯曲池者土也在肘外輔骨肘骨之中手陽明脈之所入也為合以手按胸取之刺入五寸留七呼灸三壯肘窖在肘大骨外廉陷者中刺入四分灸三壯五里在肘上三寸行向里大脈中央禁不可刺灸三壯臂臑在肘上七寸膕肉端手陽明絡之會刺入三分灸三壯手少陽及臂凡二十四穴第二十八三焦上合手少陽出於關衝關衝者金也在手小指次指之端去爪甲角如韭葉手少陽脈之所出也為井刺入一分留三呼灸三壯腋門者水也在小指次指間陷者中手少陽脈之所溜也為滎刺入三分灸三壯中渚者木也在手小指次指本節後陷者中手少陽脈之所注也為俞刺入二分留三呼灸三壯陽池一名別陽在手表上腕上陷者中手少陽脈之所過也為原刺入二分留三呼灸五壯銅人經云不可灸外關手少陽絡在腕後二寸陷者中別走心者刺入三分留七呼灸三壯支溝者火也在腕後三寸兩骨之間陷者中手少陽脈之所行也為經刺入二分留七呼灸三壯三陽絡在臂上大交脈支溝上一寸不可刺灸五壯四瀆在肘前五寸外廉陷者中刺入六分留七呼灸三壯天井者土也在肘外大骨之後一寸兩筋間陷者中屈肘得之手少陽脈之所入也為合刺入一分留七呼灸三壯清冷淵在肘上一寸一本作三寸伸肘舉臂取之刺入三分灸三壯消濼在肩下臂外開腋斜肘分下胻一本無胻字刺入六分灸三壯氣府論注云手少陽脈之會會宗手少陽郤在腕後三寸空中刺入三分灸三壯手太陽凡一十六穴第二十九小腸上合手太陽出於少澤少澤者金也一名小吉在手小指之端去爪甲下一分陷者中手太陽脈之所出也為井刺入一分留二呼灸一壯前谷者水也在手小指外側本節前陷者中手太陽脈之所溜也為滎刺入一分留三呼灸三壯後溪者木也在手小指外側本節後陷者中手太陽脈之所注也為俞刺入二分留二呼灸一壯腕骨在手外側腕前起骨下陷者中手太陽脈之所過也為原刺入二分留三呼灸三壯陽谷者火也在手外側腕中兌骨下陷者中手太陽脈之所行也為經刺入二分留二呼氣穴論注云留三呼灸三壯養老手太陽郤在手踝骨上一空腕後一寸陷者中刺入三分灸三壯支正手太陽絡在肘後一本作腕後五寸別走少陰者刺入三分留七呼灸三壯小海者土也在肘內大骨外去肘端五分陷者中屈肘乃得之手太陽脈之所入也為合刺入二分留七呼灸七壯氣穴論注作少海足太陰及股凡二十二穴第三十脾在隱白隱白者木也在足大指端內側去爪甲角如韭葉足太陰脈之所出也為井刺入一分留三呼灸三壯大都者火也在足大指本節後陷者中足太陰脈之所溜也為滎刺入三分留七呼灸一壯太白者土也在足內側核骨下陷者中足太陰脈之所注也為俞刺入三分留七呼灸三壯公孫在足大指本節後一寸別走陽明太陰絡也刺入四分留二十呼灸三壯商丘者金也在足內踝下微前陷者中足太陰脈之所行也為經刺入三分留七呼灸三壯氣穴論注云刺入四分三陰交在內踝上三寸骨下陷者中足太陰厥陰少陰之會刺入三分留七呼灸三壯漏谷在內踝上六寸骨下陷者中足太陰絡刺入三分留七呼灸三壯地機一名脾舍足太陰郤別走上一寸空在膝下五寸刺入三分灸三壯陰陵泉者水也在膝下內側輔骨下陷者中伸足乃得之足太陰脈之所入也為合刺入五分留七呼灸三壯血海在膝臏上內廉白肉際二寸中足太陰脈氣所發刺入五分灸五壯箕門在魚腹上越兩筋間動脈應手太陰內部足太陰脈氣所發刺入三分留六呼灸三壯素問三部九候論注云直五里下寬鞏足單衣沉取乃得之動脈應於手足厥陰及股凡二十二穴第三十一肝出大敦大敦者木也在足大指端去爪甲角如韭葉及三毛中足厥陰脈之所出也為井刺入三分留十呼灸三壯行間者火也在足大指間動脈陷者中足厥陰之所溜也為滎刺入六分留十呼灸三壯太衝者土也在足大指本節後二寸或曰一寸五分陷者中足厥陰脈之所注也為俞刺入三分留十呼灸三壯素問刺腰痛論注云在足大指本節後內間二寸陷者中動脈應手中封者金也在足內踝前一寸仰足取之陷者中伸足乃得之足厥陰脈之所注也為經刺入四分留七呼灸三壯氣穴論注云在內踝前一寸五分蠡溝足厥陰之絡在足內踝上五寸別走少陽刺入二分留三呼灸三壯中都足厥陰郤在內踝上七寸䯒中與少陰相直刺入三分留六呼灸五壯膝關在犢鼻下二寸陷者中足厥陰脈氣所發刺入四分灸五壯曲泉者水也在膝內輔骨下大筋上小筋下陷者中屈膝得之足厥陰陰脈之所入也為合刺入六分留十呼灸三壯陰包在膝上四寸股內廉兩筋間足厥陰別走此處有缺刺入六分灸三壯五里在陰廉下去氣衝三寸陰股中動脈刺入六分灸五壯外臺祕要作去氣衝三寸去陰廉二寸陰廉在羊矢下去氣衝二寸動脈中刺入八分灸三壯足少陰及股並陰蹺陰維凡二十穴第三十二腎出湧泉湧泉者水也一名地衝在足心陷者中屈足卷指宛宛中足少陰脈之所出也為井刺入三分留三呼灸三壯然谷者火也一名龍淵在足內踝前起大骨下陷者中足少陰脈之所留也為滎刺入三分留三呼灸三壯刺之多見血使人立飢欲食太溪者土也在足內踝後跟骨上動脈陷者中足少陰脈之所注也為俞刺入三分留七呼灸三壯大鐘在足跟後沖中別走太陽足少陰絡刺入二分留七呼灸三壯素問水熱穴論注云在內踝後刺腰痛論注云在足跟后街中動脈應手照海陰蹺脈所生在足內踝下一寸刺入四分留六呼灸三壯水泉足少陰郤去太溪下一寸在足內踝下刺入四分灸五壯復溜者金也一名伏白一名昌陽在足內踝上二寸陷者中足少陰脈之所行也為經刺入三分留三呼灸五壯刺腰痛論注云在內踝上二寸動脈交信在足內踝上二寸少陰前太陰後筋骨間陰蹺之郤刺入四分留三呼灸三壯築賓陰維之郤在足內踝上腨分中刺入三分灸五壯刺腰痛論注云在內踝後陰谷者水也在膝下內輔骨後大筋之下小筋之上按之應手屈膝得之足少陰脈之所入也為合刺入四分灸三壯足陽明及股凡三十穴第三十三胃出厲兌厲兌者金也在足大指次指之端去爪甲角如韭葉足陽明脈之所出也為井刺入一分留一呼灸三壯內庭者水也在足大指次指外間陷者中足陽明脈之所留也為滎刺入三分留二十呼氣穴論注云留十呼灸三壯陷谷者木也在足大指次指間本節後陷者中去內庭二寸足陽明脈之所注也為俞刺入五分留七呼灸三壯衝陽一名會原在足趺上五寸骨間動脈上去陷骨三寸足陽明脈之所過也為原刺入三分留十呼灸三壯解溪者火也在衝陽後一寸五分腕上陷者中足陽明脈之所行也為經刺入五分留五呼灸三壯氣穴論注云二寸五分刺瘧論注云三寸五分豐隆足陽明絡也在外踝上八寸下廉胻外廉陷者中別走太陰者刺入三分灸三壯巨虛下廉足陽明與小腸合在上廉下三寸刺入三分灸三壯氣穴論注云足陽明脈氣所發條口在下廉上一寸足陽明脈氣所發刺入八分灸三壯巨虛上廉足陽明與大腸合在三里下三寸刺入八分灸三壯氣穴論注云在犢鼻下六寸足陽明脈氣所發三里土也在膝下三寸䟰外廉足陽明脈氣所入也為合刺入一寸五分留七呼灸三壯素問云在膝下三寸胻外廉兩筋肉分間犢鼻在膝下胻上俠解大筋中足陽明脈氣所發刺入六分灸三壯梁丘足陽明郤在膝上二寸刺入三分灸三壯陰市一名陰鼎在膝上三寸伏兔下若拜而取之足陽明脈氣所發刺入三分留七呼禁不可灸刺腰痛論注云伏兔下陷者中灸三壯伏兔在膝上六寸起肉間足陽明脈氣所發刺入五分禁不可灸髀關在膝上伏兔後交分中刺入六分灸三壯足少陽及股並陽維四穴凡二十八穴第三十四膽出於竅陰竅陰者金也在足小指次指之端去爪甲角如韭葉足少陽脈之所出也為井刺入三分留三呼氣穴論注作一呼灸三壯俠溪者水也在足小指次指二歧骨間本節前陷者中足少陽脈之所溜也為滎刺入三分留三呼灸三壯地五會在足小指次指本節後間陷者中刺入三分不可灸灸之令人瘦不出三年死臨泣者木也在足小指次指本節後間陷者中去俠溪一寸五分足少陽脈之所注也為俞刺入二分灸三壯丘墟在足外廉踝下如前陷者中去臨泣一寸足少陽脈之所過也為原刺入五分留七呼灸三壯懸鐘在足外踝上三寸動者脈中足三陽絡按之陽明脈絶乃取之刺入六分留七呼灸五壯光明足少陽絡在足外踝上五寸別走厥陰者刺入六分留七呼骨空論注云刺入七分留十呼灸三壯外丘足少陽郤少陽所生在外踝上七寸刺入三分灸三壯陽輔者火也在足外踝上四寸氣穴論注無四寸二字輔骨前絶骨端如前三分去丘墟七寸足少陽脈之所行也為經刺入五分留七呼灸三壯陽交一名別陽一名足窖陽維之郤在內踝上七寸斜屬三陽分肉間刺入六分留七呼灸三壯陽陵泉者土也在膝下一寸胻外廉陷者中足少陽脈之所入也為合刺入六分留十呼灸三壯陽關在陽陵泉上三寸犢鼻外陷者中刺入五分禁不可灸中犢在髀骨外膝上五寸分肉間陷者中足少陽脈氣所發也刺入五分留七呼灸五壯環跳在髀樞中側臥伸下足屈上足取之足少陽脈氣所發刺入一寸留二十呼灸五十壯氣穴論注云髀樞後足少陽太陽二脈之會灸三壯足太陽及股並陽蹺六穴凡三十四穴第三十五膀胱出於至陰至陰者金也在足小指外側去爪甲角如韭葉足太陽脈之所出也為井刺入三分留五呼灸五壯通谷者水也在足小指外側本節前陷者中足太陽脈之所溜也為滎刺入二分留五呼束骨者木也在足小指外側本節後陷者中足太陽脈之所注也為俞刺入三分灸三壯氣穴論注云本節後赤白肉際京骨在足外側大骨下赤白肉際陷者中按而得之足太陽脈之所過也為原刺入三分留七呼灸三壯申脈陽蹺所生也在足外踝下刺腰痛論注云外踝下五分陷者中容爪甲許刺入三分留六呼灸三壯金門在足太陽郤一空在足外踝下一名關梁陽維所別屬也刺入三分灸三壯僕參一名安邪在跟骨下陷者中刺腰痛論注云陷者中細脈動應手拱足得之足太陽脈之所行也為經刺入五分留十呼灸三壯刺腰痛論云陷者中細脈動應手跗陽氣穴論注作付陽陽蹺之郤在足外踝上三寸太陽前少陽後筋骨間刺入六分留七呼灸三壯飛揚一名厥陽在足外踝上七寸足太陽絡別走少陰者刺入三分灸三壯承山一名魚腹一名肉柱在兌腨腸下分肉間陷者中刺入七分灸三壯承筋一名腨腸一名直腸在腨腸中央陷者中足太陽脈氣所發禁不可刺灸三壯刺腰痛論注云在腨中央合陽在膝約文中央下二寸刺入六分灸五壯委中者土也在膕中央約文中動脈足太陽脈氣之所入也為合刺入五分留七呼灸三壯素問骨空論注云膕謂膝解之後曲腳之中背面取之刺腰痛論注云在膝後屈處崑崙火也在足外踝後跟骨上陷中細脈動應手足太陽脈之所行也為經刺入五分留十呼灸三壯委陽三焦下輔俞也在足太陽之前少陽之後出於膕中外廉兩筋間承扶下六寸此足太陽之別絡也刺入七分留五呼灸三壯屈身而取之浮郤在委陽上一寸屈膝得之刺入五分灸三壯殷門在肉郤下六寸刺入五分留七呼灸三壯承扶一名肉郤一名陰關一名皮部在尻臀下股陰腫上約文中刺入二寸留七呼灸三壯欲令灸發者灸履革扁音遍尉之三日即發
