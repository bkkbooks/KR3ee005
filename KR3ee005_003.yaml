body:
  text: 卷三諸穴總計六百五十四穴單四十八穴雙三百零八穴頭直鼻中髮際傍行至頭維凡七穴第一黃帝問曰氣穴三百六十五以應一歲願聞孫絡溪谷亦各有應乎岐伯對曰孫絡溪谷三百六十五穴會以應一歲以灑素問作溢奇邪以通榮衛肉之大會為谷肉之小會為溪肉分之間溪谷之會以行榮衛以舍素問作會大氣也神庭在髮際直鼻督脈足太陽陽明之會禁不可刺令人癲疾目失精灸三壯曲差一名鼻沖俠神庭兩傍各一寸五分在髮際足太陽脈氣所發正頭取之刺入三分灸五壯本神在曲差兩傍各一寸五分在髮際一曰直耳上入髮際四分足少陽陽維之會刺入三分灸三壯頭維在額角髮際俠本神兩傍各一寸五分足少陽陽維之會刺入五分禁不可灸頭直鼻中入髮際一寸循督脈卻行至風府凡八穴第二上星一穴在顱上直鼻中央入髮際一寸陷者中可容豆督脈氣所發刺入三分留六呼灸三壯囟會在上星後一寸骨間陷者中督脈氣所發刺入四分灸五壯前頂在囟會後一寸五分骨間陷者中督脈氣所發刺入四分灸五壯百會一名三陽五會在前頂後一寸五分頂中央旋毛中陷可容指督脈足太陽之會刺入三分灸三壯後頂一名交沖在百會後一寸五分枕骨上督脈氣所發刺入四分灸五壯強間一名大羽在後頂後一寸五分督脈氣所發刺入三分灸五壯腦戶一名匝風一名會額在枕骨上強間後一寸五分督脈足太陽之會此別腦之會不可灸令人喑素問刺禁論云刺頭中腦戶入腦立死王冰注云灸五壯又骨空論云不可妄灸銅人經云禁不可灸灸之令人啞風府一名舌本在頂上入髮際一寸大筋內宛宛中疾言其肉立起言休其肉立下督脈陽維之會禁不可灸灸之令人喑刺入四分留三呼頭直俠督脈各一寸五分卻行至玉枕凡十穴第三五處在督脈傍去上星一寸五分足太陽脈氣所發刺入三分不可灸素問水熱穴注云灸三壯承光在五處後二寸足太陽脈氣所發刺入三分禁不可灸通天一名天臼在承光後一寸五分足太陽脈氣所發刺入三分留七呼灸三壯絡卻一名強陽一名腦蓋在通天後一寸三分足太陽脈氣所發刺入三分留五呼灸三壯玉枕在絡卻後七分俠腦戶傍一寸三分起肉枕骨入髮際三寸足太陽脈氣所發刺入三分留三呼灸三壯頭直目上入髮際五分卻行至腦空凡十穴第四臨泣當目上眥直入髮際五分陷者中足太陽少陽陽維之會刺入三分留七呼灸五壯目窗一名至營在臨泣後一寸足少陽陽維之會刺入三分灸五壯正營在目窗後一寸足少陽陽維之會刺入三分灸五壯承靈在正營後一寸五分足少陽陽維之會刺入三分灸五壯腦空一名顳音熱顬音儒在承靈後一寸五分俠玉枕骨下陷者中足少陽陽維之會刺入四分灸五壯素問氣府論注云俠枕骨後枕骨上頭緣耳上卻行至完骨凡十二穴第五天衝在耳上如前三分刺入三分灸三壯氣府論注云足太陽少陽之會率谷在耳上入髮際一寸五分足太陽少陽之會嚼而取之刺入四分灸三壯曲鬢在耳上入髮際曲隅陷者中鼓頷有空足太陽少陽之會刺入三分灸三壯浮白在耳後入髮際一寸足太陽少陽之會刺入三分灸二壯氣穴注云灸三壯刺入三分竅陰在完骨上枕骨下搖動應手足太陽少陽之會刺入四分灸五壯氣穴注云灸三壯刺入三分完骨在耳後入髮際四分足太陽少陽之會刺入二分留七呼灸七壯氣穴注云刺入三分灸三壯頭自發際中央傍行凡五穴第六喑門一名舌橫一名舌厭在後髮際宛宛中入系舌本督脈陽維之會仰頭取之刺入四分不可灸灸之令人喑氣府論注云去風府一寸天柱在俠項後髮際大筋外廉陷者中足太陽脈氣所發刺入二分留六呼灸三壯風池在顳顬後髮際陷者中足少陽陽維之會刺入三分留三呼灸三壯氣府論注云在耳後陷者中按之引於耳中手足少陽脈之會刺入四分背自第一椎循督脈下行至脊骶凡十一穴第七氣府論注云第六椎下有靈臺十椎下有中樞十六椎下有陽關大椎在第一椎陷者中三陽督脈之會刺入五分灸九壯陶道在大椎節下間督脈足太陽之會俯而取之刺入五分留五呼灸五壯身柱在第三椎節下間督脈氣所發俯而取之刺入五分留五呼灸三壯氣府論注云灸五壯神道在第五椎節下間督脈氣所發俯而取之刺入五分留五呼灸三壯氣府論注云灸五壯至陽在第七椎節下間督脈氣所發俯而取之刺入五分灸三壯筋縮在第九椎節下間督脈氣所發俯而取之刺入五分灸三壯氣府論注云灸五壯脊中在第十一椎節下間督脈氣所發俯而取之刺入五分不可灸灸則令人痿懸樞在第十三椎節下間督脈氣所發伏而取之刺入三分灸三壯命門一名屬纍在十四椎節下間督脈氣所發伏而取之刺入五分灸三壯腰俞一名背解一名髓空一名腰戶在第二十一椎節下間督脈氣所發刺入三分留七呼灸五壯氣府論注云刺入三分熱注水穴注同熱穴注作二寸繆刺論同長強一名氣之陰郤在脊骶端督脈別絡少陰所結刺入三分留七呼灸三壯氣府論注及水穴注云刺入二分背自第一椎兩傍俠脊各一寸五分下背自第二椎兩傍俠脊各三寸行至二面凡二十九穴第十懸顱在曲周顳顬中足少陽脈氣所發刺入三分留七呼灸三壯氣府注云在曲角上顳顬之中頷厭在曲周顳顬上廉手少陽足陽明之會刺入七分留七呼灸三壯氣府注云在曲角顳顬之上廉刺深令人耳無聞懸釐在曲周顳顬下廉手足少陽陽明之會刺入三分留七呼灸三壯氣府注云在曲角顳顬之上刺深令人耳無聞陽白在眉上一寸直瞳子足少陽陽維之會刺入三分灸三壯氣府注云足陽明陰維二脈之會今詳陽明之經不到於此又陰維不與陽明會疑素問注非是攢竹一名員在一名始光一名夜光又名明光在眉頭陷者中足太陽脈氣所發刺入三分留六呼灸三壯絲竹空一名巨窖在眉後陷者中足少陽脈氣所發刺入三分留三呼不宜灸灸之不幸令人目小及盲氣府論注云手少陽又云留六呼睛明一名淚孔在目內眥外手足太陽足陽明之會刺入六分留六呼灸三壯氣府論注云手足太陽足陽明陰陽蹺五臟之會瞳子窖在目外去眥五分手太陽手足少陽之會刺入三分灸三壯承泣一名鼷穴一名面窖在目下七分直目瞳子陽蹺任脈足陽明之會刺入三分不可灸四白在目下一寸向頄骨即顴骨顴空足陽明脈氣所發刺入三分灸七壯氣府論注云刺入四分不可灸顴窖一名兌骨在面頄骨下廉陷者中手少陽太陽之會刺入三分素窖一名面王在鼻柱上端督脈氣所發刺入三分禁灸迎香一名衝陽在禾窖上鼻下孔旁手足陽明之會刺入三分巨窖在俠鼻孔旁八分直瞳子蹺脈足陽明之會刺入三分禾窖在直鼻孔下俠水溝傍五分手陽明脈氣所發刺入三分水溝在鼻柱下人中督脈手足陽明之會直唇取之刺入三分留七呼灸三壯兌端在唇上端手陽明脈氣所發刺入三分留六呼灸三壯齦交在唇內齒上齦縫中刺入三分灸三壯氣府論注云任督脈二經之會地倉一名會維俠口傍四分如近下是蹺脈手足陽明之會刺入三分承漿一名天池在頤前唇之下足陽明任脈之會開口取之刺入三分留六呼氣府論注作五呼灸三壯頰車在耳下曲頰端陷者中開口有孔足陽明脈氣所發刺入三分灸三壯大迎一名髓孔在曲頷前一寸三分骨陷者中動脈足太陽脈氣所發刺入三分留七呼灸三壯耳前後凡二十穴第十一上關一名客主人在耳前上廉起骨端開口有孔手少陽足陽明之會刺入三分留七呼灸三壯刺太深令人耳無聞下關在客主人下耳前動脈下空下廉合口有孔張口即閉足陽明少陽之會刺入三分留七呼灸三壯耳中有干䘓音適抵不可灸䘓抵一作適之不可灸一作針灸留針耳門在耳前起肉當耳缺者刺入三分留三呼灸三壯禾窖在耳前鋭發下橫動脈手足少陽手太陽之會刺入三分灸三壯氣府論注云手足少陽二脈之會聽會在耳前陷者中張口得之動脈應手少陽脈氣所發刺入四分灸三壯繆刺注云正當手陽明脈之分聽宮在耳中珠子大明如赤小豆手足少陽手太陽之會刺入三分灸三壯氣穴注云刺入一分角孫在耳廓中間開口有孔手足少陽手陽明之會刺入三分灸三壯氣府論注云在耳上廓表之間髮際之下手太陽手足少陽三脈之會瘈脈一名資脈在耳本後雞足青絡脈刺出血如豆汁刺入一分灸三壯顱息在耳後間青絡脈足少陽脈氣所發刺入一分出血多則殺人灸三壯翳風在耳後陷者中按之引耳中手足少陽之會刺入四分灸三壯頸凡十七穴第十二廉泉一名本池在頷下結喉上舌本下陰維任脈之會刺入二分留三呼灸三壯氣府論注云刺入三分人迎一名天五會在頸大脈動應手俠結喉以候五臟氣足陽明脈氣所發禁不可灸刺入四分過深不幸殺人素問陰陽類論注云人迎在結喉旁一寸五分動脈應手天窗一名窗籠在曲頰下扶突後動脈應手陷者中手太陽脈氣所發刺入六分灸三壯天牖在頸筋間缺盆上天容後天柱前完骨後髮際上手少陽脈氣所發刺入一分灸三壯天容在耳曲頰後手少陽脈氣所發刺入一寸灸三壯水突一名水門在頸大筋前直人迎下氣舍上足陽明脈氣所發刺入一寸灸三壯氣舍在頸直人迎下俠天突陷者中足陽明脈氣所發刺入三分灸五壯扶突在人迎後一寸五分手陽明脈氣所發刺入三分灸三壯針經云在氣舍後一寸五分天鼎在缺盆上直扶突氣舍後一寸五分手陽明脈氣所發刺入四分灸三壯氣府論注云在氣舍後半寸肩凡二十八穴第十三肩井在肩上陷者中缺盆上大骨前手少陽陽維之會刺入五分灸三壯氣府論注云灸三壯肩貞在肩曲胛下兩骨解間肩髃後陷者中手太陽脈氣所發刺入八分灸三壯巨骨在肩端上行兩叉骨間陷者中手陽明蹺脈之會刺入一寸五分灸五壯氣府論注云灸三壯天窖在肩缺盆中毖骨之間陷者中手少陽陽維之會刺入八分灸三壯肩髃在肩端兩骨間手陽明蹺脈之會刺入六分留六呼灸三壯肩窖在肩端臑上斜舉臂取之刺入七分灸三壯氣府論注云手少陽脈氣所發臑腧在肩臑後大骨下胛上廉陷者中手太陽陽維蹺脈之會舉臂取之刺入八分灸三壯秉風俠肩窖在外肩上小髃骨後舉臂有空手陽明太陽手足少陽之會舉臂取之刺入五分灸五壯氣府論注云灸三壯天宗在秉風后大骨下陷者中手太陽脈氣所發刺入五分留六呼灸三壯肩外俞在肩胛上廉去脊三寸陷者中刺入六分灸三壯肩中俞在肩胛內廉去脊二寸陷者中刺入三分留七呼灸三壯曲垣在肩中央曲甲陷者中按之動脈應手刺入八九分灸十壯缺盆一名天蓋在肩上橫骨陷者中刺入三分留七呼灸三壯刺太深令人逆息骨空論注云手陽明脈氣所發氣府論注云足陽明脈氣所發臑會一名臑窖在臂前廉去肩頭三寸手陽明之絡刺入五分灸五壯氣府論注云手陽明手少陽二絡脈之會胸自天突循任脈下行至中庭凡七穴第十四天突一名玉戶在頸結喉下二寸氣穴論注云五寸中央宛宛中陰維任脈之會低頭取之刺入一寸留七呼灸三壯氣府論注云灸五壯璇璣在天突下一寸中央陷者中任脈氣所發仰頭取之刺入三分灸五壯華蓋在璇璣下一寸陷者中任脈氣所發仰頭取之刺入三分灸五壯紫宮在華蓋下一寸六分陷者中任脈氣所發仰頭取之刺入三分灸五壯玉堂一名玉英在紫宮下一寸六分陷者中任脈氣所發仰頭取之刺入三分灸五壯膻中一名元兒在玉堂下一寸六分陷者中任脈