body:
  text: 卷一精神五臟論第一黃帝問曰凡刺之法必先本於神血脈營氣精神此五臟之所藏也何謂德氣生精神魂魄心意志思智慮請問其故岐伯對曰天之在我者德也地之在我者氣也德流氣薄而生也故生之來謂之精兩精相搏謂之神隨神往來謂之魂並精出入謂之魄可以任物謂之心心有所憶謂之意意有所存謂之志因志存變謂之思因思遠慕謂之慮因慮處物謂之智故智以養生也必順四時而適寒暑和喜怒而安居處節陰陽而調剛柔如是則邪僻不生長生久視是故怵惕思慮者則神傷神傷則恐懼流淫而不正因悲哀動中者則竭絶而失生喜樂者神憚散而不藏愁憂者氣閉塞而不行盛怒者迷惑而不治恐懼者蕩憚而不收太素不收作失守素問曰怒則氣逆甚則嘔血及食而氣逆故氣上喜則氣和志達營衛通利故氣緩悲則心系急肺布葉舉兩焦不通營衛不散熱氣在中故氣消恐則神卻卻則上焦閉閉則氣還還則下焦脹故氣不行熱則腠理開營衛通汗大泄驚則心無所倚神無所歸慮無所定故氣亂勞則喘且汗出內外皆越故氣耗思則心有所傷神有所止氣流而不行故氣結以上言九氣其義小異大同肝藏血血舍魂在氣為語在液為淚肝氣虛則恐實則怒素問曰人臥血歸於肝肝受血而能視足受血而能步掌受血而能握指受血而能攝心藏脈脈舍神在氣為吞在液為汗心氣虛則悲憂實則笑不休脾藏營營舍意在氣為噫在液為涎脾氣虛則四肢不用五臟不安實則腹脹涇溲不利噫音作噯肺藏氣氣舍魄在氣為咳在液為涕肺氣虛則鼻息不利少氣實則喘喝胸憑九墟作盈仰息腎藏精精舍氣在氣為欠在液為唾腎氣虛則厥實則脹五臟不安必審察五臟之病形以知其氣之虛實而謹調之肝氣悲哀動中則傷魂魂傷則狂妄其精不守一本作不精不精則不正當令人陰縮而筋攣兩脅肋骨不舉毛悴色夭死於秋素問曰肝在聲為呼在變動為握在志為怒怒傷肝九卷及素問又曰精氣並於肝則憂解曰肝虛則恐實則怒怒而不已亦生憂矣肝之與腎脾之與肺互相成也脾者土也四臟皆受成焉故恐發於肝而成於腎愛發於脾而成於肝肝合膽膽者中精之府也腎藏精故恐同其怒怒同其恐一過其節則二臟俱傷經言若錯其歸一也心怵惕思慮則傷神神傷則恐懼自失破䐃音窘脫肉毛悴色夭死於冬素問曰心在聲為笑在變動為憂在志為喜喜傷心九卷及素問又曰精氣並於心則喜或言心與肺脾二經有錯何謂也解曰心虛則悲悲則憂心實則笑笑則喜心之與肺脾之與心亦互相成也故喜發於心而成於肺思發於脾而成於心一過其節則二臟俱傷此經互言其義耳非有錯也又楊上善云心之憂在心變動肺之憂在肺之志是則肺主於秋憂為正也心主於憂變而生憂也脾愁憂不解則傷意意傷則悶亂四肢不舉毛悴色夭死於春素問曰脾在聲為歌在變動為噦在志為思思傷脾九卷及素問又曰精氣並於脾則飢一作畏肺喜樂樂極則傷魄魄傷則狂狂者意不存其人皮革焦毛悴色夭死於夏素問曰肺在聲為哭在變動為咳在志為憂憂傷肺九卷及素問又曰精氣並於肺則悲腎盛怒不止則傷志志傷則喜忘其前言腰脊不可俯仰毛悴色夭死於季夏素問曰腎在聲為呻在變動為栗在志為怒怒傷腎九卷及素問又曰精氣並於腎則恐故恐懼而不改一作解則傷精精傷則骨酸痿厥精時自下是故五臟主藏精者也不可傷傷則失守陰虛陰虛則無氣無氣則死矣是故用針者觀察病人之態以知精神魂魄之存亡得失之意五者已傷針不可以治也五臟變腧第二黃帝問曰五臟五腧願聞其數岐伯對曰人有五臟臟有五變變有五腧故五五二十五腧以應五時肝為牡臟其色青其時春其日甲乙其音角其味酸素問曰肝在味為辛於經義為未通心為牡臟其色赤其時夏其日丙丁其音徵其味苦素問曰心在味為咸於經義為未通脾為牡臟其色黃其時長夏其日戊己其音宮其味甘肺為牝臟其色白其時秋其日庚辛其音商其味辛素問曰肺在味為苦於經義為未通腎為牝臟其色黑其時冬其日壬癸其音羽其味鹹是謂五變臟主冬冬刺井色主春春刺滎時主夏夏刺腧音主長夏長夏刺經味主秋秋刺合是謂五變以主五腧曰諸原安合以致五腧曰原獨不應五時以經合之以應其數故六六三十六腧曰何謂臟主冬時主夏音主長夏味主秋色主春曰病在臟者取之井病變於色者取之滎病時間時甚者取之腧病變於音者取之經經一作絡滿而血者病在胃一作胸及以飲食不節得病者取之合故命曰味主合是謂五變也人逆春氣則少陽不生肝氣內變逆夏氣則太陽不長心氣內洞逆秋氣則太陰不收肺氣焦滿逆冬氣則少陰不藏腎氣濁沉夫四時陰陽者萬物之根本也所以聖人春夏養陽秋冬養陰以從其根逆其根則伐其本矣故陰陽者萬物之終始也順之則生逆之則死反順為逆是謂內格是故聖人不治已病治未病論五臟相傳所勝也假使心病傳肺肺未病逆治之耳五臟六腑陰陽表裡第三肺合大腸大腸者傳道之腑心合小腸小腸者受盛之腑肝合膽膽者清淨之腑脾合胃胃者五穀之腑腎合膀胱膀胱者津液之腑少陰屬腎上連肺故將兩臟三焦者中瀆之腑水道出焉屬膀胱是孤之腑此六腑之所合者也素問曰夫腦髓骨脈膽女子胞此六者地氣之所生也皆藏於陰象於地故藏而不瀉名曰奇恆之府胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之府此不能久留輸瀉者也魄門亦為五臟使水穀不得久藏五臟者藏精氣而不瀉故滿而不能實六腑者傳化物而不藏故實而不能滿水穀入口則胃實而腸虛食下則腸實而胃虛故實而不滿滿而不實也氣口何以獨為五臟主胃者水穀之海六腑之大源也稱六腑雖少錯於理相發為佳肝膽為合故足厥陰與少陽為表裡脾胃為合故足太陰與陽明為表裡腎膀胱為合故足少陰與太陽為表裡心與小腸為合故手少陰與太陽為表裡肺與大腸為合故手太陰與陽明為表裡五臟者肺為之蓋巨肩陷咽喉見於外心為之主缺盆之道䯏音滑骨有餘以候內𩩲骭音曷干肝為之主將使之候外欲知堅固視目大小脾主為胃九墟太素作衛使之迎糧視唇舌好惡以知吉凶腎者主為外使之遠聽視耳好惡以知其性六腑者胃為之海廣骸太素作骨引大頸張胸五穀乃容鼻隧以長以候大腸唇厚人中長以候小腸目下裹大其膽乃橫鼻孔在外膀胱漏泄鼻柱中央起三焦乃約此所以候六腑也上下三等臟安且良矣五臟六腑官第四鼻者肺之官目者肝之官口唇者脾之官舌者心之官耳者腎之官凡五官者以候五臟肺病者喘息鼻張肝病者目眥青脾病者唇黃心病者舌卷顴赤腎病者顴與顏黑故肺氣通於鼻鼻和則能知香臭矣心氣通於舌舌和則能知五味矣素問曰心在竅為耳一云舌夫心者火也腎者水也水火既濟心氣通於舌舌非竅也其通於竅者寄在於耳王冰雲手少陰之絡會於耳中故肝氣通於目目和則能視五色矣素問曰諸脈者皆屬於目又九卷曰心藏肺肺舍神神明通體故云屬目脾氣通於口口和則能別五穀味矣腎氣通於耳耳和則能聞五音矣素問曰腎在竅為耳然則腎氣上通於耳下通於陰也五臟不和則九竅不通六腑不和則留結為癰故邪在腑則陽脈不和陽脈不和則氣留之氣留之則陽氣盛矣邪在臟則陰脈不和陰脈不和則血留之血留之則陰氣盛矣陰氣太盛則陽氣不得相營也故曰格陰陽俱盛不得自相營也故曰關格關格者不得盡一作盡期而死矣五臟大小六腑應候第五黃帝問曰人俱受氣於天其有獨盡天壽者不免於病者何也岐伯對曰五臟者固有大小高下堅脆端正偏傾者六腑亦有大小長短厚薄結直緩急者凡此二十五變者各各不同或善或惡或吉或凶也心小則安邪弗能傷太素云外邪不能傷易傷於憂心大則憂弗能傷易傷於邪太素亦作外邪心高則滿於肺中悶而善忘難開以言心下則臟外易傷於寒易恐以言心堅則臟安守固心脆則善病消疸熱中心端正則和利難傷心偏傾則操持不一無守司也楊上善云心臟言神有八變後四臟但言臟變不言神變者以神為魂魄意之主言其神變則四臟可知故略而不言也肺小則少飲不病喘一作喘喝肺大則多飲善病胸痹逆氣肺高則上氣喘息咳逆肺下則逼賁迫肺善脅下痛肺堅則不病咳逆上氣肺脆則善病消疸易傷也一云易傷於熱喘息鼻衄肺端正則和利難傷肺偏傾則病胸脅偏痛肝小則安無脅下之病肝大則逼胃迫咽迫咽則善一作苦膈中且脅下痛肝高則上支賁加脅下急為息賁肝下則逼胃脅下空空則易受邪肝堅則臟安難傷肝脆則善病消疸易傷肝端正則和利難傷肝偏傾則脅下偏痛脾小則安難傷於邪脾大則苦腠䏚音停而痛不能疾行脾高則䏚引季脅而痛脾下則下加於大腸下加於大腸則臟外易受邪脾堅則臟安難傷脾脆則善病消疸易傷脾端正則和利難傷脾偏傾則瘛瘲善脹腎小則安難傷腎大則一本云耳聾或鳴汁出善病腰痛不可以俯仰易傷於邪腎高則善病腰膂痛不可以俯仰一本云背急綴耳膿血出或生肉塞腎下則腰尻痛不可俯仰為狐疝腎堅則不病腰痛腎脆則善病消疸易傷腎端正則和利難傷腎偏傾則善腰尻痛凡此二十五變者人之所以善常病也曰何以知其然曰赤色小理者心小粗理者心大無𩩲骭者心高𩩲骭小短舉者心下𩩲骭長者心堅𩩲骭弱小以薄者心脆𩩲骭直下不舉者心端正𩩲骭一作面一方者心偏傾白色小理者肺小粗理者肺大巨肩反一作大膺陷喉者肺高合腋張脅者肺下好肩背厚者肺堅肩背薄者肺脆背膺厚者肺端正膺偏竦一作欹者肺偏傾青色小理者肝小粗理者肝大廣胸反骹者肝高合脅脆骹者肝下胸脅好者肝堅脅骨弱者肝脆膺脅腹好相得者肝端正脅骨偏舉者肝偏傾黃色小理者脾小粗理者脾大揭唇者脾高唇下縱者脾下唇堅者脾堅唇大而不堅者脾脆唇上下好者脾端正唇偏舉者脾偏傾黑色小理者腎小粗理者腎大耳高者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆耳好前居牙車者腎端正耳偏高者腎偏傾凡此諸變者持則安減則病也曰願聞人之有不可病者至盡天壽雖有深憂大恐怵惕之志猶弗能感也大寒甚熱弗能傷也其有不離屏蔽室內又無怵惕之恐然不免於病者何也曰五臟六腑邪之舍也五臟皆小者少病善焦心人愁憂五臟皆大者緩於事難使以憂五臟皆高者好高舉措五臟皆下者好出人下五臟皆堅者無病五臟皆脆者不離於病五臟皆端正者和利得人心五臟皆偏傾者邪心善盜不可為人平反復言語也曰願聞六腑之應曰肺合大腸大腸者皮其應也素問曰肺之合皮也其榮毛也其主心也下章言腎之應毫毛於義為錯心合小腸小腸者脈其應也素問曰心之合脈也其榮色也其主腎也其義相順肝合膽膽者筋其應也素問曰肝之合筋也其榮爪也其主肺也其義相順脾合胃胃者肉其應也素問曰脾之合肉也其榮唇也其主肝也其義相順腎合三焦膀胱三焦膀胱者腠理毫毛其應也九卷又曰腎合骨素問曰腎之合骨也其榮發也其主脾也其義相同曰應之奈何曰肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裡大者大腸緩而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結心應脈皮厚者脈厚脈厚者小腸厚皮薄者脈薄脈薄者小腸薄皮緩者脈緩脈緩者小腸大而長皮薄而脈衝小者小腸小而短諸陽經脈皆多紆曲者小腸結脾應肉肉䐃堅大者胃厚肉䐃麼者胃薄肉䐃小而麼者胃不堅肉䐃不稱其身者胃下胃下者小脘約不利太素作下脘未約肉䐃不堅者胃緩肉䐃無小裹參標緊一本作無小裹纍者胃急肉䐃多小裹參一本亦作纍字者胃結胃結者上脘約不利肝應筋爪厚色黃者膽厚爪薄色紅者膽薄爪堅色青者膽急爪濡色赤者膽緩爪直色白無約者膽直爪惡色黑多文者膽結腎應骨密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄腠理疏者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結曰薄厚美惡皆有其形願聞其所病曰各視其外應以知其內臟則知所病矣十二原第六五臟有六腑六腑有十二原十二原者出於四關四關主治五臟五臟有疾當取之十二原十二原者五臟之所以稟三百六十五骨之氣味者也五臟有疾出於十二原而原各有所出明知其原睹其應知五臟之害矣陽中之少陰肺也其原出於太淵二陽中之太陽心也其原出於大陵二陰中之少陽肝也其原出於太衝二陰中之太陰腎也其原出於太溪二陰中之至陰脾也其原出於太白二膏之原出於鳩尾一肓之原出於脖滿設切胦鳥朗切一凡十二原主治五臟六腑之有病者也脹取三陽飧泄取三陰一云滯取三陰今夫五臟之有病譬猶刺也猶汙也猶結也猶閉也刺雖久猶可拔也汙雖久猶可雪也結雖久猶可解也閉雖久猶可決也或言久疾之不可取者非其説也夫善用針者取其疾也猶拔刺也猶雪汙也猶解結也猶決閉也疾雖久猶可畢也言不可治者未得其術也十二經水第七黃帝問曰經脈十二者外合於十二經水而內屬於五臟六腑夫十二經水者受水而行之五臟者合神氣魂魄而藏之六腑者受谷而行之受氣而揚之經脈者受血而營之合而以治奈何刺之深淺灸之壯數可得聞乎岐伯對曰臟之堅脆腑之大小谷之多少脈之長短血之清濁氣之多少十二經中多血少氣與其少血多氣與其皆多氣血與其皆少血氣皆有定數其治以針灸各調其經氣固其常有合也此人之參天地而應陰陽不可不審察之也足陽明外合於海水內屬於胃足太陽外合於清水內屬於膀胱而通水道焉足少陽外合於渭水內屬於膽足太陰外合於湖水內屬於脾足厥陰外合於沔水內屬於肝足少陰外合於汝水內屬於腎手陽明外合於江水內屬於大腸手太陽外合於淮水內屬於小腸而水道出焉手少陽外合於漯水內屬於三焦手太陰外合於河水內屬於肺手心主外合於漳水內屬於心包手少陰外合於濟水內屬於心凡此五臟六腑十二經水者皆外有源泉而內有所稟此皆內外相貫如環無端人經亦然故天為陽地為陰腰以上為天下為地故海以北者為陰湖以北者為陰中之陰漳以南者為陽河以北至漳者為陽中之陰漯以南至江者為陽中之陽此一州之陰陽也此人所以與天地相參也曰夫經水之應經脈也其遠近之淺深水血之多少各不同合而刺之奈何曰足陽明五臟六腑之海也其脈大而血多氣盛熱壯刺此者不深弗散不留不寫足陽明多血氣刺深六分留十呼足少陽少血氣刺深四分留五呼足太陽多血氣刺深五分留七呼足太陰多血少氣刺深三分留四呼足少陰少血多氣刺深二分留三呼足厥陰多血少氣刺深一分留一呼手之陰陽其受氣之道近其氣之來也疾其刺深皆無過二分留皆無過一呼其少長小大肥瘦以心料之命曰法天之常灸之亦然灸而過此者得惡火則骨枯脈澀刺而過此者則脫氣曰夫經脈之大小血之多少膚之厚薄肉之堅脆及䐃之大小可以為度量乎曰其可為量者取其中度者也不甚脫肉而血氣不衰者也若失度人之痟音消渴病瘦而形肉脫者烏可以度量刺乎審切循捫按視其寒溫盛衰而調之是謂因適而為之真也四海第八人有四海十二經水者皆注於海有髓海有血海有氣海有水穀之海胃者為水穀之海其腧上在氣街下至三里衝脈者為十二經之海其腧上在大杼下出巨虛上下廉膻中者為氣之海其腧上在柱骨之上下前在人迎腦者為髓之海其腧上在其蓋下在風府凡此四海者得順者生得逆者敗知調者利不知調者害曰四海之逆順奈何曰氣海有餘則氣滿胸中悗急息面赤不足則氣少不足以言血海有餘則常想其身大怫鬱也然不知其所病不足則常想其身小狹然不知其所病水穀之海有餘則腹脹滿不足則飢不受穀食髓海有餘則輕徑多力自過其度不足則腦轉耳鳴脛胻酸眩冒目無所見懈怠安臥曰調之奈何曰審守其腧而調其虛實無犯其害順者得復逆者必敗氣息周身五十營四時十分漏刻第九黃帝問曰五十營奈何岐伯對曰周天二十八宿宿三十六分人氣行一周千八分人經絡上下左右前後二十八脈周身十六丈二尺以應二十八宿漏水下百刻以分晝夜故人一呼脈再動氣行三寸一吸脈亦再動氣行三寸呼吸定息氣行六寸十息脈行六尺日行二分二百七十息氣行十六丈二尺氣行交通於中一周於身下水二刻日行二十分有奇五百四十息氣行再周於身下水四刻日行四十分有奇二千七百息氣行十周於身下水二十刻日行五宿二百十分有奇一萬三千五百息氣行五十營於身水下百刻日行二十八宿漏水皆盡脈已終矣王冰曰此略而言之也細言之則常以一十周加一分又十分分之六乃奇分盡也所謂交通者並行一數也故五十營備得盡天地之壽矣氣凡行八百一十丈也一日一夜五十營以營五臟之精不應數者謂之狂生所謂五十營者五臟皆受氣也此段舊在經脈根結之末今移在此曰衛氣之行出入之會何如曰歲有十二月日有十二辰子午為經卯酉為緯天一面七宿周天四七二十八宿房昂為緯張虛為經是故房至畢為陽昂至心為陰陽主晝陰主夜故衛氣之行一日一夜五十周於身晝日合於陽二十五周夜行於陰亦二十五周周於五臟一本作歲是故平旦陰氣盡陽氣出於目目張則氣行於頭循於項下足太陽循背下至小指端其散者分於目別一云別於目鋭眥下手太陽下至手小指外側其散者別於目鋭眥下足少陽注小指次指之間以上循手少陽之分側下至小指之間別者以上至耳前合於頷脈注足陽明下行至跗上入足五指之間其散者從耳下手陽明入大指之間入掌中直至於足入足心出內踝下行陰分復合於目故為一周是故日行一舍人氣行於身一周與十分身之八日行二舍人氣行於身三周與十分身之六日行三舍人氣行於身五周與十分身之四日行四舍人氣行於身七周與十分身之二日行五舍人氣行於身九周日行六舍人氣行於身十周與十分身之八日行七舍人氣行於身十二周與十分身之六日行十四舍人氣二十五周於身有奇分與十人身之四陽盡於陰陰受氣矣其始入於陰常從足少陰注於腎腎注於心心注於肺肺注於肝肝注於脾脾復注於腎為一周是故夜行一舍人氣行於身一云陰臟一周與十分臟之八亦如陽之行二十五周而復會於目陰陽一日一夜舍於奇分十分身之四與十分臟之四一作二上文十分臟之八此言十分臟之四疑有誤是故人之所以臥起之時有早晏者以奇分不盡故也曰衛氣之在身也上下往來無已其候氣而刺之奈何曰分有多少日有長短春秋冬夏各有分理然後常以平旦為紀夜盡為始是故一日一夜漏水百刻二十五刻者半日之度也常如是無已日入而止隨日之長短各以為紀謹候氣之所在而刺之是謂逢時病在於陽分必先候其氣之加在於陽分而刺之病在於陰分必先候其氣之加在於陰分而刺之謹候其時病可與期失時反候百病不除水下一刻人氣在太陽水下二刻人氣在少陽水下三刻人氣在陽明水下四刻人氣在陰分水下五刻人氣在太陽水下六刻人氣在少陽水下七刻人氣在陽明水下八刻人氣在陰分水下九刻人氣在太陽水下十刻人氣在少陽水下十一刻人氣在陽明水下十二刻人氣在陰分水下十三刻人氣在太陽水下十四刻人氣在少陽水下十五刻人氣在陽明水下十六刻人氣在陰分水下十七刻人氣在太陽水下十八刻人氣在少陽水下十九刻人氣在陽明水下二十刻人氣在陰分水下二十一刻人氣在太陽水下二十二刻人氣在少陽水下二十三刻人氣在陽明水下二十四刻人氣在陰分水下二十五刻人氣在太陽此少半日之度也從房至畢一十四度水下五十刻半日之度也從昴至心亦十四度水下五十刻終日之度也日行一舍者水下三刻與十素問作七分刻之四大要常以日加之於宿上也則知人氣在太陽是故日行一宿人氣在三陽與陰分常如是無已與天地同紀紛紛𤽉𤽉普巴切終而復始一日一夜水行百刻而盡矣故曰刺實者刺其來刺虛者刺其去此言氣之存亡之時以候虛實而刺之也營氣第十營氣之道內谷為寶谷入於胃氣傳之肺流溢於中布散於外精專者行於經隧常營無已終而復始是謂天地之紀故氣從太陰出循臂內上廉注手陽明上行至面注足陽明下行至跗上注大指間與太陰合上行抵脾從脾注心中循手少陰出腋下臂注小指之端合手太陽上行乘腋出䪼一作項內注目內眥上巔下項合足太陽循脊下尻下行注小指之端循足心注足少陰上行注腎從腎注心外散於胸中循心主脈出腋下臂入一作出兩筋之間入掌中出手中指之端還注小指次指之端合手少陽上行注膻中散於三焦從三焦注膽出脅注足少陽下行至跗上復從跗注大指間合足厥陰上行至肝從肝上注鬲上循喉嚨入頏顙之竅究於畜門一作關其支別者上額循顛下項中循脊入骶音氐是督脈也絡陰器上過毛中入臍中上循腹裡入缺盆下注肺中復出太陰此營氣之行逆順之常也營衛三焦第十一黃帝問曰人焉受氣陰陽焉會何氣為營何氣為衛營安從生衛安從會老壯不同氣陰陽異位願聞其會岐伯對曰人受氣於谷谷入於胃氣傳於肺五臟六腑皆以受氣其清者為營濁者為衛營行脈中衛行脈外營周不休五十而復大會陰陽相貫如環無端衛氣行於陰二十五度行於陽亦二十五度分為晝夜故至陽而起至陰而止故日中而陽隴一作襲下同為重陽夜半而陰隴為重陰故太陰主內太陽主外各行二十五度分為晝夜夜半為陰隴夜半後而陰衰平旦陰盡而陽受氣日中為陽隴日西而陽衰日入陽盡而陰受氣夜半而大會萬民皆臥名曰合陰平旦陰盡而陽受氣如是無已與天地同紀曰老人不夜瞑少壯不夜寤者何氣使然曰壯者之氣血盛其肌肉滑氣道利營衛之行不失其常故晝精而夜瞑老者之氣血減其肌肉枯氣道澀五臟之氣相搏營氣衰少而衛氣內伐故晝不精而夜不得瞑曰願聞營衛之所行何道從始曰營出於中焦衛出於下焦上焦出於胃口並咽以上貫膈而布胸中走腋循手太陰之分而行還注手陽明上至舌下注足陽明常與營俱行於陰陽各二十五度為一周故日夜五十周而復始大會於手太陰曰人有熱飲食下胃其氣未定則汗出於面或出於背或出於身半其不循衛氣之道而出何也曰此外傷於風內開腠理毛蒸理泄衛氣走之固不得循其道此氣悍慓滑疾見開而出故不得從其道名曰漏泄中焦亦並於胃口出上焦之後此所以受氣泌糟粕蒸津液化其精微上注於肺乃化而為血以奉生身莫貴於此故獨得行於經隧命曰營曰血之與氣異名同類何也曰營衛者精氣也血者神氣也故血之與氣異名同類也故奪血者無汗奪汗者無血故人有兩死而無兩生也下焦者別於回腸注於膀胱而滲入焉故水穀者常並居於胃中成糟粕而俱下於大腸而為下焦滲而俱下滲泄別汁循下焦而滲入膀胱也曰人飲酒酒亦入胃米未熟而小便獨先下者何也曰酒者熟谷之液也其氣悍以滑一作清故後谷而入先谷而液出也故曰上焦如霧中焦如漚下焦如瀆此之謂也陰陽清濁精氣津液血脈第十二黃帝問曰願聞人氣之清濁者何也岐伯對曰受谷者濁受氣者清清者注陰濁者注陽濁而清者上出於咽清而濁者下行於胃清者上行濁者下行清濁相干名曰亂氣曰夫陰清而陽濁濁中有清清中有濁別之奈何曰氣之大別清者上注於肺濁者下流於胃胃之清氣上出於口肺之濁氣下注於經內積於海曰諸陽皆濁何陽獨甚曰手太陽獨受陽之濁手太陰獨受陰之清其清者上走孔竅其濁者下行諸經故諸陰皆清足太陰獨受其濁曰治之奈何曰清者其氣滑濁者其氣澀此氣之常也故刺陰者深而留之刺陽者淺而疾取之清濁相干者以數調之也曰人有精氣津液血脈何謂也曰兩神相搏合而成形常先身生是謂精上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣腠理發泄汗出腠理一作溙溙是謂津谷入氣滿淖澤注於骨骨屬屈伸出泄補益腦髓皮膚潤澤是謂液中焦受汁變化而赤是謂血擁遏營氣令無所避是謂脈也曰六氣者有餘不足氣之多少腦髓之虛實血脈之清濁何以知之曰精脫者耳聾氣脫者目不明津脫者腠理開汗大泄液脫者骨痹屈伸不利色夭腦髓消胻酸耳數鳴血脫者色白夭然不澤脈脫者其脈空虛此其候也曰六氣貴賤何如曰六氣者各有部主也其貴賤善惡可為常主然五穀與胃為大海也津液五別第十三黃帝問曰水穀入於口輸於腸胃其液別為五天寒衣薄則為溺與氣天暑衣厚則為汗悲哀氣並則為泣中熱胃緩則為唾邪氣內逆則氣為之閉塞而不行不行則為水脹不知其何由生岐伯對曰水穀皆入於口其味有五分注其海津液各走其道故上焦一作三焦出氣以溫肌肉充皮膚者為津其留而不行者為液天暑衣厚則腠理開故汗出寒留於分肉之間聚沫則為痛天寒則腠理閉氣澀不行水下流於膀胱則為溺與氣五臟六腑心為之主耳為之聽目為之候肺為之相肝為之將脾為之衛腎為之主外故五臟六腑之津液盡上滲於目心悲氣並則心系急急則肺葉舉舉則液上溢夫心系急肺不能常舉乍上乍下故咳而涎出矣中熱則胃中消穀消穀則蟲上下作矣腸胃充郭故胃緩緩則氣逆故唾出矣五穀之津液和合而為膏者內滲入於骨空補益腦髓而下流於陰股陰陽不和則使液溢而下流於陰髓液皆減而下下過度則虛虛則腰脊痛而胻酸陰陽氣道不通四海閉塞三焦不瀉津液不化水穀並於腸胃之中別於回腸留於下焦不得滲於膀胱則下焦脹水溢則為水脹此津液五別之順逆也奇邪血絡第十四黃帝問曰願聞其奇邪而不在經者何也岐伯對曰血絡是也曰刺血絡而僕者何也血出而射者何也血出黑而濁者血出清而半為汁者何也髮針而腫者何也血出若多若少而面色蒼蒼然者何也髮針而面色不變而煩悶者何也血出多而不動搖者何也願聞其故曰脈氣甚而血虛者刺之則脫氣脫氣則僕血氣俱盛而陰氣多者其血滑刺之則射陽氣積蓄久留不瀉者其血黑以濁故不能射新飲而液滲於絡而未和合於血故血出而汁別焉其不新飲者身中有水久則為腫陰氣積於陽其氣因於絡故刺之血未出而氣先行故腫陰陽之氣其新相得而未和合因而瀉之則陰陽俱脫表裡相離故脫色而蒼蒼然也刺之不變而煩悶者刺絡而虛經虛經之屬於陰者陰氣脫故煩悶陰陽相得而合為痹者此為內溢於經而外注於絡如是陰陽皆有餘雖多出血弗能虛也曰相之奈何曰血脈盛堅橫以赤上下無常處小者如針大者如箸刺而瀉之萬全故無失數失數而返各如其度曰針入肉者何也曰熱氣因於針則熱熱則血著於針故堅焉五色第十五雷公問曰聞風者百病之始也厥逆寒濕之所起也別之奈何黃帝答曰當候眉間太素作闕中薄澤為風沖濁為痹在地為厥此其常也各以其色言其病也曰人有不病卒死何以知之曰大氣入於臟腑者不病而卒死矣曰凡病少愈而卒死者何以知之曰赤色出於兩顴大如拇指者病雖少愈必卒死黑色出於顏太素作庭大如拇指不病亦必卒死矣曰其死有期乎曰察其色以言其時顏者首面也眉間以上者咽喉也太素眉間以上作闕上眉間以中太素亦作闕中者肺也下極者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也俠傍者腎也當腎者臍也面王以上者王古本作壬字小腸也面王以下者膀胱字子處也顴者肩也後顴者臂也臂以下者手也目內眥上者膺乳也俠繩而上者背也循牙車以上者股也中央者膝也膝以下者胻也當胻以下者足也巨分者股里也巨屈者膝臏也此五臟六腑支局一作節之部也五臟五色之見者皆出其部也其部骨陷者必不免於病也其部色乘襲者雖病甚不死也曰五官具五色何也曰青黑為痛黃赤為熱白為寒是謂五官曰以色言病之間甚奈何曰其色粗以明者為間沉堊一作夭下同者為甚其色上行者病亦甚其色下行如雲徹散者病方已五色各有臟部有外部有內部其色從外部走內部者其病從外走內其色從內部走外部者其病從內走外病生於內者先治其陰後治其陽反者益甚病生於外者先治其陽後治其陰太素云病生於陽者先治其外後治其內與此文異義同反者益甚用陽和陰用陰和陽審明部分萬舉萬當能別左右是謂大通男女異位故曰陰陽審察澤堊謂之良工沉濁為內浮清為外黃赤為風青黑為痛白為寒黃而膏澤者為膿赤甚者為血痛甚者為攣寒甚者為皮不仁各見其部察其浮沉以知淺深審其澤堊以觀成敗察其浮散以知近遠視色上下以知病處積神於心以知往今故相氣不微不知是非屬意勿去乃知新故色明不粗沉堊為甚不明不澤其病不甚其色散駒駒然未有聚其病散而氣痛聚未成也腎乘心心先病腎為應色其一作皆如是男子色在面王為少腹痛下為卵痛其圜直為莖痛高為本下為首狐疝㿗陰病之屬也女子色在面王為膀胱字子處病散為痛薄為聚方圜左右各如其色形其隨而下至骶為淫有潤如膏狀為暴食不潔左為右一作左右為左一作右其色有邪聚空滿而不端面色所指者也色者青黑赤白黃皆端滿有別鄉別鄉赤者其色亦赤大如榆莢在面王為不月其色上鋭首空上向下鋭下向在左右如法以五色命臟青為肝赤為心白為肺黃為脾黑為腎肝合筋青當筋心合脈赤當脈脾合肉黃當肉肺合皮白當皮腎合骨黑當骨夫精明五色者氣之華也赤欲如白裹朱不欲如赭色也白欲如白璧之澤一云鵝羽不欲如堊一云鹽也青欲如蒼璧之澤不欲如藍也黃欲如羅裹雄黃不欲如黃土也黑欲如重漆色不欲如炭素問作地蒼也五色精微象見其壽不久也青如草滋黑如炲煤黃如枳實赤如衃音披血白如枯骨此五色見而死也青如翠羽黑如鳥羽赤如雞冠黃如蟹腹白如豕膏此五色見而生也生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝蔞實生於腎如以縞裹紫此五臟所生之外營也凡相五色面黃目青面黃目赤面黃目白面黃目黑者皆不死也面青目赤一作青面赤目白面青目黑面黑目白面赤目青者皆死也陰陽二十五人形性血氣不同第十六黃帝問曰人有陰陽何謂陰人何謂陽人少師對曰天地之間不離於五人亦應之非徒一陰一陽而已蓋有太陰之人少陰之人太陽之人少陽之人陰陽和平之人凡此五人者其態不同其筋骨血氣亦不同也太陰之人貪而不仁下濟湛湛好內而惡出心抑而不發不務於時動而後人此太陰之人也少陰之人少貪而賊心見人有亡常若有得好傷好害見人有榮乃反慍怒心嫉而無恩此少陰之人也太陽之人居處於於好言大事無能而虛説志發於四野舉措不顧是非為事如常自用事雖敗而無改一作悔此太陽之人也少陽之人諟諦好自貴有小小官則高自宣好為外交而不內附此少陽之人也陰陽和平之人居處安靜無為懼懼無為欣欣婉然從物或與不爭與時變化尊而謙讓卑而不諂是謂至治古之善用針灸者視人五態乃治之盛者瀉之虛者補之太陰之人多陰而無陽其陰血濁其衛氣澀陰陽不知緩筋而厚皮不之疾瀉不能移之少陰之人多陰而少陽小胃而大腸六腑不調其陽明脈小而太陽脈大必審而調之其血易脫其氣易敗太陽之人多陽而無陰必謹調之無脫其陰而瀉其陽陽重脫者易狂陰陽皆脫者暴死不知人少陽之人多陽而少陰經小而絡大血在中而氣在外實陰而虛陽獨瀉其絡脈則強氣脫而疾中氣重不足病不起矣陰陽和平之人其陰陽之氣和血脈調宜謹審其陰陽視其邪正安其容儀審其有餘察其不足盛者瀉之虛者補之不盛不虛以經取之此所以調陰陽別五態之人也太陰之人其狀黮黮音朕然黑色念然下意臨臨然長大䐃音窘然未僂少陰之人其狀清然竊然固以陰賊立而躁險行而似伏太陽之人其狀軒軒儲儲反身折膕少陽之人其狀立則好仰行則好搖其兩臂兩臂肘皆出於背陰陽和平之人其狀逶逶然隨隨然顒顒然哀哀然豆豆然衆人皆曰君子一本多愈愈然㼐㼐然黃帝問曰余聞陰陽之人於少師少師曰天地之間不離於五故五五二十五人之形血氣之所生別而以候從外知內何如岐伯對曰先立五形金木水火土別其五色異其五聲而二十五人具也木形之人比於上角蒼色小頭長面大肩平背直身小手足好有材好勞心少力多憂勞於事奈春夏不奈秋冬感而成病主足厥陰他他然大角一曰左角之人比於左足少陽少陽之上遺遺然右角一曰少角之人比於右足少陽少陽之下隨隨然鈦角音太一曰右角之人比於右足少陽少陽之上鳩鳩然一曰推推然判角之人比於左足少陽少陽之下括括然火形之人比於上徵赤色廣䏖鋭面小頭好肩背髀腹小手足行安地疾心行遙肩背肉滿有氣輕財少信多慮見事明瞭好顏急心不壽暴死奈春夏不奈秋冬感而生病主手少陰竅竅然一曰核核然太徵之人比於左手太陽太陽之上肌肌然少徵之人比於右手太陽太陽之下慆慆然慆音剔又音倘右徵之人比於右手太陽太陽之上鮫鮫然一曰熊熊然判徵之人比於左手太陽太陽之下支支然熙熙然土形之人比於上宮黃色大頭圓面美肩背大腹好股脛小手足多肉上下相稱行安地舉足浮安心好利人不喜權勢善附人奈秋冬不奈春夏春夏感而生病主足太陰敦敦然太宮之人比於左足陽明陽明之上婉婉然加宮之人比於左足陽明陽明之下烗烗音咳然一曰坎坎然少宮之人比於右足陽明陽明之上樞樞然左宮之人比於右足陽明陽明之下兀兀然一曰衆之人一曰陽明之上金形之人比於上商白色小頭方面小肩背小腹小手足如骨發踵外骨輕身一曰發動輕身清廉急心靜悍善為吏奈秋冬不奈春夏春夏感而生病主手太陰敦敦然太商之人比於左手陽明陽明之上廉廉然右商之人比於左手陽明陽明之下脫脫然左商之人比於右手陽明陽明之上監監然少商之人比於右手陽明陽明之下嚴嚴然水形之人比於上羽黑色大頭面不平一云曲面廣頤小肩大腹小手足小一作大發行搖身下尻長背延延然不敬畏善欺紿人殆戮死奈秋冬不奈春夏春夏感而生病主足少陰汙汙然大羽之人比於右足太陽太陽之上頰頰然少羽之人比於左足太陽太陽之下紆紆然衆之為人比於右足太陽太陽之下潔潔然桎之為人比於左足太陽太陽之上安安然曰得其形不得其色何如曰形勝色色勝形者至其勝時年加害則病行失則憂矣形色相得富貴大樂曰其形色相勝之時年加可知乎曰凡人之大忌常加九歲七歲十六歲二十五歲三十四歲四十三歲五十二歲六十一歲皆人之忌不可不自安也感則病失則憂矣曰脈之上下血氣之候以知形氣奈何曰足陽明之上血氣盛則須美長血多氣少則須短氣多血少則須少血氣俱少則無須兩吻多畫須字一本俱作髯字吻音穩足陽明之下血氣盛則下毛美長至胸血多氣少則下毛美短至臍行則善高舉足足大指少肉足善寒血少氣多則肉善瘃瘃音斸血氣皆少則無毛有則稀而枯瘁善痿厥足痹足少陽之上血氣盛則通髯美長血多氣少則通髯美短血少氣多則少髯血氣皆少則無髯感於寒濕則善痹骨痛爪枯足少陽之下血氣盛則脛毛美長外踝肥血多氣少則脛毛美短外踝皮堅而厚血少氣多則胻毛少外踝皮薄而軟血氣皆少則無毛外踝瘦而無肉足太陽之上血氣盛則美眉眉有毫毛血多氣少則惡眉面多小理血少氣盛則面多肉血氣和則美色足太陰之下血氣盛則跟肉滿踵堅氣少血多則瘦跟空血氣皆少則善轉筋踵下痛手陽明之上氣血盛則上髭美血少氣多則髭惡血氣皆少則善轉筋無髭手陽明之下血氣盛則腋下毛美手魚肉以溫氣血皆少則手瘦以寒手少陽之上血氣盛則眉美以長耳色美血氣皆少則耳焦惡色手少陽之下血氣盛則手拳多肉以溫血氣皆少則瘦以寒氣少血多則瘦以多脈手太陽之上血氣盛則多髯面多肉以平血氣皆少則面瘦黑色手太陽之下血氣盛則掌肉充滿血氣皆少則掌瘦以寒黃赤者多熱氣青白者少熱氣黑色者多血少氣美眉者太陽多血通髯極須者少陽多血美須者陽明多血此其時然也夫人之常數太陽常多血少氣少陽常多氣少血陽明常多血多氣厥陰常多氣少血少陰常多血少氣太陰常多血少氣此天之常數也曰二十五人者刺之有約乎曰美眉者足太陽之脈血氣多惡眉者血氣少其肥而澤者血氣有餘肥而不澤者氣有餘血不足瘦而無澤者血氣俱不足審察其形氣有餘不足而調之可以知順逆矣曰刺其陰陽奈何曰按其寸口人迎以調陰陽切循其經絡之凝泣結而不通者此於身背為痛痹甚則不行故凝泣凝泣者致氣以溫之血和乃止其結絡者脈結血不行決之乃行故曰氣有餘於上者導而下之氣不足於上者推而往之其稽留不至者因而迎之必明於經隧乃能持之寒與熱爭者導而行之其宛陳血不結者即而取之必先明知二十五人別血氣之所在左右上下則刺約畢矣曰或神動而氣先針行或氣與針相逢或針已出氣獨行或數刺之乃知或髮針而氣逆或數刺病益甚凡此六者各不同形願聞其方曰重陽之盛人其神易動其氣易往也矯矯蒿蒿一本作熇熇高高言語善疾舉足喜高心肺之臟氣有餘陽氣滑盛而揚故神動而氣先行此人頗有陰者也多陽者多喜多陰者多怒數怒者易解故曰頗有陰其陰陽之離合難故其神不能先行陰陽和調者血氣淖澤滑利故針入而氣出疾而相逢也其陰多而陽少陰氣沉而陽氣浮者內藏故針已出氣乃隨其後故獨行也其多陰而少陽者其氣沉而氣往難故數刺之乃知其氣逆與其數刺病益甚者非陰陽之氣也沉浮之勢也此皆粗之所敗工之所失其形氣無過也
