body:
  text: 卷二十二經脈絡脈支別第一上雷公問曰禁脈之言凡刺之理經脈為始願聞其道黃帝答曰經脈者所以決死生處百病調虛實不可不通也肺手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內廉上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端是動則病肺脹滿膨膨然而喘咳缺盆中痛甚則交兩手而瞀音務又音茂是謂臂厥是主肺所生病者咳上氣喘喝煩心胸滿臑音如臂內前廉痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而缺氣虛則肩背痛寒少氣不足以息溺色變一云卒遺矢無度為此諸病凡十二經之病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者則寸口大三倍於人迎虛者則寸口反小於人迎也大腸手陽明之脈起於大指次指之端外側循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上循臑外廉上肩出髃音隅骨之前廉上出柱骨之會上下入缺盆絡肺下鬲屬大腸其支者從缺盆直上至頸貫頰下入齒中還出俠口交人中左之右右之左上俠鼻孔是動則病齒痛頰腫是主津液所生病者目黃口乾鼽音求衄喉痹肩前臑痛者大指次指痛不用氣盛有餘則當脈過者熱腫虛則寒栗不復為此諸病盛者則人迎大三倍於寸口虛者則人迎反小於寸口也胃足陽明之脈起於鼻交頞中傍約大腸之脈下循鼻外上入齒中還出俠口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下鬲屬胃絡脾其直者從缺盆下乳內廉下俠臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下入膝臏中下循胻外廉下足跗入中指內間其支者下膝三寸而別以下入中指外間其支者別跗上入大指間出其端是動則病悽悽然振寒善伸數缺顏黑病至則惡人與火聞木音則惕然驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為臂一作骭厥是主血所生病者狂瘈一作瘧溫淫汗出鼽衄口喎唇緊頸腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏兔胻外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身以前皆寒栗胃中寒則脹滿為此諸病盛者人迎大三倍於寸口虛者人迎反小於寸口也脾足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上腨內循胻骨後交出厥陰之前上循膝股內前廉入腹屬脾絡胃上鬲俠咽連舌本散舌下其支者復從胃別上鬲注心中是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急寒瘧溏瘕音加泄水閉黃疸不能食唇青強立股膝內腫痛厥足大指不用為此諸病盛者則寸口大三倍於人迎虛者則寸口反小於人迎也心手少陰之脈起於心中出屬心系下鬲絡小腸其支者從心系上俠咽系目系一本作循胸出脅其直者復從心系卻上肺上出腋下下循臑內後廉循太陰心主之後下肘中內廉循臂內後廉抵掌後鋭骨之端入掌內後廉循小指內出其端是動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅滿痛臑臂內後廉痛厥掌中熱痛為此諸病盛者則寸口大再倍於人迎虛者則寸口反小於人迎也小腸手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩骨之間上循臑外後廉出肩解繞肩胛交肩上入缺盆向腋下絡心循咽下鬲抵胃屬小腸其支者從缺盆循頸上頰至目鋭眥卻入耳中其支者別頰上䪼音拙抵鼻至目內眥斜絡於顴是動則病嗌痛頷腫不可以顧肩似拔臑似折是主腋所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛為此諸病盛者則人迎大再倍於寸口虛者則人迎反小於寸口也膀胱足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下會於後陰貫臀入膕中其支者從膊內左右別下貫胛一作髖挾脊內過髀樞循髀外後廉下合膕中以下貫踹足踉也內出外踝之後循京骨至小指外側是動則病沖頭痛目似脫項似拔脊腰似折不可以曲膕如結腨如裂是謂踝厥是主筋所生病者痔瘧狂顛疾頭囟音信項頸間痛目黃淚出鼽衄項背腰尻膕腨腳皆痛小指不用為此諸病盛者則人迎大再倍於寸口虛者則人迎反小於寸口也腎足少陰之脈起於小指之下斜趣足心出然谷之下循內踝之後別入跟中以上腨內出膕中內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨俠舌本一本云從橫骨中挾臍循腹裡上行而入肺其支者從肺出絡心注胸中是動則病飢不欲食面黑如炭色咳唾則有血喝喝一作喉鳴而喘坐而欲起目䀮䀮無所見心如懸飢狀是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛灸則強食生肉緩帶被髮大杖重履而步為此諸病盛者則寸口大再倍於人迎虛者則寸口反小於人迎也心主手厥陰之脈起於胸中出屬心包絡下鬲歷絡三焦其支者循胸出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中下循臂行兩筋之間循中指出其端其支者別掌中循小指次指出其端是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中憺憺大動面赤目黃喜笑不休是主脈一作心包絡所生病者煩心心痛掌中熱為此諸病盛者則寸口大一倍於人迎虛者則寸口反小於人迎也三焦手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下鬲遍屬三焦其支者從膻中上出缺盆上項俠耳後直上出耳上角以屈下額一作頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目鋭眥是動則病耳聾渾渾焞焞嗌腫喉痹是主氣所生病者汗出目鋭眥痛頰耳後肩臑肘臂外皆痛小指次指不為用為此諸病盛者則人迎大一倍於寸口虛者則人迎反小於寸口也膽足少陽之脈起於目鋭眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭眥後其支者別目鋭眥下大迎合手少陽抵於䪼下一本云別目鋭眥上迎手少陽於額加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸中過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之端其支者別跗上入大指之間循大指歧骨內出其端還貫入爪甲出三毛是動則病口苦善太息心脅痛不能反側甚則面微塵體無膏澤足外反熱是為陽厥是主骨所生病者頭面頷痛目鋭眥痛缺盆中腫痛腋下腫痛馬刀挾癭汗出振寒瘧胸中脅肋髀膝外至胻絶骨外踝前及諸節皆痛小指次指不用為此諸病盛者則人迎大一倍於寸口虛者人迎反小於寸口也肝足厥陰之脈起於大指叢毛之際上循足跗上廉去內踝一寸上外踝八寸交出太陰之後上膕內廉循股陰入毛中環陰器抵小腹俠胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔一云其支者從小腹與太陰少陽結於腰髁夾脊下第三第四骨孔中其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺中是動則病腰痛不可以俯仰丈夫㿗疝婦人少腹腫甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆洞泄狐疝遺精癃閉為此諸病盛者則寸口大一倍於人迎虛者則寸口反小於人迎也足少陰氣絶則骨枯少陰者冬脈也伏行而濡骨髓者也故骨不濡一作軟則肉不能著骨也骨肉不相親則肉濡而卻肉濡而卻故齒長而垢發無潤澤無潤澤者骨先死戊篤己死土勝水也手少陰氣絶則脈不通脈不通則血不流血不流則髮色不澤故面色如黧一作漆柴者血先死壬篤癸死水勝火也靈樞云少陰終者面黑齒長而垢腹脹閉上下不通而終矣足太陰氣絶則脈不營其口唇口唇者肌肉之本也脈弗營則肌肉濡肌肉濡則人中滿一作舌痿人中滿則唇反唇反者肉先死甲篤乙死木勝土也手太陰氣絶則皮毛焦太陰者行氣溫於皮毛者也氣弗營則皮毛焦皮毛焦則津液去津液去則皮節著皮節著則爪枯毛折毛折者毛先死丙篤丁死火勝金也九卷云腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆上下不通上下不通則面黑皮毛焦而終矣足厥陰氣絶則筋弛厥陰者肝脈也肝者筋之合也筋者聚於陰器而脈絡於舌本故脈弗營則筋縮急筋縮急則引卵與舌故唇青舌卷卵縮則筋先死庚篤辛死金勝木也九卷云中熱嗌乾喜溺煩心甚則舌卷卵上縮而終矣五陰俱絶則目系轉轉則目運運為志先死故志先死則遠一日半而死矣太陽脈絶其終也戴眼反折瘛瘲其色白絶汗乃出則終矣少陽脈絶其終也耳聾百節盡縱目橐一作睘一本無此字系絶系絶一日半死其死也目白一作色青白乃死陽明脈絶其絶也口目動作善驚妄言色黃其上下經盛而不行一作不仁則終矣六陽俱絶則陰陽相離陰陽相離則腠理發泄絶汗乃出大如貫珠轉出不流則氣先死矣故旦占夕死夕占旦死此十二經之敗也十二經脈絡脈支別第一下黃帝問曰經脈十二而手太陰之脈獨動不休何也岐伯對曰足陽明胃脈也胃者五臟六腑之海其清氣上注於肺肺氣從太陰而行之其行也以息往來故人脈一呼再動一吸脈亦再動呼吸不已故動而不止曰氣口何以獨為五臟主曰胃者水穀之海六腑之大源也五味入於口藏於胃以養五臟氣氣口亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口故五氣入於鼻藏於心肺肺有病而鼻為之不利也九卷言其動素問論其氣此言其為五臟之所主相發明也曰氣之過於寸口也上出焉息下出焉伏何道從還不知其極也曰氣之離於臟也卒然如弓弩之發如水岸之下上於魚以反衰其餘氣衰散以逆上故其行微也曰足陽明因何而動曰胃氣上注於胃其悍氣上衝頭者循喉上走空竅循眼系入絡腦出頷下客主人循牙車合陽明並下人迎此胃氣走於陽明者也故陰陽上下其動也若一故陽病而陽脈小者為逆陰病而陰脈大者為逆陰陽俱盛與其俱動若引繩相傾者病曰足少陰因何而動曰衝脈者十二經脈之海也與少陰之大絡起於腎下出於氣街循陰股內廉斜入膕中循胻骨內廉並少陰之經下入內踝之後足下其別者斜入踝內出屬跗上入大指之間以注諸絡以溫足跗此脈之常動者也曰衛氣之行也上下相貫如環無端今有卒遇邪氣及逢大寒手足不隨其脈陰陽之道相腧之會行相失也氣何由還曰夫四末陰陽之會此氣之大絡也四沖者氣之經經一作徑也故絡絶則經通四末解則氣從合相輸如環黃帝曰善此所謂如環無端莫知其紀終而復始此之謂也十二經脈伏行於分肉之間深而不見其常見者足太陰脈過於外踝之上無所隱故諸脈之浮而常見者皆絡脈也六經絡手陽明少陰之大絡起五指間上合肘中飲酒者衛氣先行皮膚先充絡脈絡脈先盛則衛氣以平營氣乃滿而經脈大盛也脈之卒然動者皆邪氣居之留於本末不動則熱不堅則陷且空不與衆同是以知其何脈之動也雷公問曰何以知經脈之與絡脈異也黃帝答曰經脈者常不可見也其虛實也以氣口知之脈之見者皆絡脈也諸絡脈皆不能經大節之間必行絶道而出入復合於皮中其會皆見於外故諸刺絡脈者必刺其結上甚血者雖無血結急取之以瀉其邪而出其血留之發為痹也凡診絡脈脈色青則寒且痛赤則有熱胃中有寒則手魚際之絡多青胃中有熱則魚際之絡赤其暴黑者久留痹也其有赤有青有黑者寒熱也其青而小短者少氣也凡刺寒熱者皆多血絡必間日而一取之血盡乃止調其虛實其小而短者少氣甚者瀉之則悶悶甚則僕不能言悶則急坐之也手太陰之別名曰列缺起於腕上分間並太陰之經直入掌中散入於魚際其病實則手兌骨掌熱虛則缺㰦音掐開口也小便遺數取之去腕一寸半別走陽明手少陰之別名曰通里在腕一寸半別而上行循經入於心中系舌本屬目系實則支膈虛則不能言取之腕後一寸別走太陽手心主之別名曰內關去腕二寸出於兩筋之間循經以上繫於心包絡心系實則心痛虛則為煩心取之兩筋間手太陽之別名曰支正上腕五寸內注少陰其別者上走肘絡肩髃實則筋弛肘廢虛則生疣小者如指痂疥取之所別手陽明之別名曰偏歷去腕三寸別走太陰其別者上循臂乘肩髃上曲頰遍齒其別者入耳會於宗脈實則齲音禹齒耳聾虛則齒寒痹鬲取之所別手少陽之別名曰外關去腕二寸外繞臂注胸中合心主實則肘攣虛則不收取之所別足太陽之別名曰飛揚去踝七寸別走少陰實則窒鼻一云鼽窒頭背痛虛則鼽衄取之所別足少陽之別名曰光明去踝上五寸別走厥陰並經下絡足跗實則厥虛則痿躄坐不能起取之所別足陽明之別名曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痹瘁喑實則顛狂虛則足不收脛枯取之所別足太陰之別名曰公孫去本節後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所別足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下外貫腰脊其病氣逆則煩悶實則癃閉虛則腰痛取之所別足厥陰之別名曰蠡溝去內踝上五寸別走少陽其別者循經上睪結於莖其病氣逆則睪腫卒疝實則挺長熱虛則暴癢取之所別任脈之別名曰尾翳下鳩尾散於腹實則腹皮痛虛則瘙癢取之所別督脈之別名曰長強俠脊上項散頭上下當肩胛左右別走太陽入貫膂實則脊強虛則頭重高搖之挾脊之有過者九墟無此九字取之所別脾之大絡名曰大包出淵腋下三寸布胸脅實則一身盡痛虛則百脈皆縱此脈若羅絡之血者皆取之凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脈異所別也黃帝問曰皮有分部脈有經紀願聞其道岐伯對曰欲知皮部以經脈為紀者諸經皆然陽明之陽名曰害蜚十二經上下同法視其部中有浮絡者皆陽明之絡也其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也絡盛則入客於經陽主外陰主內少陽之陽名曰樞杼一作持視其部中有浮絡者皆少陽之絡也絡盛則入客於經故在陽者主內在陰者主外以滲於內也諸經皆然太陽之陽名曰關樞視其部中有浮絡者皆太陽之絡也絡盛則入客於經少陰之陰名曰樞儒視其部中有浮絡者皆少陰之絡也絡盛則入客於經其入於經也從陽部注於經其出者從陰部內注於骨心主之陰名曰害肩視其部中有浮絡者皆心主之絡也絡盛則入客於經太陰之陰名曰關蟄視其部中有浮絡者皆太陰之絡也絡盛則入客於經凡此十二經絡脈者皮之部也是故百病之始生也必先客於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於腑稟於腸胃邪之始入於皮也淅然起毫毛開腠理其入於絡也則絡脈盛色變其入客於經也則盛虛乃陷下其留於筋骨之間寒多則筋攣骨痛熱多則筋弛骨消肉爍膕破毛直而敗也曰十二部其生病何如曰皮者脈之部也邪客於皮則腠理開開則邪入客於絡脈絡脈滿則注於經脈經脈滿則入舍於腑臟故皮有分部不愈而生大病也曰夫絡脈之見其五色各異其故何也曰經有常色而絡無常變曰經之常色何如曰心赤肺白肝青脾黃腎黑皆亦應其經脈之色也曰其絡之陰陽亦應其經乎曰陰絡之色應其經陽絡之色變無常隨四時而行寒多則凝泣凝泣則青黑熱多則淖滜音皋淖滜則黃赤此其常色者謂之無病五色俱見謂之寒熱曰余聞人之合於天地也內有五臟以應五音五色五味五時五位外有六腑以合六律主持陰陽諸經而合之十二月十二辰十二節十二時十二經水十二經脈此五臟六腑所以應天道也夫十二經脈者人之所以生病之所以成人之所以治病之所以起學之所始工之所止粗之所易上之所難也其離合出入奈何曰此粗之所過上之所悉也請悉言之足太陽之正別入於膕中其一道下尻五寸別入於肛屬於膀胱散之腎循膂當心入散直者從膂上出於項復屬於太陽此為一經也足少陰之正至膕中別走太陽而合上至腎當十四椎出屬帶脈直者系舌本復出於項合於太陽此為一合九墟云或以諸陰之別者皆為正也足少陽之正或以諸經別者為正一本云繞髀入毛際合於厥陰別者入季脅之間循胸裡屬膽散之上肝貫心以上俠咽出頤頷中散於面系目系合少陽於外眥足厥陰之正別跗上上至毛際合於少陽與別俱行此為二合足陽明之正上至髀入於腹裡屬於胃散之脾上通於心上循咽出於口上頞䪼還系目合於陽明足太陰之正則別上至髀合於陽明與別俱行上絡於咽貫舌本此為三合手太陽之正指地別入於肩解入腋走心系小腸手少陰之正別下於淵腋兩筋之間屬心主上走喉嚨出於面合目內眥此為四合手少陽之正指天別於巔入於缺盆下走三焦散於胸中手心主之正別下淵腋三寸入胸中別屬三焦出循喉嚨出耳後合少陽完骨之下此為五合手陽明之正從手循膺乳別於肩髃入柱骨下走大腸屬於肺上循喉嚨出缺盆合於陽明手太陰之正別入淵腋少陰之前入走肺散之太陽上出缺盆循喉嚨復合陽明此為六合奇經八脈第二黃帝問曰脈行之逆順奈何岐伯對曰手之三陰從臟走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹曰少陰之脈獨下行何也曰衝脈者五臟六腑之海也五臟六腑皆稟焉其上者出於頏顙滲諸陽灌諸陰其下者注少陰之大絡出於氣衝循陰股內廉斜入膕中伏行髀骨內下至內踝之後屬而別其下者至於少陰之經滲三陰其前者伏行出屬跗下循跗入大指間滲諸絡而溫肌肉故別絡結則跗上不動不動則厥厥則寒矣曰何以明之曰以言道之切而驗之其非必動然後可以明逆順之行也衝脈任脈者皆起於胞中上循脊裡為經絡之海其浮而外者循腹上一作右行會於咽喉別而絡唇口血氣盛則充膚熱肉血獨盛則滲灌皮膚生毫毛婦人有餘於氣不足於血以其月水下數脫血任沖並傷故也任沖之交脈不營其唇故髭鬚不生焉任脈者起於中極之上以下毛際循腹裡上關元至咽喉上頤循面入目衝脈者起於氣衝並少陰之經俠臍上行至胸中而散其言衝脈與九卷異任脈為病男子內結七疝女子帶下瘕聚衝脈為病逆氣裡急督脈為病脊強反折亦與九卷互相發也曰人有傷於陰陰氣絶而不起陰不為用髭鬚不去宦者獨去何也曰宦者去其宗筋傷其衝脈血瀉不復皮膚內結唇口不營故無髭鬚夫宦者其任沖之脈不盛宗筋不成有氣無血口唇不營故髭鬚不生督脈者經缺不具見於營氣曰上額循巔下項中循脊入骶是督脈也素問曰督脈者起於少腹以下骨中央女子入系廷孔其孔溺孔之端也其絡循陰器合纂間繞纂後別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎與太陽起於目內眥上額交巔上入絡腦還出別下項循肩膊內俠脊抵腰中入循膂絡腎其男子循莖下至纂與女子等其小腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之中此生病從小腹上衝心而痛不得前後為沖疝其女子不孕癃痔遺溺嗌乾督脈生病治督脈難經曰督脈者起於下極之俞並於脊裡上至風府入屬於腦上巔循額至鼻柱陽脈之海也九卷言營氣之行於督脈故從上下難經言其脈之所起故從下上所以互相發也素問言督脈似謂在沖多聞闕疑故並載以貽後之長者云曰蹺脈安起安止何氣營也曰蹺脈者少陰之別起於然骨之後上內踝之上直上循陰股入陰上循胸裡入缺盆上循人迎之前上入鼽靈樞作頄字屬目內眥合於太陽陽蹺而上行氣相併相還則為濡一作深目氣不營則目不合也曰氣獨行五臟不營六腑何也曰氣之不行無行也如水之流如日月之行不休故陰脈營其臟陽脈營其腑如環之無端莫知其紀終而復始其流溢之氣內溉臟腑外濡腠理曰蹺脈有陰陽何者當其數曰男子數其陽女子數其陰其陰一本無此二字當數者為經不當數者為絡也難經曰陽蹺脈者起於跟中循外踝上行入風池陰蹺脈者亦起於跟中循內踝上行入喉嚨交貫衝脈此所以互相發明也又曰陽維陰維者維絡於身溢蓄不能環流溉灌也故陽維起於諸陽會陰維起於諸陰交也又曰帶脈起於季脅回身一周自衝脈以下是謂奇經八脈又曰陰蹺為病陽緩而陰急陽蹺為病陰緩而陽急陽維維於陽陰維維於陰陰陽不能相維為病腰腹縱容如囊水之狀一云腹滿腰溶溶如坐水中狀此八脈之診也維脈帶脈皆見如此詳素問痿論及見於九卷脈度第三黃帝問曰願聞脈度岐伯對曰手之六陽從手至頭長五尺五六合三丈手之六陰從手至胸中長三尺五寸三六一丈八尺五六合三尺凡二丈一尺足之六陽從頭至足長八尺六八合四丈八尺足之六陰從足至胸中長六尺五寸六六合三丈六尺五六三尺凡三丈九尺蹺脈從足至目長七尺五寸二七一丈四尺二五合一尺凡一丈五尺督脈任脈各長四尺五寸二四合八尺二五合一尺凡九尺凡都合一十六丈二尺此氣之大經隧也經脈為里支而橫者為絡絡之別者為孫絡孫絡之盛而有血者疾誅之盛者瀉之虛者飲藥以補之十二經標本第四黃帝問曰五臟者所以藏精神魂魄也六腑者所以受水穀而化物者也其氣內循於五臟而外絡支節其浮氣之不循於經者為衛氣其精氣之行於經者為營氣陰陽相隨外內相貫如環無端亭亭淳淳乎孰能窮之然其分別陰陽皆有標本虛實所離之處能別陰陽十二經者知病之所生候虛實之所在者能得病之高下知六經之氣街者能知解結紹於門戶能知虛實之堅濡者知補瀉之所在能知六經標本者可以無惑於天下也岐伯對曰博哉聖帝之論臣請悉言之足太陽之本在跟上五寸中標在兩絡命門命門者目也足少陰之本在內踝下上三寸中標在背腧與舌下兩脈足少陽之本在竅陰之間標在窗籠之前窗籠者耳也千金云窗籠者耳前上下脈以手按之動者是也足陽明之本在厲兌標在人迎上頰頏顙九卷云標在人迎頰上俠頏顙足厥陰之本在行間上五寸所標在背腧足太陰之本在中封前四寸之中標在背腧與舌本手太陽之本在外踝之後標在命門之上一寸千金云命門在心上一寸手少陽之本在小指次指之間上三寸一作二寸標在耳後上角下外眥手陽明之本在肘骨中上至別陽標在腋下合鉗上手太陰之本在寸口之中標在腋下內動脈是也手少陽之本在兌骨之端標在背腧手心主之本在掌後兩筋之間標在腋下三寸凡候此者主下虛則厥下盛則熱上虛則眩上盛則熱痛故實者絶而止之虛者引而起之請言氣街胸氣有街腹氣有街頭氣有街胻氣有街故氣在頭者上一作止下同之於腦在胸中者上之膺與背腧氣在腹者上之於背腧與衝脈於臍左右之動脈者氣在胻者上之氣街與承山踝上以下取此者用毫針必先按而久存之應於手乃刺而豫之所刺者頭痛眩僕腹痛中滿暴脹及有新積可移者易已也積不痛者難已也經脈根結第五黃帝曰天地相感寒熱相移陰陽之數孰少孰多陰道偶而陽道奇發於春夏陰氣少而陽氣多陰陽不調何補何瀉發於秋冬陽氣少而陰氣多陰氣盛陽氣衰故莖葉枯槁濕雨下歸陰陽相離何補何瀉奇邪離經不可勝數不知根結五臟六腑折關敗樞開闔而走陰陽大失不可復取九針之要在於終始能知終始一言而畢不知終始針道絶矣太陽根於至陰結於命門命門者目也陽明根於厲兌結於頏顙頏顙者鉗大鉗大者耳也少陽根於竅陰結於窗籠窗籠者耳也太陽為開陽明為闔少陽為樞故關折則肉節潰緩而暴病起矣故候暴病者取之太陽視有餘不足潰緩者皮肉緩膲而弱也闔折則氣無所止息而痿病起矣故痿病者皆取之陽明視有餘不足無所止息者真氣稽留邪氣居之也樞折則骨搖而不能安於地故骨搖者取之少陽視有餘不足節緩而不收者當核其本太陰根於隱白結於太倉厥陰根於大敦結於玉英絡於膻中少陰根於湧泉結於廉泉太陰為開厥陰為闔少陰為樞故開折則倉稟無所輸膈洞膈洞者取之太陰視有餘不足故開折者則氣不足而生病闔折則氣弛而善悲善悲者取之厥陰視有餘不足樞折則脈有所結而不通不通者取之少陰視有餘不足有結者皆取之足太陽根於至陰流於京骨注於崑崙入於天柱飛揚足少陽根於竅陰流於丘墟注於陽輔入於天容疑誤光明足陽明根於厲兌流於衝陽注於下陵入於人迎豐隆手太陽根於少澤流於陽谷注於少海入於天窗疑誤支正手少陽根於關衝流於陽池注於支溝入於天牖外關手陽明根於商陽流於合谷注於陽溪入於扶突偏歷此所謂十二經絡也絡盛者當取之經筋第六足太陽之筋起於足小指上結於踝斜上結於膝其下者從足外側結於踵上循跟結於膕其別者結於腨外上膕中內廉與膕中並上結於臀上挾脊上項其支者別入結於舌本其直者結於枕骨上頭下額一作顏結於鼻其支者為目上綱下結於鼽靈樞作頄字其下支者從腋後外廉結於肩髃其支者入腋下出缺盆上結於完骨其支者出缺盆斜上入於鼽其病小指支踵跟痛一作小指支踵痛膕攣急脊反折項筋急肩不舉腋支缺盆中紐痛不可左右搖治在燔針劫刺以知為數以痛為腧名曰仲春痹足少陽之筋起於小指次指之上結於外踝上循胻外廉結於膝外廉其支者別起於外輔骨上走髀前者結於伏兔後者結於尻其直者上乘䏚季脅上走腋前廉繫於膺乳結於缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於鼽其支者結於目外眥為外維其病小指次指支轉筋引膝外轉筋膝不可屈伸膕筋急前引髀後引尻上乘䏚季脅痛上引缺盆膺乳頸維筋急從左之右右目不開上過右角並蹺脈而行左絡於右故傷左角右足不用命曰維筋相交治在燔針劫刺以知為數以痛為輸名曰孟春痹足陽明之筋起於中三指結於跗上斜外上加於輔骨上結於膝外廉直上結於髀樞上循脅屬脊其直者上循骭結於膝其支者結於外輔骨合少陽其直者上循伏兔上結於髀聚於陰器上腹而布至缺盆而結上頸上俠口合於鼽下結於鼻上合於太陽太陽為目上綱陽明為目下綱其支者從頰結於耳前其病足中指支脛轉筋腳跳堅伏兔轉筋髀前腫㿗疝腹筋乃急引缺盆及頰卒口僻急者目不合熱則筋弛縱緩不勝目不開頰筋有寒則急引頰移口有熱則筋弛縱不勝收故僻治之於馬膏膏其急者以白酒和桂塗其緩者以桑鉤鉤之即以生桑灰置之坎中高下與坐等以膏尉急頰且飲美酒啖炙肉不飲酒者自強也為之三拊而已治在燔針劫刺以知為數以痛為輸名曰季春痹足太陰之筋起於大指之端內側上結於內踝其直者上絡於膝內輔骨上循陰股結於髀聚於陰器上腹結於臍循腹裡結於脅散於胸中其內者著於脊其病足大指支內踝痛轉筋內輔骨痛陰股引髀而痛陰器紐痛上臍兩脅痛膺中脊內痛治在燔針劫刺以知為數以痛為輸名曰孟秋痹足少陰之筋起於小指之下入足心並足太陰而斜走內踝之下結於踝踵則與足太陽之筋合而上結於內輔之下並太陰之筋而上循陰股結於陰器循膂內俠脊上至項結於枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癇瘈及痓病在外者不能俯在內者不能仰故陽病者腰反折不能俯陰病者不能仰治在燔針劫刺以知為數以痛為輸在內者尉引飲藥此筋折紐紐發數甚者死不治名曰仲秋痹足厥陰之筋起於大指之上結於內踝之前上循沖胻上結內輔之下上循陰股結於陰器絡諸經一作筋其病足大指支內踝之前痛內輔痛陰股痛轉筋陰器不用傷於內則不起傷於寒則陰縮入傷於熱則縱挺不收治在行水清陰器其病轉筋者治在燔針劫刺以知為數以痛為輸名曰季秋痹手太陽之筋起於小指之上結於腕上循臂內廉結於肘內兌骨之後彈之應小指之上入結於腋下其支者從腋走後廉上繞臑外廉上肩胛循頸出足太陽之筋前結於耳後完骨其支者入耳中直者出耳上下結於頷上屬目外眥其病小指支及肘內兌骨後廉痛循臂陰入腋下腋下痛腋後廉痛繞肩胛引頸而痛應耳中鳴痛引頷目瞑良久乃能視頸筋急則為筋痿頸腫寒熱在頸者治在燔針劫刺以知為數以痛為輸其為腫者復而兌之名曰仲夏痹原本復而兌之下有本支者上曲牙循耳前屬目外眥上頷結於角其痛當所過者支轉筋治在燔針劫刺以知為數以痛為輸段手少陽之筋起於小指次指之端結於腕上循臂結於肘上繞臑外廉上肩走頸合手太陽其支者上當曲頰入繫於舌本其支者上曲牙循耳前屬目外眥上乘頷結於角其病當所過者即支轉筋舌卷治在燔針劫刺以知為數以痛為輸名曰季夏痹手陽明之筋起於大指次指之端結於腕上循臂上結於肘上繞臑結於髃其支者繞肩胛俠脊其直者從肩髃上頸其支者上頰結於鼽其直者上出手太陽之前上左角絡頭下右頷其病當所過者支一本下有痛字及字轉筋痛肩不舉頸不可左右視治在燔針劫刺以知為數以痛為輸名曰孟夏痹手太陰之筋起於大指之上循指上行結於魚際後行寸口外側上循臂結肘中上臑內廉入腋下上出缺盆結肩前髃上結缺盆下結於胸裡散貫賁合脅下抵季肋其病當所過者支轉筋痛甚成息賁者脅急吐血治在燔針劫刺以知為數以痛為輸名曰仲冬痹手心主之筋起於中指與太陰之經並行結於肘內廉上臂陰結腋下下散前後俠脅其支者入腋散胸中結於臂其病當所過者支轉筋痛及胸痛息賁治在燔針劫刺以知為數以痛為輸名曰孟冬痹手少陰之筋起於小指之內側結於兌骨上結肘內廉上入腋交太陰挾乳里結於胸中循賁下繫於臍其病內急心承伏梁下為肘綱其病當所過者支轉筋痛治在燔針劫刺以知為數以痛為輸其成伏梁吐膿血者死不治凡經筋之病寒則反折筋急熱則筋縱緩不收陰痿不用陽急則反折陰急則俯不伸淬刺者刺寒急也熱則筋縱不收無用燔針劫刺名曰季冬痹足之陽明手之太陽筋急則口目為之僻目眥急不能卒視治此皆如右方也骨度腸度腸胃所受第七黃帝問曰脈度言經脈之長短何以立之伯高對曰先度其骨節之大小廣狹長短而脈度定矣曰人長七尺五寸者其骨節之大小長短知各幾何曰頭一作頸之骨圍二尺六寸胸圍四尺五寸腰圍四尺二寸發所覆者顱至項一尺二寸發以下至頤長一尺君子參又作三又作終折結喉以下至缺盆中長四寸缺盆以下至𩩲骭長九寸過則肺大不滿則肺小𩩲骭以下至天樞長八寸過則胃大不及則胃小天樞以下至橫骨長六寸半過則回腸廣長不滿則狹短橫骨長六寸半橫骨上廉以下至內輔之上廉長一尺八寸內輔之上廉以下至下廉長三寸半內輔下廉至內踝長一尺三寸內踝以下至地長三寸膝膕以下至跗屬長一尺六寸跗屬以下至地長三寸故骨圍大則太過小則不及角以下至柱骨長一尺一作寸行腋中不見者長四寸腋以下至季脅長一尺二寸季脅以下至髀樞長六寸髀樞以下至膝中長一尺九寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸耳後當完骨者廣九寸耳前當耳門者廣一尺二寸一作三寸兩顴之間廣九寸半九墟作七寸兩乳之間廣九寸半兩髀之間廣六寸半足長一尺二寸廣四寸半肩至肘長一尺七寸肘至腕長一尺二寸半腕至中指本節長四寸本節至其末長四寸半項發以下至脊骨長三寸半一作二寸脊骨以下至尾骶二十一節長三尺上節長一寸四分分之七奇分之一奇分在下故上七節下至膂骨九寸八分分之七此衆人骨之度也所以立經脈之長短也是故視其經脈之在於身也其見浮而堅其見明而大者多血細而沉者多氣乃經之長短也曰願聞六腑傳谷者腸胃之大小長短受谷之多少奈何曰谷之所從出入淺深遠近長短之度唇至齒長九分廣二寸半齒以後至會厭深三寸半大容五合舌重十兩長七寸廣二寸半咽門重十兩廣二寸半至胃長一尺六寸胃紆曲屈伸之長二尺六寸大一尺五寸徑五寸大容三一作二鬥五升小腸後附脊左環回周葉一作迭下同積其注於回腸者外附於臍上回運環反十六曲大二寸半徑八分分之少半長三丈二尺一作三尺回腸當臍左環回周葉積而下回運環反十六曲大四寸徑一寸寸之少半長二丈一尺廣腸附一作傳脊以受回腸左環葉積一作脊上下僻大八寸徑二寸寸之大半長二尺八寸腸胃所入至所出長六丈四寸四分回曲環反三十二曲曰人不食七日而死者何也曰胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升其中之谷常留者二斗水一斗五升而滿上焦泄氣出其精微慓悍滑疾下焦下溉泄諸小腸小腸大二寸半徑八分分之少半長三丈二尺受谷二斗四升水六升三合合之大半回腸大四寸徑一寸寸之少半長二丈一尺受谷一斗水七升半廣腸大八寸徑二寸寸之大半長二尺八寸受谷九升三合八分合之一腸胃之長凡五丈八尺四寸受水穀九斗二升一合合之大半此腸胃所受水穀之數也平人則不然胃滿腸虛腸滿則胃虛更滿更虛故氣得上下五臟安定血脈和利精神乃居故神者水穀之精氣也故腸胃之中常留谷二斗四升水一斗五升故人一日再至後後二升半一日中五升五七三斗五升而留水穀盡矣故平人不飲不食七日而死者水穀精氣津液皆盡故七日死矣
